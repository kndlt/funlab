<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>funlab · grand research on game</title>
<style>
  :root{--bg:#14110d;--panel:#1d1812;--line:#3a3024;--cream:#f6ead8;--ink:#e7dcc8;--muted:#a9977e;--amber:#ffb154;--green:#9fd49a}
  *{margin:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;line-height:1.6;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%)}
  .wrap{max-width:1000px;margin:0 auto;padding:52px 22px 100px}
  h1{font-size:34px;font-weight:800;background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:14px;margin-top:8px;max-width:660px}
  .summary{margin-top:16px;color:var(--muted);font-size:13px}
  .filters{display:flex;gap:7px;flex-wrap:wrap;margin-top:20px}
  .filters button{background:#1a1510;border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:6px 13px;cursor:pointer;font-size:12.5px;font-family:inherit}
  .filters button:hover{color:var(--cream);border-color:#7a5a30}
  .filters button.on{background:var(--amber);color:#241400;border-color:var(--amber);font-weight:700}
  .filters .cnt{opacity:.5;font-size:11px;font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:13px;margin-top:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 17px;display:flex;flex-direction:column;gap:7px}
  .card .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .card h3{font-size:17px;color:var(--cream);font-weight:800}
  .ref{font-size:11px;color:var(--muted);white-space:nowrap}
  .essence{font-size:13px;color:var(--ink)}
  .nerve{font-size:11px;color:var(--amber);letter-spacing:.4px}
  .hero{border-color:#6a4d22;background:#231a10}
  .hero h3::after{content:" ★";color:var(--amber)}
  .play{display:inline-block;margin-top:3px;align-self:flex-start;background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;
    font-weight:800;text-decoration:none;padding:7px 16px;border-radius:22px;font-size:13px}
  .play:active{transform:scale(.96)}
  .score{margin-top:5px;border-top:1px solid var(--line);padding-top:9px}
  .score .lbl{font-size:11px;color:var(--muted);margin-bottom:5px}
  .clear{margin-left:8px;color:var(--muted);font-size:11px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
  .clear:hover{color:var(--amber)}
  .nums{display:flex;gap:3px;flex-wrap:wrap}
  .nums button{width:25px;height:25px;border:1px solid var(--line);background:#241c12;color:var(--ink);border-radius:7px;cursor:pointer;font-size:11.5px;font-weight:700;font-family:inherit}
  .nums button:hover{border-color:#7a5a30}
  .nums button.on{background:var(--amber);color:#241400;border-color:var(--amber)}
  .note{width:100%;margin-top:6px;background:#11100a;border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:inherit;font-size:12px;padding:6px 9px;resize:vertical;min-height:32px}
  .comm{font-size:11px;color:var(--green);margin-bottom:6px}
  .comm b{color:var(--cream)}
  .comm.empty{color:var(--muted)}
  #net{color:#e0915a;font-size:12px;margin-top:6px}
  footer{margin-top:46px;color:#7c6d58;font-size:12px;border-top:1px solid var(--line);padding-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <h1>funlab</h1>
  <p class="sub">그랜드 리서치 온 "게임" — 검증된 게임들의 <b>에센스</b>만 한 줄로 뽑아, 에셋 0로 프로토타입. <b>플레이하고, 벌거벗고도 재밌나 1–10으로 score.</b> 노잼이 재밌음만큼 중요 — nerve를 분리해줌.</p>
  <div class="summary" id="summary"></div>
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
  <footer>점수와 메모는 funlab DB에 저장돼 — 다 같이 본다 (오프라인이면 이 브라우저에만). · 계속 자라는 catalog — 배치마다 nerve를 넓힘.<div id="net"></div></footer>
</div>
<div id="ts-box" style="position:fixed;bottom:12px;right:12px;z-index:50"></div>

  {slug:'pong',   title:'퐁',        ref:'Pong',            cat:'arcade',

  {slug:'slot',   title:'슬롯머신',  ref:'Slot Machine',    cat:'risk',

const grid=document.getElementById('grid');
const filtersEl=document.getElementById('filters');
function k(s,t){return 'funlab:'+s+':'+t}
let filter='전체';

// ── Supabase (Data API / PostgREST) — browser writes directly, RLS is the gate.
// publishable key is safe to ship; the gate is RLS, not key secrecy.
const SB_URL='https://idgglxgnviovwrwlmgjr.supabase.co';
const SB_KEY='sb_publishable_6Kxa6qylzE_naz-4oAUivQ_yTYFGDJX';
const REST=SB_URL+'/rest/v1';

// one stable anonymous voter id per browser (the upsert key, with game_slug)
function voterId(){
  let v=localStorage.getItem('funlab:voter_id');
  if(!v){v=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():'v'+Date.now()+Math.random().toString(36).slice(2);
    localStorage.setItem('funlab:voter_id',v);}
  return v;
}
const VOTER=voterId();

// ── Cloudflare Turnstile — gates free-text comments (not scores). The note
// write goes through the Worker (/api/note), which verifies this token with
// the secret. Empty sitekey => comments stay localStorage-only (feature off).
const TS_SITEKEY=''; // set to the Turnstile sitekey (0x...) to enable comments
let tsId, tsResolve=null;
window.onTurnstileLoad=function(){
  tsId=turnstile.render('#ts-box',{
    sitekey:TS_SITEKEY, execution:'execute', appearance:'interaction-only', size:'flexible',
    callback:t=>{const r=tsResolve;tsResolve=null;if(r)r(t);},
    'error-callback':()=>{const r=tsResolve;tsResolve=null;if(r)r(null);},
    'expired-callback':()=>{const r=tsResolve;tsResolve=null;if(r)r(null);},
  });
};
function tsToken(){ // resolve a fresh single-use token (or null if unavailable)
  return new Promise(res=>{
    if(!TS_SITEKEY||typeof turnstile==='undefined'||tsId===undefined){res(null);return;}
    tsResolve=res;
    try{turnstile.reset(tsId);turnstile.execute(tsId);}catch(e){tsResolve=null;res(null);return;}
    setTimeout(()=>{if(tsResolve===res){tsResolve=null;res(null);}},15000);
  });
}
if(TS_SITEKEY){
  const s=document.createElement('script');
  s.src='https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit';
  s.async=true;s.defer=true;document.head.appendChild(s);
}

function sb(path,opts){
  opts=opts||{};
  return fetch(REST+path,Object.assign({},opts,{headers:Object.assign(
    {apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'},opts.headers||{})}));
}
let COMM={};   // game_slug -> {n, avg} community aggregate (everyone)
let MINE={};   // game_slug -> {score, note} this voter's own row

async function loadCommunity(){
  try{const r=await sb('/funlab_rating_summary?select=game_slug,n,avg_score');if(!r.ok)throw 0;
    const m={};(await r.json()).forEach(x=>m[x.game_slug]={n:x.n,avg:x.avg_score});return m;
  }catch(e){return null;}
}
async function loadMine(){
  try{const r=await sb('/funlab_ratings?voter_id=eq.'+encodeURIComponent(VOTER)+'&select=game_slug,score,note');if(!r.ok)throw 0;
    const m={};(await r.json()).forEach(x=>m[x.game_slug]={score:x.score,note:x.note});return m;
  }catch(e){return null;}
}
async function upsert(slug,fields){ // server insert policy requires a score; caller guarantees it
  const r=await sb('/funlab_ratings?on_conflict=game_slug,voter_id',{method:'POST',
    headers:{Prefer:'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify([Object.assign({game_slug:slug,voter_id:VOTER},fields)])});
  if(!r.ok)throw new Error('upsert '+r.status+' '+await r.text());
}
async function refreshComm(slug,card){
  try{const r=await sb('/funlab_rating_summary?game_slug=eq.'+encodeURIComponent(slug)+'&select=n,avg_score');if(!r.ok)return;
    const c=(await r.json())[0];if(c){COMM[slug]={n:c.n,avg:c.avg_score};
      const el=card.querySelector('.comm');if(el){el.innerHTML=commText(COMM[slug]);el.classList.toggle('empty',!COMM[slug].n);}}
    summary();
  }catch(e){}
}
async function del(slug){ // remove this voter's whole row for a game
  const r=await sb('/funlab_ratings?game_slug=eq.'+encodeURIComponent(slug)+'&voter_id=eq.'+encodeURIComponent(VOTER),
    {method:'DELETE',headers:{Prefer:'return=minimal'}});
  if(!r.ok&&r.status!==404)throw new Error('delete '+r.status+' '+await r.text());
}
async function clearRating(slug,card){
  localStorage.removeItem(k(slug,'score'));localStorage.removeItem(k(slug,'note'));
  delete MINE[slug];
  card.querySelectorAll('.nums button').forEach(x=>x.classList.remove('on'));
  const note=card.querySelector('.note');if(note)note.value='';
  const cl=card.querySelector('.clear');if(cl)cl.style.display='none';
  try{await del(slug);await refreshComm(slug,card);}catch(e){netFail();}
}
function commText(c){return (c&&c.n)?`⭐ <b>${c.avg}</b> · ${c.n}명 평가`:'아직 평가 없음 — 첫 평가 남겨봐';}
function netFail(msg){
  document.getElementById('net').textContent=msg||'⚠ DB 연결 안 됨 — 점수·메모는 이 브라우저(localStorage)에만 저장됨.';}

const catCount={};GAMES.forEach(g=>catCount[g.cat]=(catCount[g.cat]||0)+1);
const cats=['전체',...[...new Set(GAMES.map(g=>g.cat))]];
cats.forEach(c=>{
  const b=document.createElement('button');
  b.innerHTML=`${c} <span class="cnt">${c==='전체'?GAMES.length:catCount[c]}</span>`;
  b.dataset.cat=c;
  if(c===filter)b.classList.add('on');
  b.onclick=()=>{filter=c;[...filtersEl.children].forEach(x=>x.classList.toggle('on',x.dataset.cat===c));render()};
  filtersEl.appendChild(b);
});

function render(){
  grid.innerHTML='';
  GAMES.filter(g=>filter==='전체'||g.cat===filter).forEach(g=>{
    const card=document.createElement('div');
    card.className='card'+(g.hero?' hero':'');
    const mine=MINE[g.slug]||{};
    const saved=(mine.score!=null)?mine.score:localStorage.getItem(k(g.slug,'score'));
    const note=(mine.note!=null)?mine.note:(localStorage.getItem(k(g.slug,'note'))||'');
    const c=COMM[g.slug];
    let nums='';
    for(let i=1;i<=10;i++) nums+=`<button data-n="${i}" class="${saved==i?'on':''}">${i}</button>`;
    card.innerHTML=`
      <div class="top"><h3>${g.title}</h3><span class="ref">${g.ref}</span></div>
      <div class="essence">${g.essence.replace(/\*(.+?)\*/g,'<b>$1</b>')}</div>
      <div class="nerve">${g.nerve}</div>
      <a class="play" href="games/${g.slug}/">▶ 플레이</a>
      <div class="score">
        <div class="comm${c&&c.n?'':' empty'}">${commText(c)}</div>
        <div class="lbl">재밌었나? (1 = 노잼, 10 = 이건 진짜)<span class="clear" style="display:${saved?'inline':'none'}">✕ 평가 지우기</span></div>
        <div class="nums">${nums}</div>
        <textarea class="note" placeholder="💭 한 줄 메모…">${note.replace(/</g,'&lt;')}</textarea>
      </div>`;
    card.querySelectorAll('.nums button').forEach(b=>b.onclick=async()=>{
      if(b.classList.contains('on')){await clearRating(g.slug,card);return;} // re-click selected -> clear
      const n=+b.dataset.n;
      localStorage.setItem(k(g.slug,'score'),n);
      card.querySelectorAll('.nums button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
      card.querySelector('.clear').style.display='inline';
      MINE[g.slug]=Object.assign({},MINE[g.slug],{score:n});
      try{await upsert(g.slug,{score:n});await refreshComm(g.slug,card);}  // score only — note goes through the Turnstile-gated Worker
      catch(e){netFail();}
    });
    card.querySelector('.clear').onclick=()=>clearRating(g.slug,card);
    card.querySelector('.note').onblur=async e=>{
      const noteVal=e.target.value;
      localStorage.setItem(k(g.slug,'note'),noteVal);
      const sc=MINE[g.slug]&&MINE[g.slug].score;
      if(sc==null)return;        // server needs a score row first; keep note local until then
      if(!TS_SITEKEY){           // Turnstile not configured yet — write note directly (pre-gating behavior)
        try{await upsert(g.slug,{score:sc,note:noteVal||null});if(MINE[g.slug])MINE[g.slug].note=noteVal;}catch(e){netFail();}
        return;
      }
      const token=await tsToken();
      if(!token){netFail('코멘트 확인 실패(Turnstile) — 잠시 후 다시 시도. 메모는 이 브라우저에 저장됨.');return;}
      try{
        const r=await fetch('/api/note',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({game_slug:g.slug,voter_id:VOTER,note:noteVal,token})});
        if(!r.ok)throw new Error('note '+r.status);
        if(MINE[g.slug])MINE[g.slug].note=noteVal;
      }catch(err){netFail();}
    };
    grid.appendChild(card);
  });
}
function summary(){
  const s=document.getElementById('summary');
  const rows=GAMES.map(g=>({g,c:COMM[g.slug]})).filter(r=>r.c&&r.c.n);
  if(!rows.length){s.textContent=`${GAMES.length}개 프로토타입 · 아직 평가 0개 — 플레이하고 점수를 남겨봐.`;return}
  const votes=rows.reduce((a,r)=>a+r.c.n,0);
  const top=rows.filter(r=>r.c.avg>=8).sort((a,b)=>b.c.avg-a.c.avg).map(r=>`${r.g.title}(${r.c.avg})`).join(' · ');
  s.innerHTML=`평가된 게임 <b>${rows.length}/${GAMES.length}</b> · 총 <b>${votes}</b>표${top?` · 🔥 top: ${top}`:''}`;
}

render();summary();                         // instant paint from localStorage
(async()=>{                                 // then enrich with community + server-side mine
  const [c,m]=await Promise.all([loadCommunity(),loadMine()]);
  if(c)COMM=c; if(m)MINE=m;
  if(c===null&&m===null)netFail();
  render();summary();
})();
</script>
