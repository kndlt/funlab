<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>야찌 · Yahtzee</title>
<style>
  :root{
    --bg:#14110d; --panel:#1d1812; --line:#3a3024;
    --cream:#f6ead8; --ink:#e7dcc8; --muted:#a9977e; --amber:#ffb154;
    --cell:#241c12;
  }
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:18px 16px 40px;
    -webkit-user-select:none; user-select:none;
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:10}
  .back:hover{color:var(--amber)}
  .stage{width:100%;max-width:440px;margin-top:30px;position:relative}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
  .title{font-size:30px;font-weight:800;line-height:1;
    background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title .ref{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:6px;letter-spacing:.4px}
  .scores{display:flex;gap:8px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 14px;text-align:center;min-width:74px}
  .box .lbl{font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .box .val{font-size:21px;font-weight:800;color:var(--cream);font-variant-numeric:tabular-nums}

  /* dice tray */
  .tray{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 12px 16px}
  .dice{display:flex;gap:9px;justify-content:center;margin-bottom:13px}
  .die{width:100%;max-width:62px;aspect-ratio:1/1;background:#efe3cf;border-radius:13px;
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    padding:11%;cursor:pointer;position:relative;border:2px solid transparent;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.12);transition:transform .08s}
  .die.empty{background:#241c12;border:2px dashed #4a3d2c;box-shadow:none}
  .die.held{border-color:var(--amber);box-shadow:0 0 0 2px rgba(255,177,84,.25),inset 0 -3px 0 rgba(0,0,0,.12)}
  .die.held::after{content:"HOLD";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
    font-size:8px;font-weight:800;letter-spacing:1px;color:var(--amber)}
  .die:active{transform:translateY(1px)}
  .die .pip{display:flex;align-items:center;justify-content:center}
  .die .pip i{width:64%;aspect-ratio:1/1;border-radius:50%;background:#2a2118;display:none}
  .die .pip.on i{display:block}

  .barline{display:flex;align-items:center;justify-content:space-between;margin:14px 0 0;gap:12px}
  .hint{font-size:12.5px;color:var(--muted)}
  .roll{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;font-weight:800;border:none;
    padding:10px 22px;border-radius:24px;font-size:15px;cursor:pointer;font-family:inherit;flex:1}
  .roll:active{transform:scale(.97)}
  .roll:disabled{background:#352b1f;color:#7c6d58;cursor:default}
  .restart{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;font-weight:800;border:none;
    padding:8px 18px;border-radius:22px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .restart:active{transform:scale(.96)}

  /* scorecard */
  .card{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:7px 7px 8px;display:flex;flex-direction:column;gap:2px}
  .col h3{font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:3px 6px 5px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:6px 7px;border-radius:8px;font-size:13px}
  .row .nm{color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .sc{font-variant-numeric:tabular-nums;font-weight:700;color:var(--muted);min-width:24px;text-align:right}
  .row.open{cursor:pointer}
  .row.open:hover{background:#2a2118}
  .row.preview .sc{color:var(--amber)}
  .row.zero .sc{color:#6c5d48}
  .row.done{background:#221a10}
  .row.done .nm{color:var(--muted)}
  .row.done .sc{color:var(--cream)}
  .sub{display:flex;align-items:center;justify-content:space-between;padding:6px 7px;margin-top:3px;
    border-top:1px solid var(--line);font-size:11.5px;color:var(--muted)}
  .sub b{color:var(--cream);font-variant-numeric:tabular-nums}
  .sub.bonus b{color:var(--amber)}

  .overlay{position:absolute;inset:-8px;border-radius:14px;background:rgba(20,17,13,.92);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5;
    text-align:center;padding:20px;animation:fade .25s ease}
  .overlay.show{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay .msg{font-size:24px;font-weight:800;color:var(--cream);line-height:1.5}
  .overlay .msg b{color:var(--amber)}
  .overlay .small{font-size:13px;color:var(--muted);max-width:280px}
  .foot{margin-top:16px;color:#7c6d58;font-size:12px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<a class="back" href="../../index.html">← funlab</a>

<div class="stage">
  <div class="head">
    <div class="title">야찌<span class="ref">굴려 족보를 채운다 — 한 번 더? · Yahtzee</span></div>
    <div class="scores">
      <div class="box"><div class="lbl">합계</div><div class="val" id="total">0</div></div>
      <div class="box"><div class="lbl">best</div><div class="val" id="best">0</div></div>
    </div>
  </div>

  <div class="tray">
    <div class="dice" id="dice"></div>
    <div class="barline">
      <div class="hint" id="hint">굴려서 시작</div>
      <button class="roll" id="roll">굴리기</button>
    </div>
  </div>

  <div class="card">
    <div class="col" id="upper"><h3>위쪽</h3></div>
    <div class="col" id="lower"><h3>아래쪽</h3></div>
  </div>

  <div class="barline" style="justify-content:flex-end">
    <button class="restart" id="restart">다시</button>
  </div>

  <div class="foot">주사위 5개, 13판. 굴릴 때마다 남길 주사위를 누르고 다시 굴려라. 각 족보는 단 한 번. 위쪽 63점 넘기면 보너스 +35.</div>

  <div class="overlay" id="overlay">
    <div class="msg" id="overMsg"></div>
    <div class="small" id="overSmall"></div>
    <button class="restart" id="overRestart">다시</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  const BEST_KEY = "funlab:yahtzee:best";

  // pip layout per face on a 3x3 grid (cell indices 0..8)
  const PIPS = {
    1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8],
    5:[0,2,4,6,8], 6:[0,2,3,5,6,8]
  };

  const UPPER = [
    {key:"ones",   name:"원 (1)",  face:1},
    {key:"twos",   name:"투 (2)",  face:2},
    {key:"threes", name:"쓰리 (3)", face:3},
    {key:"fours",  name:"포 (4)",  face:4},
    {key:"fives",  name:"파이브 (5)", face:5},
    {key:"sixes",  name:"식스 (6)", face:6},
  ];
  const LOWER = [
    {key:"three",     name:"트리플"},
    {key:"four",      name:"포카드"},
    {key:"full",      name:"풀하우스"},
    {key:"sstraight", name:"S 스트레이트"},
    {key:"lstraight", name:"L 스트레이트"},
    {key:"yahtzee",   name:"야찌"},
    {key:"chance",    name:"찬스"},
  ];

  // --- scoring ----------------------------------------------------------
  function counts(dice){
    const c = [0,0,0,0,0,0,0]; // index by face 1..6
    for(const d of dice) c[d]++;
    return c;
  }
  function sumAll(dice){ let s=0; for(const d of dice) s+=d; return s; }

  function scoreOf(key, dice){
    const c = counts(dice);
    const total = sumAll(dice);
    switch(key){
      case "ones":   return c[1]*1;
      case "twos":   return c[2]*2;
      case "threes": return c[3]*3;
      case "fours":  return c[4]*4;
      case "fives":  return c[5]*5;
      case "sixes":  return c[6]*6;
      case "three":  return c.some(n=>n>=3) ? total : 0;
      case "four":   return c.some(n=>n>=4) ? total : 0;
      case "full":{
        // a face with 3 and a (different) face with 2; five-of-a-kind also counts
        const has3 = c.indexOf(3), has2 = c.indexOf(2);
        if(has3>0 && has2>0) return 25;
        if(c.indexOf(5) > 0) return 25; // five of a kind = full house
        return 0;
      }
      case "sstraight": return hasRun(c, 4) ? 30 : 0;
      case "lstraight": return hasRun(c, 5) ? 40 : 0;
      case "yahtzee":   return c.some(n=>n>=5) ? 50 : 0;
      case "chance":    return total;
    }
    return 0;
  }
  // longest run of consecutive present faces >= need
  function hasRun(c, need){
    let run = 0;
    for(let f=1; f<=6; f++){
      if(c[f] > 0){ run++; if(run>=need) return true; }
      else run = 0;
    }
    return false;
  }

  // --- DOM refs ---------------------------------------------------------
  const diceEl   = document.getElementById("dice");
  const rollBtn  = document.getElementById("roll");
  const hintEl   = document.getElementById("hint");
  const totalEl  = document.getElementById("total");
  const bestEl   = document.getElementById("best");
  const upperEl  = document.getElementById("upper");
  const lowerEl  = document.getElementById("lower");
  const overlay  = document.getElementById("overlay");
  const overMsg  = document.getElementById("overMsg");
  const overSmall= document.getElementById("overSmall");

  // build 5 dice DOM (each: 9 pip cells)
  const dieEls = [];
  for(let i=0;i<5;i++){
    const d = document.createElement("div");
    d.className = "die empty";
    for(let p=0;p<9;p++){
      const cell = document.createElement("div");
      cell.className = "pip";
      const dot = document.createElement("i");
      cell.appendChild(dot);
      d.appendChild(cell);
    }
    const idx = i;
    d.addEventListener("click", ()=> toggleHold(idx));
    diceEl.appendChild(d);
    dieEls.push(d);
  }

  // build scorecard rows
  const rowEls = {}; // key -> row element
  function buildRows(list, container){
    for(const cat of list){
      const r = document.createElement("div");
      r.className = "row";
      r.innerHTML = `<span class="nm">${cat.name}</span><span class="sc"></span>`;
      r.addEventListener("click", ()=> chooseRow(cat.key));
      container.appendChild(r);
      rowEls[cat.key] = r;
    }
  }
  buildRows(UPPER, upperEl);
  buildRows(LOWER, lowerEl);

  // subtotal / bonus / total rows for upper column
  const upSub = document.createElement("div");
  upSub.className = "sub"; upSub.innerHTML = `소계 <b id="upSub">0</b>`;
  const upBonus = document.createElement("div");
  upBonus.className = "sub bonus"; upBonus.innerHTML = `보너스 <b id="upBonus">0</b>`;
  upperEl.appendChild(upSub); upperEl.appendChild(upBonus);
  const lowSub = document.createElement("div");
  lowSub.className = "sub"; lowSub.innerHTML = `소계 <b id="lowSub">0</b>`;
  lowerEl.appendChild(lowSub);
  const upSubEl   = document.getElementById("upSub");
  const upBonusEl = document.getElementById("upBonus");
  const lowSubEl  = document.getElementById("lowSub");

  // --- state ------------------------------------------------------------
  let dice;          // [5] current face values
  let held;          // [5] bool
  let rollsLeft;     // rolls remaining this round
  let rolled;        // dice have been rolled at least once this round
  let scored;        // key -> recorded number
  let filledCount;   // how many categories recorded
  let best;
  let animating;

  best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0;

  function newGame(){
    dice = [1,1,1,1,1];
    held = [false,false,false,false,false];
    rollsLeft = 3;
    rolled = false;
    scored = {};
    filledCount = 0;
    animating = false;
    overlay.classList.remove("show");
    for(let i=0;i<5;i++){ dieEls[i].classList.add("empty"); dieEls[i].classList.remove("held"); }
    render();
  }

  function renderDie(i){
    const el = dieEls[i];
    const on = new Set(PIPS[dice[i]] || []);
    const cells = el.children;
    for(let p=0;p<9;p++){
      cells[p].classList.toggle("on", on.has(p));
    }
  }

  function toggleHold(i){
    if(animating || !rolled || rollsLeft === 0) return;
    held[i] = !held[i];
    dieEls[i].classList.toggle("held", held[i]);
  }

  function roll(){
    if(animating || rollsLeft === 0) return;
    animating = true;
    rollBtn.disabled = true;
    const targets = dice.slice();
    for(let i=0;i<5;i++){
      if(!rolled || !held[i]) targets[i] = 1 + ((Math.random()*6)|0);
    }
    if(!rolled){
      for(let i=0;i<5;i++) dieEls[i].classList.remove("empty");
    }
    // animate: shuffle free dice faces for a short while, then settle
    const start = performance.now();
    const DUR = 460;
    function tumble(now){
      const t = now - start;
      for(let i=0;i<5;i++){
        if(rolled && held[i]) continue;
        dice[i] = 1 + ((Math.random()*6)|0);
        renderDie(i);
      }
      if(t < DUR){
        requestAnimationFrame(tumble);
      } else {
        for(let i=0;i<5;i++){ dice[i] = targets[i]; renderDie(i); }
        rolled = true;
        rollsLeft--;
        animating = false;
        render();
      }
    }
    requestAnimationFrame(tumble);
  }

  function chooseRow(key){
    if(animating || !rolled || (key in scored)) return;
    const val = scoreOf(key, dice);
    scored[key] = val;
    filledCount++;
    // next round
    rollsLeft = 3;
    rolled = false;
    held = [false,false,false,false,false];
    for(let i=0;i<5;i++){ dieEls[i].classList.add("empty"); dieEls[i].classList.remove("held"); }
    render();
    if(filledCount >= UPPER.length + LOWER.length) gameOver();
  }

  function upperSubtotal(){
    let s = 0;
    for(const cat of UPPER) if(cat.key in scored) s += scored[cat.key];
    return s;
  }
  function bonus(){ return upperSubtotal() >= 63 ? 35 : 0; }
  function lowerSubtotal(){
    let s = 0;
    for(const cat of LOWER) if(cat.key in scored) s += scored[cat.key];
    return s;
  }
  function grandTotal(){ return upperSubtotal() + bonus() + lowerSubtotal(); }

  function render(){
    // dice
    for(let i=0;i<5;i++){
      if(!rolled && !(dice && dieEls[i] && !dieEls[i].classList.contains("empty"))){
        // keep empty look until first roll of round
      }
      renderDie(i);
    }

    // roll button + hint
    if(rollsLeft === 0){
      rollBtn.disabled = true;
      rollBtn.textContent = "족보 선택";
    } else {
      rollBtn.disabled = animating;
      rollBtn.textContent = rolled ? `다시 굴리기 · ${rollsLeft}` : `굴리기 · ${rollsLeft}`;
    }
    const round = filledCount + 1;
    if(filledCount >= 13){
      hintEl.textContent = "끝";
    } else if(!rolled){
      hintEl.textContent = `${round}판 / 13 · 굴려라`;
    } else if(rollsLeft > 0){
      hintEl.textContent = `${round}판 · 남길 주사위를 눌러라`;
    } else {
      hintEl.textContent = `${round}판 · 채울 족보를 눌러라`;
    }

    // scorecard rows
    const all = UPPER.concat(LOWER);
    for(const cat of all){
      const r = rowEls[cat.key];
      r.className = "row";
      const sc = r.querySelector(".sc");
      if(cat.key in scored){
        r.classList.add("done");
        sc.textContent = scored[cat.key];
      } else if(rolled){
        const v = scoreOf(cat.key, dice);
        r.classList.add("open", "preview");
        if(v === 0) r.classList.add("zero");
        sc.textContent = v;
      } else {
        sc.textContent = "·";
      }
    }

    // totals
    const us = upperSubtotal(), bn = bonus();
    upSubEl.textContent = us;
    upBonusEl.textContent = bn ? ("+"+bn) : `${us}/63`;
    lowSubEl.textContent = lowerSubtotal();
    totalEl.textContent = grandTotal();
    bestEl.textContent = best;
  }

  function gameOver(){
    const t = grandTotal();
    let beaten = false;
    if(t > best){ best = t; localStorage.setItem(BEST_KEY, String(best)); beaten = true; }
    bestEl.textContent = best;
    overMsg.innerHTML = `게임 끝 · 합계 <b>${t}</b>`;
    overSmall.textContent = beaten
      ? "최고 기록 경신! 한 번 더?"
      : (bonus() ? "보너스까지 챙겼다. 다시?" : "보너스는 다음에. 다시?");
    overlay.classList.add("show");
  }

  rollBtn.addEventListener("click", roll);
  document.getElementById("restart").addEventListener("click", newGame);
  document.getElementById("overRestart").addEventListener("click", newGame);

  newGame();
})();
</script>
</body>
</html>
