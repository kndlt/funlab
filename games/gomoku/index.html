<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>오목 · Gomoku</title>
<style>
  :root{
    --bg:#14110d; --panel:#1d1812; --line:#3a3024;
    --cream:#f6ead8; --ink:#e7dcc8; --muted:#a9977e; --amber:#ffb154;
    --wood:#2a2014; --grid:#5a4226;
  }
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:18px 16px 40px;
    -webkit-user-select:none; user-select:none;
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:10}
  .back:hover{color:var(--amber)}
  .stage{width:100%;max-width:440px;margin-top:30px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
  .title{font-size:30px;font-weight:800;line-height:1;
    background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title .ref{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:6px;letter-spacing:.4px}
  .scores{display:flex;gap:8px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 14px;text-align:center;min-width:74px}
  .box .lbl{font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .box .val{font-size:21px;font-weight:800;color:var(--cream);font-variant-numeric:tabular-nums}
  .barline{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
  .hint{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .dot{width:13px;height:13px;border-radius:50%;display:inline-block;flex:0 0 auto}
  .dot.me{background:radial-gradient(circle at 35% 30%,#7a6038,#15110b)}
  .dot.ai{background:radial-gradient(circle at 35% 30%,#fffaf0,#d3c2a4)}
  .restart{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;font-weight:800;border:none;
    padding:8px 18px;border-radius:22px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .restart:active{transform:scale(.96)}
  .board{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:100%;aspect-ratio:1/1;overflow:hidden}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:pointer}
  .overlay{position:absolute;inset:0;border-radius:14px;background:rgba(20,17,13,.86);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5;
    text-align:center;padding:20px;animation:fade .25s ease}
  .overlay.show{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay .msg{font-size:22px;font-weight:800;color:var(--cream);line-height:1.5}
  .overlay .msg b{color:var(--amber)}
  .overlay .small{font-size:13px;color:var(--muted);max-width:280px}
  .foot{margin-top:14px;color:#7c6d58;font-size:12px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<a class="back" href="../../index.html">← funlab</a>

<div class="stage">
  <div class="head">
    <div class="title">오목<span class="ref">다섯 개를 먼저 나란히 놓는다 · Gomoku</span></div>
    <div class="scores">
      <div class="box"><div class="lbl">연승</div><div class="val" id="streak">0</div></div>
      <div class="box"><div class="lbl">best</div><div class="val" id="best">0</div></div>
    </div>
  </div>

  <div class="barline">
    <div class="hint" id="hint"><span class="dot me"></span> 당신 차례</div>
    <button class="restart" id="restart">다시</button>
  </div>

  <div class="board" id="board">
    <canvas id="cv"></canvas>
    <div class="overlay" id="overlay">
      <div class="msg" id="overMsg"></div>
      <div class="small" id="overSmall"></div>
      <button class="restart" id="overRestart">다시</button>
    </div>
  </div>

  <div class="foot">당신은 흑, 먼저 둔다. 다섯을 나란히 잇는 쪽이 이긴다. AI는 막고, 노린다.</div>
</div>

<script>
(function(){
  "use strict";

  const N = 15;                       // 15 x 15 intersections
  const EMPTY = 0, ME = 1, AI = 2;    // ME = player (black/amber), AI = white/cream
  const BEST_KEY = "funlab:gomoku:best";

  // pattern values (offense/defense heuristic)
  const WIN        = 10000000;
  const OPEN_FOUR  = 500000;          // four open both ends -> wins next
  const FOUR       = 50000;           // four, one open end -> forces a block
  const OPEN_THREE = 40000;           // three open both ends -> forces a response
  const THREE      = 2000;
  const OPEN_TWO   = 1000;
  const TWO        = 200;

  const DIRS = [[1,0],[0,1],[1,1],[1,-1]];

  const boardEl  = document.getElementById("board");
  const cv       = document.getElementById("cv");
  const ctx      = cv.getContext("2d");
  const streakEl = document.getElementById("streak");
  const bestEl   = document.getElementById("best");
  const hintEl   = document.getElementById("hint");
  const overlay  = document.getElementById("overlay");
  const overMsg  = document.getElementById("overMsg");
  const overSmall= document.getElementById("overSmall");

  // --- geometry (retina aware) ------------------------------------------
  let SIZE = 0, margin = 0, spacing = 0, stoneR = 0;
  function resize(){
    const rect = boardEl.getBoundingClientRect();
    const dpr  = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    SIZE = Math.round(rect.width * dpr);
    cv.width = SIZE; cv.height = SIZE;
    margin  = SIZE * 0.055;
    spacing = (SIZE - 2*margin) / (N - 1);
    stoneR  = spacing * 0.43;
    draw();
  }
  window.addEventListener("resize", resize);

  // --- state ------------------------------------------------------------
  let board;        // Int8Array N*N
  let turn;         // ME | AI | 0 (AI thinking / locked)
  let state;        // 'playing' | 'over'
  let last = null;  // {x,y} last placed stone
  let hover = null; // {x,y} ghost preview
  let streak = 0;
  let best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0;

  function idx(x,y){ return y*N + x; }
  function inB(x,y){ return x>=0 && y>=0 && x<N && y<N; }

  function init(){
    board = new Int8Array(N*N);
    turn = ME;
    state = "playing";
    last = null; hover = null;
    overlay.classList.remove("show");
    setHint();
    updateScores();
    resize();
  }

  function updateScores(){
    streakEl.textContent = streak;
    bestEl.textContent = best;
  }

  function setHint(){
    if(state === "over"){ return; }
    if(turn === ME) hintEl.innerHTML = '<span class="dot me"></span> 당신 차례';
    else            hintEl.innerHTML = '<span class="dot ai"></span> AI 생각 중…';
  }

  // --- win / line scan --------------------------------------------------
  function checkWin(b, x, y, color){
    for(const [dx,dy] of DIRS){
      let c = 1;
      for(let s=1; inB(x+dx*s,y+dy*s) && b[idx(x+dx*s,y+dy*s)]===color; s++) c++;
      for(let s=1; inB(x-dx*s,y-dy*s) && b[idx(x-dx*s,y-dy*s)]===color; s++) c++;
      if(c >= 5) return true;
    }
    return false;
  }

  // value of placing `color` at empty (x,y) — summed over 4 directions.
  function evalPoint(b, x, y, color){
    let total = 0;
    for(const [dx,dy] of DIRS){
      let count = 1, openA = false, openB = false;
      let s = 1;
      for(; inB(x+dx*s,y+dy*s) && b[idx(x+dx*s,y+dy*s)]===color; s++) count++;
      if(inB(x+dx*s,y+dy*s) && b[idx(x+dx*s,y+dy*s)]===EMPTY) openA = true;
      s = 1;
      for(; inB(x-dx*s,y-dy*s) && b[idx(x-dx*s,y-dy*s)]===color; s++) count++;
      if(inB(x-dx*s,y-dy*s) && b[idx(x-dx*s,y-dy*s)]===EMPTY) openB = true;
      const ends = (openA?1:0) + (openB?1:0);
      total += scoreFor(count, ends);
    }
    return total;
  }

  function scoreFor(count, ends){
    if(count >= 5) return WIN;
    if(count === 4) return ends >= 2 ? OPEN_FOUR : ends === 1 ? FOUR : 0;
    if(count === 3) return ends >= 2 ? OPEN_THREE : ends === 1 ? THREE : 0;
    if(count === 2) return ends >= 2 ? OPEN_TWO : ends === 1 ? TWO : 0;
    if(count === 1) return ends >= 2 ? 2 : 0;
    return 0;
  }

  // empty cells within Chebyshev distance 2 of an existing stone
  function candidates(b){
    const seen = new Set(), out = [];
    let any = false;
    for(let y=0;y<N;y++) for(let x=0;x<N;x++){
      if(b[idx(x,y)] === EMPTY) continue;
      any = true;
      for(let dy=-2;dy<=2;dy++) for(let dx=-2;dx<=2;dx++){
        const nx=x+dx, ny=y+dy;
        if(!inB(nx,ny) || b[idx(nx,ny)]!==EMPTY) continue;
        const k = idx(nx,ny);
        if(!seen.has(k)){ seen.add(k); out.push({x:nx,y:ny}); }
      }
    }
    if(!any){ const c=(N>>1); return [{x:c,y:c}]; }
    return out;
  }

  function centerBias(x,y){
    const c = N>>1;
    return (N - (Math.abs(x-c)+Math.abs(y-c))) * 4;
  }

  // --- AI ---------------------------------------------------------------
  function aiMove(){
    const cands = candidates(board);

    // 1) immediate win, 2) must-block opponent's five
    let winMove = null, blockMove = null, blockVal = -1;
    const scored = [];
    for(const c of cands){
      const my  = evalPoint(board, c.x, c.y, AI);
      const opp = evalPoint(board, c.x, c.y, ME);
      if(my  >= WIN && !winMove) winMove = c;
      if(opp >= WIN && opp > blockVal){ blockVal = opp; blockMove = c; }
      scored.push({c, my, opp, stat: my + opp*0.9 + centerBias(c.x,c.y) + Math.random()*40});
    }
    if(winMove)  return place(winMove.x, winMove.y, AI);
    if(blockMove) return place(blockMove.x, blockMove.y, AI);

    // 3) static ranking, then a light 2-ply check on the top candidates so
    //    the AI doesn't hand the player a free fork.
    scored.sort((a,b)=> b.stat - a.stat);
    const K = Math.min(8, scored.length);
    let bestC = scored[0].c, bestScore = -Infinity;
    for(let i=0;i<K;i++){
      const s = scored[i];
      board[idx(s.c.x,s.c.y)] = AI;                 // try it
      let oppBest = 0;
      const reply = candidates(board);
      for(const r of reply){
        const v = evalPoint(board, r.x, r.y, ME);   // player's best counter
        if(v > oppBest) oppBest = v;
      }
      board[idx(s.c.x,s.c.y)] = EMPTY;              // undo
      const final = s.stat - 0.6 * oppBest;
      if(final > bestScore){ bestScore = final; bestC = s.c; }
    }
    place(bestC.x, bestC.y, AI);
  }

  // --- move application -------------------------------------------------
  function place(x, y, color){
    board[idx(x,y)] = color;
    last = {x,y};
    draw();
    if(checkWin(board, x, y, color)){ finish(color); return; }
    if(isFull()){ finish(0); return; }
    if(color === ME){
      turn = 0; setHint();
      setTimeout(aiMove, 340);
    } else {
      turn = ME; setHint();
    }
  }

  function isFull(){
    for(let i=0;i<board.length;i++) if(board[i]===EMPTY) return false;
    return true;
  }

  function finish(winner){
    state = "over";
    turn = 0;
    if(winner === ME){
      streak += 1;
      if(streak > best){ best = streak; localStorage.setItem(BEST_KEY, String(best)); }
      overMsg.innerHTML = `승리 · <b>${streak}</b>연승`;
      overSmall.textContent = streak >= best && streak > 0 ? "최고 연승 경신. 더 가자." : "다섯을 이었다. 다음 판.";
    } else if(winner === AI){
      streak = 0;
      overMsg.innerHTML = `패배 · 연승 <b>끊김</b>`;
      overSmall.textContent = "AI가 다섯을 이었다. 다시.";
    } else {
      overMsg.innerHTML = `무승부`;
      overSmall.textContent = "판이 가득 찼다. 비겼다.";
    }
    updateScores();
    overlay.classList.add("show");
  }

  // --- rendering --------------------------------------------------------
  function gx(c){ return margin + c * spacing; }

  function draw(){
    ctx.clearRect(0,0,SIZE,SIZE);

    // wood board with a soft grain
    const g = ctx.createLinearGradient(0,0,SIZE,SIZE);
    g.addColorStop(0, "#322615");
    g.addColorStop(0.5, "#271d11");
    g.addColorStop(1, "#332817");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,SIZE,SIZE);

    // grid lines
    ctx.strokeStyle = "rgba(120,90,52,0.75)";
    ctx.lineWidth = Math.max(1, spacing*0.025);
    ctx.beginPath();
    for(let i=0;i<N;i++){
      const p = Math.round(gx(i)) + 0.5;
      ctx.moveTo(gx(0), p); ctx.lineTo(gx(N-1), p);
      ctx.moveTo(p, gx(0)); ctx.lineTo(p, gx(N-1));
    }
    ctx.stroke();

    // star points (hoshi): corners + center
    const star = [[3,3],[3,11],[11,3],[11,11],[7,7]];
    ctx.fillStyle = "rgba(120,90,52,0.95)";
    for(const [sx,sy] of star){
      ctx.beginPath();
      ctx.arc(gx(sx), gx(sy), spacing*0.07, 0, Math.PI*2);
      ctx.fill();
    }

    // hover ghost (player turn only, empty cell)
    if(hover && turn === ME && state === "playing" && board[idx(hover.x,hover.y)]===EMPTY){
      drawStone(hover.x, hover.y, ME, 0.34);
    }

    // stones
    for(let y=0;y<N;y++) for(let x=0;x<N;x++){
      const v = board[idx(x,y)];
      if(v !== EMPTY) drawStone(x, y, v, 1);
    }

    // last move marker
    if(last){
      const v = board[idx(last.x,last.y)];
      const cx = gx(last.x), cy = gx(last.y);
      ctx.strokeStyle = v === ME ? "#ffb154" : "#3a2a14";
      ctx.lineWidth = Math.max(1.5, spacing*0.05);
      ctx.beginPath();
      ctx.arc(cx, cy, stoneR*0.34, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  function drawStone(x, y, color, alpha){
    const cx = gx(x), cy = gx(y), r = stoneR;
    ctx.save();
    ctx.globalAlpha = alpha;
    // soft shadow
    if(alpha >= 1){
      ctx.beginPath();
      ctx.arc(cx + r*0.10, cy + r*0.14, r, 0, Math.PI*2);
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fill();
    }
    const g = ctx.createRadialGradient(cx - r*0.35, cy - r*0.4, r*0.15, cx, cy, r);
    if(color === ME){               // player: dark amber-ebony
      g.addColorStop(0, "#8a6c40");
      g.addColorStop(0.45, "#3a2c1a");
      g.addColorStop(1, "#13100a");
    } else {                        // AI: cream / white
      g.addColorStop(0, "#fffdf7");
      g.addColorStop(0.6, "#f3e7d0");
      g.addColorStop(1, "#cdbb9b");
    }
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }

  // --- input ------------------------------------------------------------
  function eventCell(clientX, clientY){
    const rect = cv.getBoundingClientRect();
    const x = (clientX - rect.left) * (cv.width  / rect.width);
    const y = (clientY - rect.top ) * (cv.height / rect.height);
    const col = Math.round((x - margin) / spacing);
    const row = Math.round((y - margin) / spacing);
    if(!inB(col,row)) return null;
    // require the tap to be reasonably close to the intersection
    const dx = x - gx(col), dy = y - gx(row);
    if(Math.hypot(dx,dy) > spacing*0.5) return null;
    return {x:col, y:row};
  }

  function tryPlay(clientX, clientY){
    if(state !== "playing" || turn !== ME) return;
    const c = eventCell(clientX, clientY);
    if(!c || board[idx(c.x,c.y)] !== EMPTY) return;
    place(c.x, c.y, ME);
  }

  cv.addEventListener("click", e=> tryPlay(e.clientX, e.clientY));

  cv.addEventListener("mousemove", e=>{
    if(turn !== ME || state !== "playing"){ if(hover){ hover=null; draw(); } return; }
    const c = eventCell(e.clientX, e.clientY);
    const same = c && hover && c.x===hover.x && c.y===hover.y;
    if(same) return;
    hover = c; draw();
  });
  cv.addEventListener("mouseleave", ()=>{ if(hover){ hover=null; draw(); } });

  // touch: tap to place (no scroll hijack beyond the board)
  cv.addEventListener("touchstart", e=>{
    if(e.touches.length !== 1) return;
    e.preventDefault();
    const t = e.touches[0];
    tryPlay(t.clientX, t.clientY);
  }, {passive:false});

  document.getElementById("restart").addEventListener("click", init);
  document.getElementById("overRestart").addEventListener("click", init);

  init();
})();
</script>
</body>
</html>
