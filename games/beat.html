<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>비트 메이커 · funlab</title>
<style>
  :root{
    --bg:#14110d;--panel:#1d1812;--line:#3a3024;--cream:#f6ead8;--ink:#e7dcc8;
    --muted:#a9977e;--amber:#ffb154;--gold:#ffd479
  }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;line-height:1.5;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    min-height:100%;-webkit-tap-highlight-color:transparent;overflow-x:hidden
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:20}
  .back:hover{color:var(--ink)}
  .wrap{max-width:620px;margin:0 auto;padding:54px 16px 60px;display:flex;flex-direction:column;gap:16px}
  .head{text-align:center}
  h1{font-size:27px;font-weight:800;background:linear-gradient(#fff3df,#ffcf8a);
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:12.5px;margin-top:4px}

  /* sequencer */
  .seq{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px 12px;overflow:hidden}
  .grid{display:grid;grid-template-columns:58px repeat(16,1fr);gap:5px;align-items:center;
        touch-action:manipulation}
  .ind{height:9px;border-radius:4px;background:#241c12;border:1px solid var(--line)}
  .ind.beat{background:#2c2316}
  .ind.playcol{background:var(--amber);box-shadow:0 0 10px rgba(255,177,84,.7)}
  .ind.spacer{background:none;border:none}
  .gap{margin-left:7px}

  .rowlbl{font-size:12px;font-weight:800;color:var(--accent,var(--ink));text-align:right;
          padding-right:4px;white-space:nowrap;user-select:none}
  .cell{
    aspect-ratio:1/1;border-radius:7px;background:#241c12;border:1px solid var(--line);
    cursor:pointer;position:relative;transition:transform .05s,background .08s,box-shadow .12s;
    min-height:22px
  }
  .cell:hover{border-color:#7a5a30}
  .cell:active{transform:scale(.9)}
  .cell.on{
    background:var(--accent);border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(0,0,0,.2) inset, 0 0 9px -1px var(--accent)
  }
  .cell.playcol:not(.on){background:#33291a}
  .cell.on.playcol{filter:brightness(1.18)}
  .cell.hit{animation:hit .28s ease}
  @keyframes hit{0%{transform:scale(1.22);box-shadow:0 0 16px 2px var(--accent)}100%{transform:none}}

  /* transport */
  .transport{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  button.ctl{border:none;border-radius:24px;padding:13px 16px;font-family:inherit;font-size:15px;
    font-weight:800;cursor:pointer;transition:transform .08s,filter .15s}
  button.ctl:active{transform:scale(.95)}
  .play{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;min-width:96px}
  .play:hover{filter:brightness(1.06)}
  .play.playing{background:linear-gradient(#3a2c18,#2a2013);color:var(--amber);border:1px solid #6a4d22}
  .ghost{background:linear-gradient(#2a2013,#211a11);color:var(--muted);border:1px solid var(--line)}
  .ghost:hover{filter:brightness(1.2);color:var(--cream)}

  .tempo{flex:1;min-width:200px;background:#191309;border:1px solid var(--line);border-radius:14px;
         padding:9px 14px;display:flex;flex-direction:column;gap:5px}
  .tempo .tl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted)}
  .tempo .tl b{color:var(--gold);font-variant-numeric:tabular-nums;font-size:14px}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:5px;
    background:#3a3024;outline:none;margin:3px 0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:var(--amber);cursor:pointer;border:2px solid #3a230a;box-shadow:0 0 8px rgba(255,177,84,.5)}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--amber);
    cursor:pointer;border:2px solid #3a230a}

  .row2{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .presets{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .presets .pl{font-size:11.5px;color:var(--muted)}
  .chip{background:#241c12;border:1px solid var(--line);color:var(--ink);border-radius:18px;
    padding:7px 13px;font-size:12.5px;font-family:inherit;font-weight:700;cursor:pointer}
  .chip:hover{border-color:#7a5a30;color:var(--cream)}
  .spacer-grow{flex:1}

  .hint{text-align:center;color:#7c6d58;font-size:11px}
  @media(max-width:480px){
    .grid{grid-template-columns:44px repeat(16,1fr);gap:3px}
    .rowlbl{font-size:10.5px}
    .cell{border-radius:5px;min-height:16px}
    .gap{margin-left:4px}
  }
</style>
</head>
<body>
<a class="back" href="../index.html">← funlab</a>

<div class="wrap">
  <div class="head">
    <h1>비트 메이커</h1>
    <div class="sub">칸을 켜면 루프가 연주된다 — 몇 초 만에 그루브를 만든다</div>
  </div>

  <div class="seq" id="seq"></div>

  <div class="transport">
    <button class="ctl play" id="playBtn">▶ 재생</button>
    <button class="ctl ghost" id="clearBtn">비우기</button>
    <div class="tempo">
      <div class="tl"><span>템포</span><b><span id="bpmVal">120</span> BPM</b></div>
      <input type="range" id="bpm" min="70" max="180" value="120" step="1">
    </div>
  </div>

  <div class="row2">
    <div class="presets">
      <span class="pl">프리셋:</span>
      <button class="chip" data-preset="four">🪩 four-on-floor</button>
      <button class="chip" data-preset="boom">🎧 boom bap</button>
      <button class="chip" data-preset="house">🏠 house</button>
    </div>
    <span class="spacer-grow"></span>
    <div class="tempo" style="flex:0 0 auto;min-width:150px;padding:7px 12px">
      <div class="tl"><span>스윙</span><b><span id="swingVal">0</span>%</b></div>
      <input type="range" id="swing" min="0" max="60" value="0" step="1">
    </div>
  </div>

  <div class="hint">칸 클릭 = 토글 · Space = 재생/정지 · 패턴과 템포는 이 브라우저에 저장돼</div>
</div>

<script>
(function(){
  "use strict";
  const $=id=>document.getElementById(id);
  const STEPS=16;
  const ROWS=[
    {name:'킥',     key:'kick',  accent:'#ff8a5c'},
    {name:'스네어', key:'snare', accent:'#ffd479'},
    {name:'하이햇', key:'hihat', accent:'#9fd49a'},
    {name:'클랩',   key:'clap',  accent:'#7fc4ff'},
    {name:'베이스', key:'bass',  accent:'#c79bff'},
  ];
  const K_PAT='funlab:beat:pattern', K_BPM='funlab:beat:bpm', K_SWING='funlab:beat:swing';

  // ---------- presets (16-step rows) ----------
  function P(str){ return str.replace(/[^01]/g,'').split('').map(c=>c==='1'); }
  const PRESETS={
    four:[ // four-on-the-floor
      P('1000 1000 1000 1000'), // kick
      P('0000 1000 0000 1000'), // snare
      P('0010 0010 0010 0010'), // hihat (off-beat)
      P('0000 0000 0000 0000'), // clap
      P('1000 0010 1000 0010'), // bass
    ],
    boom:[ // boom bap
      P('1000 0000 0010 0000'),
      P('0000 1000 0000 1000'),
      P('1010 1010 1010 1010'),
      P('0000 1000 0000 1000'),
      P('1000 0000 0010 0100'),
    ],
    house:[ // classic house
      P('1000 1000 1000 1000'),
      P('0000 0000 0000 0000'),
      P('0010 0010 0010 0011'),
      P('0000 1000 0000 1000'),
      P('1001 0010 1001 0010'),
    ],
  };

  // ---------- pattern state ----------
  function emptyPattern(){ return ROWS.map(()=>new Array(STEPS).fill(false)); }
  let pattern = loadPattern();
  let bpm = clampBpm(+(localStorage.getItem(K_BPM))||120);
  let swing = Math.min(60,Math.max(0,+(localStorage.getItem(K_SWING))||0));

  function clampBpm(v){ return Math.min(180,Math.max(70,v||120)); }
  function loadPattern(){
    try{
      const raw=JSON.parse(localStorage.getItem(K_PAT));
      if(Array.isArray(raw)&&raw.length===ROWS.length&&raw.every(r=>Array.isArray(r)&&r.length===STEPS))
        return raw.map(r=>r.map(Boolean));
    }catch(e){}
    return PRESETS.four.map(r=>r.slice());
  }
  function savePattern(){ localStorage.setItem(K_PAT,JSON.stringify(pattern.map(r=>r.map(v=>v?1:0)))); }

  // ---------- build grid ----------
  const seq=$('seq');
  const grid=document.createElement('div'); grid.className='grid'; seq.appendChild(grid);
  const indCells=[];
  const cells=ROWS.map(()=>new Array(STEPS));

  // indicator strip: leading spacer + 16 dots
  const sp=document.createElement('div'); sp.className='ind spacer'; grid.appendChild(sp);
  for(let c=0;c<STEPS;c++){
    const d=document.createElement('div');
    d.className='ind'+(c%4===0?' beat':'')+(c%4===0&&c>0?' gap':'');
    grid.appendChild(d); indCells.push(d);
  }
  // instrument rows
  ROWS.forEach((row,r)=>{
    const lbl=document.createElement('div');
    lbl.className='rowlbl'; lbl.textContent=row.name; lbl.style.setProperty('--accent',row.accent);
    grid.appendChild(lbl);
    for(let c=0;c<STEPS;c++){
      const cell=document.createElement('div');
      cell.className='cell'+(c%4===0&&c>0?' gap':'');
      cell.style.setProperty('--accent',row.accent);
      cell.addEventListener('pointerdown',e=>{e.preventDefault();toggle(r,c);});
      grid.appendChild(cell); cells[r][c]=cell;
    }
  });
  function paint(){
    for(let r=0;r<ROWS.length;r++)for(let c=0;c<STEPS;c++)
      cells[r][c].classList.toggle('on',!!pattern[r][c]);
  }
  function toggle(r,c){
    pattern[r][c]=!pattern[r][c];
    cells[r][c].classList.toggle('on',pattern[r][c]);
    savePattern();
    // immediate feedback: if turning on while playing isn't current beat, give a tiny audition
    if(pattern[r][c] && (!playing)) audition(r);
  }

  // ---------- audio engine ----------
  let ac=null, master=null, noiseBuf=null;
  function ensureAudio(){
    if(ac) { if(ac.state==='suspended') ac.resume(); return; }
    const AC=window.AudioContext||window.webkitAudioContext;
    ac=new AC();
    const comp=ac.createDynamicsCompressor();
    comp.threshold.value=-10; comp.knee.value=18; comp.ratio.value=4;
    comp.attack.value=0.003; comp.release.value=0.2;
    master=ac.createGain(); master.gain.value=0.85;
    master.connect(comp); comp.connect(ac.destination);
    // shared white-noise buffer (1s)
    const len=ac.sampleRate;
    noiseBuf=ac.createBuffer(1,len,ac.sampleRate);
    const data=noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) data[i]=Math.random()*2-1;
  }
  function noiseSource(){ const s=ac.createBufferSource(); s.buffer=noiseBuf; return s; }

  // --- synth voices (all take an absolute AudioContext time) ---
  function kick(t){
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(150,t);
    o.frequency.exponentialRampToValueAtTime(45,t+0.13);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(1.0,t+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.42);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+0.45);
  }
  function snare(t){
    const n=noiseSource(), hp=ac.createBiquadFilter(), ng=ac.createGain();
    hp.type='highpass'; hp.frequency.value=1200;
    ng.gain.setValueAtTime(0.6,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    n.connect(hp); hp.connect(ng); ng.connect(master);
    n.start(t); n.stop(t+0.2);
    const o=ac.createOscillator(), og=ac.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(190,t);
    o.frequency.exponentialRampToValueAtTime(150,t+0.1);
    og.gain.setValueAtTime(0.45,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.11);
    o.connect(og); og.connect(master);
    o.start(t); o.stop(t+0.12);
  }
  function hihat(t){
    const n=noiseSource(), hp=ac.createBiquadFilter(), g=ac.createGain();
    hp.type='highpass'; hp.frequency.value=7500;
    g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.045);
    n.connect(hp); hp.connect(g); g.connect(master);
    n.start(t); n.stop(t+0.06);
  }
  function clap(t){
    // three quick noise bursts + decay tail
    const hp=ac.createBiquadFilter(); hp.type='bandpass'; hp.frequency.value=1100; hp.Q.value=0.7;
    const g=ac.createGain(); hp.connect(g); g.connect(master);
    const offs=[0,0.012,0.024];
    g.gain.setValueAtTime(0.0001,t);
    offs.forEach(o=>{ g.gain.setValueAtTime(0.5,t+o); g.gain.exponentialRampToValueAtTime(0.08,t+o+0.011); });
    g.gain.setValueAtTime(0.5,t+0.036);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.20);
    const n=noiseSource(); n.connect(hp); n.start(t); n.stop(t+0.21);
  }
  function bass(t){
    const o=ac.createOscillator(), g=ac.createGain(), lp=ac.createBiquadFilter();
    o.type='sawtooth'; o.frequency.setValueAtTime(82.41,t); // E2
    lp.type='lowpass'; lp.frequency.setValueAtTime(700,t);
    lp.frequency.exponentialRampToValueAtTime(160,t+0.18);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.5,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.26);
    o.connect(lp); lp.connect(g); g.connect(master);
    o.start(t); o.stop(t+0.28);
  }
  const VOICES=[kick,snare,hihat,clap,bass];
  function audition(r){ ensureAudio(); VOICES[r](ac.currentTime+0.01); }

  // ---------- scheduler (lookahead, AudioContext-clock based) ----------
  let playing=false, current=0, nextNoteTime=0, timerId=null, rafId=null;
  const LOOKAHEAD=25;      // ms — how often the scheduler runs
  const AHEAD=0.12;        // s  — how far ahead to schedule
  const queue=[];          // {step, time} for visual sync

  function secsPerStep(){ return (60/bpm)/4; } // 16th notes
  function scheduleStep(step,time){
    for(let r=0;r<ROWS.length;r++) if(pattern[r][step]) VOICES[r](time);
    queue.push({step,time});
  }
  function nextStep(){
    nextNoteTime += secsPerStep();
    current = (current+1)%STEPS;
  }
  function swingOffset(step){
    // delay odd 16th-steps for a shuffle feel; swing% of a 16th
    return (step%2===1) ? secsPerStep()*(swing/100) : 0;
  }
  function scheduler(){
    while(nextNoteTime < ac.currentTime + AHEAD){
      scheduleStep(current, nextNoteTime + swingOffset(current));
      nextStep();
    }
  }

  // visual playhead driven off the audio clock
  let lastDrawn=-1;
  function draw(){
    let s=lastDrawn;
    while(queue.length && queue[0].time < ac.currentTime){ s=queue[0].step; queue.shift(); }
    if(s!==lastDrawn){ lightColumn(s); lastDrawn=s; }
    rafId=requestAnimationFrame(draw);
  }
  function lightColumn(col){
    indCells.forEach((d,i)=>d.classList.toggle('playcol',i===col));
    for(let r=0;r<ROWS.length;r++)for(let c=0;c<STEPS;c++){
      const cell=cells[r][c];
      const active=(c===col);
      cell.classList.toggle('playcol',active);
      if(active && pattern[r][c]){
        cell.classList.remove('hit'); void cell.offsetWidth; cell.classList.add('hit');
      }
    }
  }
  function clearColumns(){
    indCells.forEach(d=>d.classList.remove('playcol'));
    for(let r=0;r<ROWS.length;r++)for(let c=0;c<STEPS;c++)
      cells[r][c].classList.remove('playcol','hit');
  }

  function play(){
    ensureAudio();
    playing=true;
    current=0; lastDrawn=-1; queue.length=0;
    nextNoteTime=ac.currentTime+0.06;
    timerId=setInterval(scheduler,LOOKAHEAD);
    rafId=requestAnimationFrame(draw);
    const b=$('playBtn'); b.textContent='⏸ 정지'; b.classList.add('playing');
  }
  function stop(){
    playing=false;
    clearInterval(timerId); cancelAnimationFrame(rafId);
    clearColumns();
    const b=$('playBtn'); b.textContent='▶ 재생'; b.classList.remove('playing');
  }
  function togglePlay(){ playing?stop():play(); }

  // ---------- controls ----------
  $('playBtn').onclick=togglePlay;
  $('clearBtn').onclick=function(){
    pattern=emptyPattern(); paint(); savePattern();
  };
  const bpmEl=$('bpm'), swingEl=$('swing');
  bpmEl.value=bpm; $('bpmVal').textContent=bpm;
  swingEl.value=swing; $('swingVal').textContent=swing;
  bpmEl.addEventListener('input',e=>{
    bpm=clampBpm(+e.target.value); $('bpmVal').textContent=bpm;
    localStorage.setItem(K_BPM,bpm);
  });
  swingEl.addEventListener('input',e=>{
    swing=+e.target.value; $('swingVal').textContent=swing;
    localStorage.setItem(K_SWING,swing);
  });
  document.querySelectorAll('.chip[data-preset]').forEach(ch=>{
    ch.onclick=()=>{
      const p=PRESETS[ch.dataset.preset];
      if(!p) return;
      pattern=p.map(r=>r.slice()); paint(); savePattern();
      ensureAudio(); // arm audio so the user can hit play instantly
    };
  });

  // keyboard: Space toggles play/stop
  document.addEventListener('keydown',e=>{
    if(e.code==='Space' && e.target.tagName!=='INPUT'){ e.preventDefault(); togglePlay(); }
  });

  // first gesture anywhere unlocks/resumes audio (autoplay policy)
  ['pointerdown','keydown'].forEach(ev=>
    window.addEventListener(ev,()=>ensureAudio(),{once:true}));

  paint();
})();
</script>
</body>
</html>
