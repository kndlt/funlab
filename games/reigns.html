<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>왕의 선택 · funlab</title>
<style>
  :root{
    --bg:#14110d;--panel:#1d1812;--card:#221a11;--line:#3a3024;--cream:#f6ead8;--ink:#e7dcc8;
    --muted:#a9977e;--amber:#ffb154;
    --c-p:#9fd49a;--c-a:#ff6b5e;--c-m:#ffd479;--c-f:#b79cff
  }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;line-height:1.5;
    background-image:radial-gradient(70% 50% at 50% -8%,rgba(255,178,84,.10),transparent 60%);
    -webkit-tap-highlight-color:transparent;overflow-x:hidden;touch-action:pan-y;user-select:none
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:30}
  .back:hover{color:var(--ink)}
  .wrap{max-width:480px;margin:0 auto;padding:50px 18px 40px;display:flex;flex-direction:column;gap:16px;min-height:100%}

  /* ── meters ── */
  .meters{display:flex;gap:12px;justify-content:space-between}
  .meter{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;gap:5px}
  .meter .ico{font-size:21px;filter:grayscale(.15);transition:transform .25s}
  .meter .track{width:100%;height:9px;background:#120f0a;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .meter .fill{height:100%;width:50%;border-radius:6px;transition:width .55s cubic-bezier(.2,.8,.3,1)}
  #m-p .fill{background:linear-gradient(90deg,#6fae62,var(--c-p))}
  #m-a .fill{background:linear-gradient(90deg,#c24a40,var(--c-a))}
  #m-m .fill{background:linear-gradient(90deg,#c9a23a,var(--c-m))}
  #m-f .fill{background:linear-gradient(90deg,#7d62c2,var(--c-f))}
  .meter.bump .ico{transform:translateY(-4px) scale(1.25)}
  .meter.up .track{box-shadow:0 0 10px rgba(159,212,154,.7)}
  .meter.down .track{box-shadow:0 0 10px rgba(255,107,94,.75)}
  .meter .delta{position:absolute;top:-15px;font-size:13px;font-weight:800;opacity:0;pointer-events:none}
  .meter .delta.show{animation:deltaPop 1s ease forwards}
  @keyframes deltaPop{0%{opacity:0;transform:translateY(6px) scale(.7)}25%{opacity:1}100%{opacity:0;transform:translateY(-16px) scale(1)}}

  /* ── reign counter ── */
  .reign{display:flex;justify-content:space-between;align-items:baseline;color:var(--muted);font-size:12.5px;padding:0 2px}
  .reign b{color:var(--cream);font-size:15px;font-variant-numeric:tabular-nums}
  .reign .best b{color:var(--c-m)}

  /* ── card ── */
  .stage{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:330px}
  .card{
    width:100%;max-width:360px;background:linear-gradient(165deg,#2a2114,#1a140d);
    border:1px solid var(--line);border-radius:20px;padding:26px 22px 22px;
    box-shadow:0 18px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
    display:flex;flex-direction:column;align-items:center;gap:13px;cursor:grab;
    position:relative;overflow:hidden;will-change:transform
  }
  .card:active{cursor:grabbing}
  .card.dealing{animation:deal .34s cubic-bezier(.2,.9,.3,1.15)}
  @keyframes deal{0%{transform:translateY(-30px) scale(.9) rotate(-2deg);opacity:0}100%{transform:none;opacity:1}}
  .card.fly-left{transition:transform .35s ease,opacity .35s ease;transform:translateX(-150%) rotate(-26deg)!important;opacity:0}
  .card.fly-right{transition:transform .35s ease,opacity .35s ease;transform:translateX(150%) rotate(26deg)!important;opacity:0}
  .face{font-size:62px;line-height:1;margin-top:4px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.4))}
  .who{font-size:13px;color:var(--amber);letter-spacing:.6px;font-weight:700}
  .prompt{font-size:17.5px;color:var(--cream);text-align:center;font-weight:600;min-height:74px;display:flex;align-items:center}
  .flavor{font-size:12px;color:var(--muted);text-align:center;margin-top:-6px;min-height:16px;font-style:italic}

  /* swipe peek labels */
  .peek{position:absolute;top:50%;transform:translateY(-50%);font-size:14px;font-weight:800;
    padding:7px 12px;border-radius:12px;opacity:0;transition:opacity .12s;max-width:44%;text-align:center;pointer-events:none}
  .peek.l{left:12px;background:rgba(255,107,94,.16);border:1px solid var(--c-a);color:#ffd2cc}
  .peek.r{right:12px;background:rgba(159,212,154,.16);border:1px solid var(--c-p);color:#dff3da}
  .card.tilt-l .peek.l{opacity:1}
  .card.tilt-r .peek.r{opacity:1}

  /* ── choice buttons ── */
  .choices{display:flex;gap:12px}
  button.choice{flex:1;border:none;border-radius:16px;padding:15px 12px;font-family:inherit;
    font-size:15px;font-weight:800;cursor:pointer;transition:transform .08s,filter .15s;
    background:linear-gradient(#332715,#241b10);color:var(--cream);border:1px solid #5a4423;line-height:1.25}
  button.choice .k{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:3px;letter-spacing:1px}
  button.choice:active{transform:scale(.96)}
  button.choice:not(:disabled):hover{filter:brightness(1.2);border-color:#8a6a36}
  button.choice:disabled{opacity:.45;cursor:default}
  .hint{text-align:center;color:#7c6d58;font-size:11.5px;margin-top:-4px}

  /* ── gameover ── */
  .over{position:fixed;inset:0;background:rgba(10,8,5,.86);display:none;align-items:center;justify-content:center;
    padding:24px;z-index:40;backdrop-filter:blur(3px)}
  .over.show{display:flex;animation:fade .4s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .obox{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:30px 26px;max-width:380px;text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.6)}
  .obox .skull{font-size:50px}
  .obox h2{font-size:22px;color:var(--c-a);margin-top:8px;font-weight:800}
  .obox .reason{color:var(--ink);font-size:15px;margin-top:10px;line-height:1.55}
  .obox .stat{color:var(--muted);font-size:13.5px;margin-top:16px}
  .obox .stat b{color:var(--cream);font-size:17px;font-variant-numeric:tabular-nums}
  .obox .rec{color:var(--c-m);font-weight:800;margin-top:6px;font-size:13.5px}
  .obox button{margin-top:22px;border:none;border-radius:26px;padding:13px 30px;font-family:inherit;
    font-size:16px;font-weight:800;cursor:pointer;background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a}
  .obox button:active{transform:scale(.96)}
</style>
</head>
<body>
<a class="back" href="../index.html">← funlab</a>

<div class="wrap">
  <div class="meters">
    <div class="meter" id="m-p"><span class="delta"></span><span class="ico">👑</span><div class="track"><div class="fill"></div></div></div>
    <div class="meter" id="m-a"><span class="delta"></span><span class="ico">⚔️</span><div class="track"><div class="fill"></div></div></div>
    <div class="meter" id="m-m"><span class="delta"></span><span class="ico">💰</span><div class="track"><div class="fill"></div></div></div>
    <div class="meter" id="m-f"><span class="delta"></span><span class="ico">✝️</span><div class="track"><div class="fill"></div></div></div>
  </div>

  <div class="reign">
    <div>재위 <b id="year">1</b>년</div>
    <div class="best">최장 재위 <b id="best">0</b>년</div>
  </div>

  <div class="stage">
    <div class="card dealing" id="card">
      <div class="peek l" id="peekL">좌</div>
      <div class="peek r" id="peekR">우</div>
      <div class="face" id="face">👑</div>
      <div class="who" id="who"></div>
      <div class="prompt" id="prompt"></div>
      <div class="flavor" id="flavor"></div>
    </div>
  </div>

  <div class="choices">
    <button class="choice" id="btnL"><span class="k">◀ 좌</span><span id="lblL"></span></button>
    <button class="choice" id="btnR"><span class="k">우 ▶</span><span id="lblR"></span></button>
  </div>
  <div class="hint">카드를 좌·우로 밀거나 버튼을 눌러 선택 · 효과는 미터로 직접 느껴봐</div>
</div>

<div class="over" id="over">
  <div class="obox">
    <div class="skull" id="oFace">💀</div>
    <h2 id="oTitle">폐위</h2>
    <div class="reason" id="oReason"></div>
    <div class="stat">재위 <b id="oYears">0</b>년 — 최장 <b id="oBest">0</b>년</div>
    <div class="rec" id="oRec"></div>
    <button id="restart">다시 왕좌에</button>
  </div>
</div>

    {face:'🏰',who:'변경 영주',prompt:'난 독립하겠소! 막고 싶으면 군대를 보내시오.',
      lL:'독립 인정',tL:'지도에서 영지 하나가 떨어져 나갔다.',eL:e(-8,4,6,0),
      lR:'진압',tR:'반란을 짓밟았다. 값비싼 본보기.',eR:e(-4,-8,-12,0)},
    {face:'💉',who:'주치의',prompt:'폐하, 안색이 좋지 않습니다. 잠시 국정에서 손을 떼시지요.',
      lL:'쉰다',tL:'기운은 돌아왔으나 나라가 표류한다.',eL:e(6,-6,-6,6),
      lR:'계속 일한다',tR:'밤새 서류 더미와 씨름했다.',eR:e(-4,6,6,-4)},
    {face:'😡',who:'굶주린 군중',prompt:'빵을 달라! 빵을 달라!',
      lL:'진압한다',tL:'창끝이 함성을 잠재웠다.',eL:e(-14,8,0,-6),
      lR:'빵을 푼다',tR:'창고를 열자 외침이 환호로 바뀐다.',eR:e(16,0,-10,0)},
    {face:'✝️',who:'교황 사절',prompt:'십자군에 동참하소서. 이는 신의 부르심입니다.',
      lL:'거절',tL:'사절이 파문을 운운하며 떠난다.',eL:e(0,6,6,-14),
      lR:'참전',tR:'기사들이 성지를 향해 떠났다.',eR:e(0,-12,-8,16)},
    {face:'🍷',who:'궁정 귀족',prompt:'궁정 무도회를 여시지요. 품격을 보여 주셔야지요.',
      lL:'거절',tL:'귀족들이 시시하다는 표정이다.',eL:e(-6,0,8,2),
      lR:'연다',tR:'샹들리에 아래 동맹이 맺어진다.',eR:e(8,4,-10,-4)},
    {face:'🤴',who:'망명한 형',prompt:'동생아, 진짜 왕은 나다. 왕좌를 돌려다오.',
      lL:'추방한다',tL:'형은 떠났고, 그 추종자들도 떠났다.',eL:e(-6,-6,4,0),
      lR:'돈을 쥐여준다',tR:'침묵의 값으로 금고를 헐었다.',eR:e(4,0,-10,0)},
    {face:'🧓',who:'점쟁이 노파',prompt:'좌로 가면 흥하고 우로 가면 망한다… 아니, 반대였나?',
      lL:'좌로',tL:'노파가 알 수 없는 미소를 짓는다.',eL:e(8,0,-6,0),
      lR:'우로',tR:'노파가 알 수 없는 미소를 짓는다.',eR:e(-6,0,8,0)},
    {face:'📜',who:'국고지기',prompt:'금고가 너무 가득 차 도둑들이 군침을 흘립니다. 좀 쓰시지요.',
      lL:'쌓아둔다',tL:'금화는 늘고, 그림자도 늘었다.',eL:e(-6,-4,8,0),
      lR:'푼다',tR:'길과 다리를 놓으니 백성이 기뻐한다.',eR:e(10,4,-10,0),
      flavor:s=>s.m>72?'창고 문이 금화 무게에 삐걱입니다.':''},
    {face:'🌑',who:'어둠의 사제',prompt:'잊혀진 옛 신을 섬기면, 그대 군대에 두려움 없는 힘을 주겠소.',
      lL:'거부',tL:'성호를 긋고 그를 내쫓았다.',eL:e(0,-6,0,10),
      lR:'섬긴다',tR:'병사들 눈에 낯선 광기가 어린다.',eR:e(0,14,0,-16)}
  ];

  let state, busy=false, current=null, history=[];
  let best=+(localStorage.getItem(KEY_BEST)||0)||0;
  $('best').textContent=best; $('oBest').textContent=best;

  function newGame(){
    state={p:50,a:50,m:50,f:50,year:1};
    history=[]; busy=false;
    $('over').classList.remove('show');
    METERS.forEach(updateFill);
    $('year').textContent=1;
    draw(true);
  }

  function updateFill(key){
    $('m-'+key).querySelector('.fill').style.width=Math.max(0,Math.min(100,state[key]))+'%';
  }

  function draw(first){
    // pick a card not seen in the last 4 draws (allows recurrence over time)
    let c, guard=0;
    do{ c=CARDS[Math.floor(Math.random()*CARDS.length)]; guard++; }
    while(history.indexOf(c)>=0 && guard<30);
    history.push(c); if(history.length>4) history.shift();
    current=c;

    $('face').textContent=c.face;
    $('who').textContent=c.who;
    $('prompt').textContent=c.prompt;
    $('flavor').textContent=c.flavor?c.flavor(state):'';
    $('lblL').textContent=c.lL;
    $('lblR').textContent=c.lR;
    $('btnL').disabled=false; $('btnR').disabled=false;

    const card=$('card');
    card.className='card'+(first?' dealing':'');
    card.style.transform=''; card.style.opacity='';
    if(!first){ card.classList.remove('dealing'); void card.offsetWidth; card.classList.add('dealing'); }
  }

  function flashMeter(key,delta){
    if(!delta) return;
    const el=$('m-'+key);
    const dir=delta>0?'up':'down';
    el.classList.remove('up','down','bump'); void el.offsetWidth;
    el.classList.add(dir,'bump');
    const d=el.querySelector('.delta');
    d.textContent=(delta>0?'+':'')+delta;
    d.style.color=delta>0?'var(--c-p)':'var(--c-a)';
    d.classList.remove('show'); void d.offsetWidth; d.classList.add('show');
    setTimeout(()=>el.classList.remove('up','down','bump'),520);
  }

  function choose(side){
    if(busy||!current) return;
    busy=true;
    $('btnL').disabled=true; $('btnR').disabled=true;
    const eff=side==='left'?current.eL:current.eR;

    // fling card away
    const card=$('card');
    card.classList.add(side==='left'?'fly-left':'fly-right');

    // apply effects + meter feedback
    METERS.forEach(k=>{
      if(eff[k]){ state[k]+=eff[k]; flashMeter(k,eff[k]); updateFill(k); }
    });

    // check death
    let dead=null;
    for(const k of METERS){
      if(state[k]<=0){ dead={key:k,end:'lo'}; break; }
      if(state[k]>=100){ dead={key:k,end:'hi'}; break; }
    }

    if(dead){
      setTimeout(()=>gameOver(dead),560);
      return;
    }

    state.year++;
    $('year').textContent=state.year;
    setTimeout(()=>{ busy=false; draw(false); },420);
  }

  function gameOver(dead){
    const reason=DEATHS[dead.key][dead.end];
    const yrs=state.year;
    let rec=false;
    if(yrs>best){ best=yrs; localStorage.setItem(KEY_BEST,best); rec=true; }
    $('best').textContent=best;
    $('oReason').textContent=reason;
    $('oYears').textContent=yrs;
    $('oBest').textContent=best;
    $('oTitle').textContent=dead.end==='hi'?'권좌를 빼앗기다':'폐위';
    $('oFace').textContent=dead.end==='hi'?'👑':'💀';
    $('oRec').textContent=rec?'🏆 새로운 최장 재위 기록!':'';
    $('over').classList.add('show');
  }

  $('btnL').onclick=()=>choose('left');
  $('btnR').onclick=()=>choose('right');
  $('restart').onclick=newGame;

  document.addEventListener('keydown',e=>{
    if($('over').classList.contains('show')){
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); newGame(); }
      return;
    }
    if(e.repeat||busy) return;
    if(e.key==='ArrowLeft'){ e.preventDefault(); choose('left'); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); choose('right'); }
  });

  // ── drag / swipe ──
  (function(){
    const card=$('card');
    let dragging=false, startX=0, dx=0;
    const TH=100;

    function down(x){ if(busy) return; dragging=true; startX=x; dx=0; card.style.transition='none'; }
    function move(x){
      if(!dragging) return;
      dx=x-startX;
      const rot=dx/22;
      card.style.transform='translateX('+dx+'px) rotate('+rot+'deg)';
      card.classList.toggle('tilt-l',dx<-24);
      card.classList.toggle('tilt-r',dx>24);
    }
    function up(){
      if(!dragging) return;
      dragging=false;
      card.classList.remove('tilt-l','tilt-r');
      card.style.transition='';
      if(dx<=-TH){ choose('left'); }
      else if(dx>=TH){ choose('right'); }
      else { card.style.transform=''; }
      dx=0;
    }
    card.addEventListener('pointerdown',e=>{ down(e.clientX); card.setPointerCapture&&card.setPointerCapture(e.pointerId); });
    card.addEventListener('pointermove',e=>move(e.clientX));
    card.addEventListener('pointerup',up);
    card.addEventListener('pointercancel',up);
  })();

  newGame();
})();
</script>
</body>
</html>
