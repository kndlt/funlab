<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>두들점프 · Doodle Jump</title>
<style>
  :root{
    --bg:#14110d; --panel:#1d1812; --line:#3a3024;
    --cream:#f6ead8; --ink:#e7dcc8; --muted:#a9977e; --amber:#ffb154;
  }
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:18px 16px 36px;
    touch-action:none; -webkit-user-select:none; user-select:none;
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:10}
  .back:hover{color:var(--amber)}
  .stage{width:100%;max-width:360px;margin-top:30px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
  .title{font-size:30px;font-weight:800;line-height:1;
    background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title .ref{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:6px;letter-spacing:.4px}
  .scores{display:flex;gap:8px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 14px;text-align:center;min-width:74px}
  .box .lbl{font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .box .val{font-size:21px;font-weight:800;color:var(--cream);font-variant-numeric:tabular-nums}
  .barline{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
  .hint{font-size:12px;color:var(--muted)}
  .restart{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;font-weight:800;border:none;
    padding:8px 18px;border-radius:22px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .restart:active{transform:scale(.96)}
  .board{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:100%;aspect-ratio:360/560;touch-action:none;overflow:hidden}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .overlay{position:absolute;inset:0;border-radius:14px;background:rgba(20,17,13,.86);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5;
    text-align:center;padding:20px;animation:fade .25s ease}
  .overlay.show{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay .msg{font-size:22px;font-weight:800;color:var(--cream);line-height:1.5}
  .overlay .msg b{color:var(--amber)}
  .overlay .small{font-size:13px;color:var(--muted);max-width:280px}
  .foot{margin-top:14px;color:#7c6d58;font-size:12px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<a class="back" href="../../index.html">← funlab</a>

<div class="stage">
  <div class="head">
    <div class="title">두들점프<span class="ref">발판을 밟고 끝없이 위로 · Doodle Jump</span></div>
    <div class="scores">
      <div class="box"><div class="lbl">높이</div><div class="val" id="score">0</div></div>
      <div class="box"><div class="lbl">best</div><div class="val" id="best">0</div></div>
    </div>
  </div>

  <div class="barline">
    <div class="hint">좌우 화면 터치 · ←→ / A·D · 기울이기</div>
    <button class="restart" id="restart">다시</button>
  </div>

  <div class="board" id="board">
    <canvas id="cv"></canvas>
    <div class="overlay" id="overlay">
      <div class="msg" id="overMsg"></div>
      <div class="small" id="overSmall"></div>
      <button class="restart" id="overRestart">다시</button>
    </div>
  </div>

  <div class="foot">밟으면 튀어 오른다. 헛디뎌 바닥으로 떨어지면 끝. 높이 올라간 만큼이 기록.</div>
</div>

<script>
(function(){
  "use strict";

  const BEST_KEY = "funlab:doodle:best";
  const ANCHOR   = 0.58;   // player resting screen position (fraction from top)

  const boardEl  = document.getElementById("board");
  const cv       = document.getElementById("cv");
  const ctx      = cv.getContext("2d");
  const scoreEl  = document.getElementById("score");
  const bestEl   = document.getElementById("best");
  const overlay  = document.getElementById("overlay");
  const overMsg  = document.getElementById("overMsg");
  const overSmall= document.getElementById("overSmall");

  // --- sizing (retina + responsive) -------------------------------------
  let W = 0, H = 0, S = 1;          // logical css px + scale factor
  let GRAV, JUMP, MAXVX, ACC, FRICT, MAXRISE;
  let PW, PH;                        // player width/height
  let PLW, PLH;                      // platform width/height

  function resize(){
    const rect = boardEl.getBoundingClientRect();
    const dpr  = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    W = rect.width; H = rect.height;
    cv.width  = Math.round(W * dpr);
    cv.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    S = H / 560;
    GRAV  = 2100 * S;
    JUMP  = 920  * S;
    MAXVX = 560  * S;
    ACC   = 2600 * S;
    FRICT = 1900 * S;
    MAXRISE = (JUMP*JUMP) / (2*GRAV);
    PW = 34 * S; PH = 36 * S;
    PLW = 64 * S; PLH = 14 * S;
  }
  window.addEventListener("resize", resize);

  // --- state ------------------------------------------------------------
  let player;       // {x,y,vx,vy} — x,y are center
  let platforms;    // array of {x,y,w,h,type,vx?,broken?,bvy?,alpha?}
  let camY;         // world-y of screen top (only ever decreases)
  let topY;         // smallest (highest) generated platform y
  let startY;       // player's starting y, for height measurement
  let maxClimb;     // best climbed distance in px
  let score, best;
  let state;        // 'playing' | 'over'
  let lastT;

  // input
  let keyLeft=false, keyRight=false, touchDir=0, touchId=null, tilt=0, tiltOn=false;

  best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0;

  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

  // --- platform generation ---------------------------------------------
  function nextGap(climbPx){
    const t  = clamp((climbPx/S) / 3500, 0, 1);
    const lo = (70 + 30*t) * S;
    const hi = Math.min(MAXRISE*0.82, (115 + 60*t) * S);
    return lo + Math.random() * Math.max(8*S, hi - lo);
  }

  function makePlatform(y, climbPx){
    const cd = climbPx / S;
    let type = "normal";
    if(cd > 500){
      const t = clamp((cd-500)/4000, 0, 1);
      const pMove  = 0.06 + 0.20*t;
      const pBreak = cd > 900 ? 0.06 + 0.16*t : 0;
      const r = Math.random();
      if(r < pMove) type = "moving";
      else if(r < pMove + pBreak) type = "breakable";
    }
    const x = Math.random() * (W - PLW);
    const p = { x, y, w:PLW, h:PLH, type };
    if(type === "moving"){
      p.vx = (55 + 60*Math.random()) * S * (Math.random() < 0.5 ? 1 : -1);
    }
    return p;
  }

  function ensurePlatforms(){
    while(topY > camY - H){
      const gap = nextGap(startY - topY);
      const y = topY - gap;
      platforms.push(makePlatform(y, startY - y));
      topY = y;
    }
  }

  // --- lifecycle --------------------------------------------------------
  function init(){
    resize();
    const sp = { x: W/2 - PLW/2, y: H*0.80, w:PLW, h:PLH, type:"normal" };
    platforms = [sp];
    topY = sp.y;
    player = { x: W/2, y: sp.y - PH/2, vx:0, vy:-JUMP };
    startY = player.y;
    maxClimb = 0;
    score = 0;
    camY = player.y - H*ANCHOR;
    state = "playing";
    keyLeft = keyRight = false; touchDir = 0; touchId = null; tilt = 0;
    ensurePlatforms();
    overlay.classList.remove("show");
    updateScores();
    lastT = performance.now();
  }

  function updateScores(){
    scoreEl.textContent = score;
    bestEl.textContent  = best;
  }

  function gameOver(){
    state = "over";
    const fresh = score >= best && score > 0;
    if(score > best){ best = score; localStorage.setItem(BEST_KEY, String(best)); }
    updateScores();
    overMsg.innerHTML  = `추락 · 높이 <b>${score}</b>`;
    overSmall.textContent = fresh ? "최고 기록 경신! 더 높이." : "헛디뎌 떨어졌다. 다시.";
    overlay.classList.add("show");
  }

  // --- update -----------------------------------------------------------
  function update(dt){
    // steering input: keys > touch > tilt
    let dir = 0;
    if(keyLeft)  dir -= 1;
    if(keyRight) dir += 1;
    if(dir === 0 && touchDir !== 0) dir = touchDir;
    if(dir === 0 && tiltOn) dir = tilt;   // analog -1..1

    if(dir !== 0){
      player.vx += dir * ACC * dt;
    } else {
      const fr = FRICT * dt;
      if(player.vx > 0) player.vx = Math.max(0, player.vx - fr);
      else              player.vx = Math.min(0, player.vx + fr);
    }
    player.vx = clamp(player.vx, -MAXVX, MAXVX);

    // vertical integration
    const prevFeet = player.y + PH/2;
    player.vy += GRAV * dt;
    player.y  += player.vy * dt;
    player.x  += player.vx * dt;

    // horizontal wrap
    if(player.x < 0)  player.x += W;
    if(player.x > W)  player.x -= W;

    // move + animate platforms
    for(const p of platforms){
      if(p.type === "moving" && !p.broken){
        p.x += p.vx * dt;
        if(p.x < 0){ p.x = 0; p.vx = -p.vx; }
        else if(p.x > W - p.w){ p.x = W - p.w; p.vx = -p.vx; }
      }
      if(p.broken){
        p.bvy += GRAV * dt;
        p.y   += p.bvy * dt;
        p.alpha = Math.max(0, p.alpha - dt*1.4);
      }
    }

    // landing collision (only while falling)
    const feet = player.y + PH/2;
    if(player.vy > 0){
      for(const p of platforms){
        if(p.broken) continue;
        const top = p.y;
        if(prevFeet <= top && feet >= top){
          // horizontal overlap, accounting for wrap
          const pcx = p.x + p.w/2;
          let ddx = player.x - pcx;
          if(ddx >  W/2) ddx -= W;
          if(ddx < -W/2) ddx += W;
          if(Math.abs(ddx) <= p.w/2 + PW*0.35){
            player.y = top - PH/2;
            player.vy = -JUMP;
            if(p.type === "breakable"){
              p.broken = true; p.bvy = 90*S; p.alpha = 1;
            }
            break;
          }
        }
      }
    }

    // camera follows upward only
    camY = Math.min(camY, player.y - H*ANCHOR);

    // height / score
    const climb = startY - player.y;
    if(climb > maxClimb){
      maxClimb = climb;
      const s = Math.floor(maxClimb / S / 10);
      if(s !== score){ score = s; scoreEl.textContent = score; }
    }

    // generate above, cull below
    ensurePlatforms();
    if(platforms.length > 40){
      platforms = platforms.filter(p => p.y < camY + H + 60*S);
    }

    // fell off the bottom
    if(player.y - camY > H + PH){ gameOver(); }
  }

  // --- render -----------------------------------------------------------
  function render(){
    ctx.clearRect(0, 0, W, H);

    // scrolling reference lines convey ascent
    ctx.strokeStyle = "rgba(58,48,36,0.45)";
    ctx.lineWidth = 1;
    const spacing = 80 * S;
    const first = Math.floor(camY / spacing) * spacing;
    ctx.beginPath();
    for(let wy = first; wy < camY + H; wy += spacing){
      const sy = Math.round(wy - camY) + 0.5;
      ctx.moveTo(0, sy); ctx.lineTo(W, sy);
    }
    ctx.stroke();

    // platforms
    for(const p of platforms){
      const sy = p.y - camY;
      if(sy < -p.h || sy > H + p.h) continue;
      drawPlatform(p, sy);
    }

    // player (with wrapped ghost near edges)
    const sy = player.y - camY;
    drawCreature(player.x, sy);
    if(player.x < PW)      drawCreature(player.x + W, sy);
    else if(player.x > W-PW) drawCreature(player.x - W, sy);
  }

  function roundRect(x, y, w, h, r){
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y,   x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x,   y+h, r);
    ctx.arcTo(x,   y+h, x,   y,   r);
    ctx.arcTo(x,   y,   x+w, y,   r);
    ctx.closePath();
  }

  function drawPlatform(p, sy){
    const x = p.x, w = p.w, h = p.h;
    ctx.save();
    if(p.broken) ctx.globalAlpha = Math.max(0, p.alpha);
    let c0, c1, edge;
    if(p.type === "moving"){       c0="#ffe0a8"; c1="#e8a23a"; edge="#b9772a"; }
    else if(p.type === "breakable"){ c0="#8a6a44"; c1="#5e4226"; edge="#3a2814"; }
    else {                          c0="#cda469"; c1="#9a6f3a"; edge="#6f4d27"; }
    const g = ctx.createLinearGradient(0, sy, 0, sy+h);
    g.addColorStop(0, c0); g.addColorStop(1, c1);
    ctx.fillStyle = g;
    roundRect(x, sy, w, h, h*0.42);
    ctx.fill();
    ctx.strokeStyle = edge;
    ctx.lineWidth = Math.max(1, S);
    ctx.stroke();
    if(p.type === "breakable"){
      // crack line
      ctx.strokeStyle = "rgba(20,14,8,0.7)";
      ctx.lineWidth = Math.max(1, 1.4*S);
      ctx.beginPath();
      ctx.moveTo(x + w*0.5, sy + 2*S);
      ctx.lineTo(x + w*0.42, sy + h - 2*S);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawCreature(cx, cy){
    const w = PW, h = PH;
    const x = cx - w/2, y = cy - h/2;
    const look = player.vx > 30*S ? 1 : (player.vx < -30*S ? -1 : 0);

    // feet
    ctx.fillStyle = "#b9772a";
    const fw = w*0.22, fh = h*0.16;
    roundRect(x + w*0.16, y + h - fh*0.6, fw, fh, fh*0.5); ctx.fill();
    roundRect(x + w - w*0.16 - fw, y + h - fh*0.6, fw, fh, fh*0.5); ctx.fill();

    // body
    const g = ctx.createLinearGradient(0, y, 0, y+h);
    g.addColorStop(0, "#ffd9a0"); g.addColorStop(1, "#ff9e3d");
    ctx.fillStyle = g;
    roundRect(x, y, w, h*0.92, w*0.34); ctx.fill();
    ctx.strokeStyle = "rgba(120,70,20,0.55)";
    ctx.lineWidth = Math.max(1, S);
    roundRect(x, y, w, h*0.92, w*0.34); ctx.stroke();

    // little antenna
    ctx.strokeStyle = "#ffb154";
    ctx.lineWidth = Math.max(1, 1.6*S);
    ctx.beginPath();
    ctx.moveTo(cx, y + h*0.04);
    ctx.lineTo(cx, y - h*0.12);
    ctx.stroke();
    ctx.fillStyle = "#ffce85";
    ctx.beginPath(); ctx.arc(cx, y - h*0.14, w*0.07, 0, Math.PI*2); ctx.fill();

    // eyes
    const ey = y + h*0.36, ex = w*0.20, er = w*0.13;
    for(const s of [-1, 1]){
      ctx.fillStyle = "#fff7ec";
      ctx.beginPath(); ctx.arc(cx + s*ex, ey, er, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#3a230a";
      ctx.beginPath(); ctx.arc(cx + s*ex + look*er*0.4, ey, er*0.5, 0, Math.PI*2); ctx.fill();
    }
    // smile
    ctx.strokeStyle = "#7a3f0c";
    ctx.lineWidth = Math.max(1, 1.4*S);
    ctx.beginPath();
    ctx.arc(cx, y + h*0.55, w*0.18, 0.15*Math.PI, 0.85*Math.PI);
    ctx.stroke();
  }

  // --- main loop --------------------------------------------------------
  function frame(now){
    let dt = (now - lastT) / 1000;
    lastT = now;
    if(dt > 0.05) dt = 0.05;        // clamp big gaps (tab switch etc.)
    if(state === "playing") update(dt);
    render();
    requestAnimationFrame(frame);
  }

  // --- input ------------------------------------------------------------
  window.addEventListener("keydown", e=>{
    const k = e.key;
    if(k==="ArrowLeft"||k==="a"||k==="A"){ keyLeft=true; e.preventDefault(); }
    else if(k==="ArrowRight"||k==="d"||k==="D"){ keyRight=true; e.preventDefault(); }
  });
  window.addEventListener("keyup", e=>{
    const k = e.key;
    if(k==="ArrowLeft"||k==="a"||k==="A") keyLeft=false;
    else if(k==="ArrowRight"||k==="d"||k==="D") keyRight=false;
  });

  // touch / pointer steering via screen halves
  function setTouch(clientX){
    const rect = boardEl.getBoundingClientRect();
    touchDir = (clientX - rect.left) < rect.width/2 ? -1 : 1;
  }
  boardEl.addEventListener("pointerdown", e=>{
    touchId = e.pointerId;
    setTouch(e.clientX);
    requestTilt();
    e.preventDefault();
  });
  boardEl.addEventListener("pointermove", e=>{
    if(e.pointerId === touchId) setTouch(e.clientX);
  });
  function endTouch(e){
    if(e.pointerId === touchId){ touchId = null; touchDir = 0; }
  }
  boardEl.addEventListener("pointerup", endTouch);
  boardEl.addEventListener("pointercancel", endTouch);
  boardEl.addEventListener("pointerleave", endTouch);

  // optional device tilt
  function onTilt(e){
    if(e.gamma == null) return;
    tiltOn = true;
    const g = clamp(e.gamma / 22, -1, 1);
    tilt = Math.abs(g) < 0.12 ? 0 : g;   // small deadzone
  }
  function requestTilt(){
    if(tiltOn) return;
    const D = window.DeviceOrientationEvent;
    if(D && typeof D.requestPermission === "function"){
      D.requestPermission().then(r=>{
        if(r === "granted") window.addEventListener("deviceorientation", onTilt);
      }).catch(()=>{});
    } else if(D){
      window.addEventListener("deviceorientation", onTilt);
    }
  }
  if(window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission !== "function"){
    window.addEventListener("deviceorientation", onTilt);
  }

  document.getElementById("restart").addEventListener("click", init);
  document.getElementById("overRestart").addEventListener("click", init);

  init();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
