<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>모래 · funlab</title>
<style>
  :root{
    --bg:#14110d;--panel:#1d1812;--line:#3a3024;--cream:#f6ead8;--ink:#e7dcc8;
    --muted:#a9977e;--amber:#ffb154
  }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;line-height:1.5;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    min-height:100%;-webkit-tap-highlight-color:transparent;overflow-x:hidden
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:20}
  .back:hover{color:var(--ink)}
  .wrap{max-width:680px;margin:0 auto;padding:52px 16px 40px;display:flex;flex-direction:column;gap:14px}
  .head{text-align:center}
  h1{font-size:26px;font-weight:800;background:linear-gradient(#fff3df,#ffcf8a);
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:12.5px;margin-top:4px}

  .stage{
    position:relative;background:#0d0b08;border:1px solid var(--line);border-radius:16px;
    overflow:hidden;box-shadow:inset 0 0 60px rgba(0,0,0,.5)
  }
  canvas{
    display:block;width:100%;height:auto;aspect-ratio:3/2;
    image-rendering:pixelated;image-rendering:crisp-edges;
    touch-action:none;cursor:crosshair
  }
  .stage::after{
    content:"";position:absolute;inset:0;pointer-events:none;border-radius:16px;
    box-shadow:inset 0 0 50px rgba(0,0,0,.45)
  }

  .toolbar{display:flex;flex-direction:column;gap:11px}
  .mats{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
  .mats button{
    display:flex;align-items:center;gap:6px;background:#1a1510;border:1px solid var(--line);
    color:var(--muted);border-radius:20px;padding:7px 13px;cursor:pointer;font-size:13px;
    font-family:inherit;font-weight:700;transition:transform .05s
  }
  .mats button:hover{color:var(--cream);border-color:#7a5a30}
  .mats button:active{transform:scale(.94)}
  .mats button.on{background:var(--panel);color:var(--cream);border-color:var(--amber);box-shadow:0 0 0 1px var(--amber) inset}
  .swatch{width:13px;height:13px;border-radius:4px;border:1px solid rgba(0,0,0,.35);flex:none}

  .row{display:flex;align-items:center;gap:14px;justify-content:center;flex-wrap:wrap;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 14px}
  .brush{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted)}
  .brush input[type=range]{width:130px;accent-color:var(--amber)}
  .brush .bv{color:var(--cream);font-weight:700;width:18px;text-align:right;font-variant-numeric:tabular-nums}
  .clear{background:#241c12;border:1px solid var(--line);color:var(--ink);border-radius:10px;
    padding:7px 15px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:700}
  .clear:hover{border-color:#7a5a30;color:var(--cream)}
  .clear:active{transform:scale(.95)}
  .hint{text-align:center;color:#7c6d58;font-size:11.5px;margin-top:2px}
  .hint b{color:var(--amber);font-weight:700}
</style>
</head>
<body>
<a class="back" href="../../index.html">← funlab</a>
<div class="wrap">
  <div class="head">
    <h1>모래</h1>
    <p class="sub">단순한 규칙 → 예상 못 한 창발. 칠하고, 흐르게 두고, 불을 붙여봐.</p>
  </div>

  <div class="stage">
    <canvas id="c"></canvas>
  </div>

  <div class="toolbar">
    <div class="mats" id="mats"></div>
    <div class="row">
      <label class="brush">붓 <input id="brush" type="range" min="1" max="9" value="3"><span class="bv" id="bv">3</span></label>
      <button class="clear" id="clear">전부 지우기</button>
    </div>
    <p class="hint">불 + 나무 = 번진다 · 물은 불을 끈다 (<b>증기</b>). 마우스/터치로 그려.</p>
  </div>
</div>

<script>
(()=>{
  // ── grid ──
  const W=150, H=100;
  const N=W*H;
  const EMPTY=0, SAND=1, WATER=2, STONE=3, WOOD=4, FIRE=5, SMOKE=6;

  const grid  = new Uint8Array(N);   // material id
  const shade = new Uint8Array(N);   // 0..15 per-cell texture tint
  const life  = new Uint8Array(N);   // fire / smoke lifetime
  const moved = new Uint8Array(N);   // per-frame move guard

  // ── materials / palette ──
  const MATS=[
    {id:SAND,  name:'모래', col:'#d8b478'},
    {id:WATER, name:'물',   col:'#3f7fb0'},
    {id:STONE, name:'돌',   col:'#6e6657'},
    {id:WOOD,  name:'나무', col:'#7a4a24'},
    {id:FIRE,  name:'불',   col:'#ff7a1e'},
    {id:EMPTY, name:'지우개', col:'#14110d'},
  ];
  let current=SAND;

  // ── canvas ──
  const canvas=document.getElementById('c');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d',{alpha:false});
  const img=ctx.createImageData(W,H);
  const data=img.data;

  // ── helpers ──
  const idx=(x,y)=>y*W+x;
  const inB=(x,y)=>x>=0&&x<W&&y>=0&&y<H;
  // sand sinks through empty / water / smoke
  const sandPass=m=>m===EMPTY||m===WATER||m===SMOKE;
  const gas=m=>m===EMPTY||m===SMOKE;

  function place(i,m){
    grid[i]=m;
    if(m===FIRE) life[i]=(30+(Math.random()*40))|0;
    else if(m===SMOKE) life[i]=(50+(Math.random()*40))|0;
    else { shade[i]=(Math.random()*16)|0; life[i]=0; }
  }
  function swap(a,b){
    const g=grid[a]; grid[a]=grid[b]; grid[b]=g;
    const s=shade[a]; shade[a]=shade[b]; shade[b]=s;
    const l=life[a]; life[a]=life[b]; life[b]=l;
    moved[a]=1; moved[b]=1;
  }

  // ── simulation step ──
  let frame=0;
  function step(){
    frame++;
    moved.fill(0);
    const ltr = (frame&1)===0; // alternate scan direction each frame

    for(let y=H-1;y>=0;y--){
      for(let k=0;k<W;k++){
        const x = ltr ? k : (W-1-k);
        const i = y*W+x;
        if(moved[i]) continue;
        const m=grid[i];
        if(m===EMPTY||m===STONE||m===WOOD) continue;

        if(m===SAND){
          const dn=i+W;
          if(y<H-1 && sandPass(grid[dn]) && !moved[dn]){ swap(i,dn); continue; }
          if(y<H-1){
            const d = Math.random()<0.5?1:-1;
            if(tryDiag(i,x,y,d,sandPass)) continue;
            if(tryDiag(i,x,y,-d,sandPass)) continue;
          }
        }
        else if(m===WATER){
          const dn=i+W;
          if(y<H-1 && gas(grid[dn]) && !moved[dn]){ swap(i,dn); continue; }
          if(y<H-1){
            const d = Math.random()<0.5?1:-1;
            if(tryDiag(i,x,y,d,gas)) continue;
            if(tryDiag(i,x,y,-d,gas)) continue;
          }
          // spread horizontally to level out
          const d = Math.random()<0.5?1:-1;
          if(inB(x+d,y) && grid[i+d]===EMPTY && !moved[i+d]){ swap(i,i+d); continue; }
          if(inB(x-d,y) && grid[i-d]===EMPTY && !moved[i-d]){ swap(i,i-d); continue; }
        }
        else if(m===SMOKE){
          if(life[i]<=1){ grid[i]=EMPTY; continue; }
          life[i]--;
          const up=i-W;
          if(y>0 && grid[up]===EMPTY && !moved[up]){ swap(i,up); continue; }
          if(y>0){
            const d = Math.random()<0.5?1:-1;
            if(inB(x+d,y-1) && grid[up+d]===EMPTY && !moved[up+d]){ swap(i,up+d); continue; }
            if(inB(x-d,y-1) && grid[up-d]===EMPTY && !moved[up-d]){ swap(i,up-d); continue; }
          }
          // drift sideways
          const d = Math.random()<0.5?1:-1;
          if(inB(x+d,y) && grid[i+d]===EMPTY && !moved[i+d]) swap(i,i+d);
        }
        else if(m===FIRE){
          fireStep(i,x,y);
        }
      }
    }
  }

  function tryDiag(i,x,y,d,pass){
    if(!inB(x+d,y+1)) return false;
    const t=i+W+d;
    if(pass(grid[t]) && !moved[t]){ swap(i,t); return true; }
    return false;
  }

  function fireStep(i,x,y){
    // age
    if(life[i]<=1){
      grid[i] = Math.random()<0.35 ? SMOKE : EMPTY;
      if(grid[i]===SMOKE) life[i]=(40+Math.random()*40)|0;
      else life[i]=0;
      return;
    }
    life[i]--;

    // interact with 8 neighbours
    let doused=false;
    for(let dy=-1;dy<=1;dy++){
      for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dy) continue;
        const nx=x+dx, ny=y+dy;
        if(!inB(nx,ny)) continue;
        const ni=idx(nx,ny), nm=grid[ni];
        if(nm===WOOD){
          if(Math.random()<0.06){ grid[ni]=FIRE; life[ni]=(28+Math.random()*38)|0; }
        } else if(nm===WATER){
          doused=true;
        }
      }
    }
    if(doused && Math.random()<0.6){
      grid[i]=SMOKE; life[i]=(40+Math.random()*40)|0; // steam
      return;
    }

    // rise & flicker: lick upward into empty
    if(y>0){
      const up=i-W;
      if(grid[up]===EMPTY && !moved[up] && Math.random()<0.4){ swap(i,up); return; }
      if(grid[up]===WATER){ grid[i]=SMOKE; life[i]=(40+Math.random()*40)|0; return; }
    }
  }

  // ── render ──
  const BG=[20,17,13];
  function render(){
    let p=0;
    for(let i=0;i<N;i++){
      let r,g,b;
      const m=grid[i];
      if(m===EMPTY){ r=BG[0]; g=BG[1]; b=BG[2]; }
      else if(m===SAND){ const s=shade[i]-8; r=216+s*3; g=180+s*3; b=120+s*2; }
      else if(m===WATER){ const s=shade[i]-8; r=63+s*2; g=127+s*2; b=176+s*3; }
      else if(m===STONE){ const s=shade[i]-8; r=110+s*3; g=102+s*3; b=87+s*2; }
      else if(m===WOOD){ const s=shade[i]-8; r=122+s*3; g=74+s*2; b=36+s*2; }
      else if(m===FIRE){
        let t=life[i]/60; if(t>1)t=1;
        const fl=0.82+Math.random()*0.3;
        r=255*fl; g=(110+135*t)*fl; b=(30+30*t)*fl;
      }
      else { // SMOKE
        let a=life[i]/90; if(a>1)a=1; if(a<0)a=0;
        r=BG[0]+(104-BG[0])*a; g=BG[1]+(98-BG[1])*a; b=BG[2]+(88-BG[2])*a;
      }
      data[p++]=r>255?255:r;
      data[p++]=g>255?255:g;
      data[p++]=b>255?255:b;
      data[p++]=255;
    }
    ctx.putImageData(img,0,0);
  }

  function loop(){ step(); render(); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);

  // ── painting ──
  let brushR=3;
  function stamp(cx,cy){
    const r=brushR, r2=r*r;
    for(let dy=-r;dy<=r;dy++){
      for(let dx=-r;dx<=r;dx++){
        if(dx*dx+dy*dy>r2) continue;
        const x=cx+dx, y=cy+dy;
        if(!inB(x,y)) continue;
        const i=idx(x,y);
        if(current===EMPTY){ place(i,EMPTY); continue; }
        // don't overwrite static walls accidentally with loose stuff? allow overwrite freely
        if(current===FIRE){
          // fire only takes on flammable or empty cells; on water it'd just douse
          if(grid[i]===EMPTY||grid[i]===WOOD) place(i,FIRE);
        } else {
          place(i,current);
        }
      }
    }
  }
  // interpolate a line of stamps so fast drags don't gap
  function stampLine(x0,y0,x1,y1){
    const dx=x1-x0, dy=y1-y0;
    const steps=Math.max(1,Math.ceil(Math.hypot(dx,dy)/Math.max(1,brushR*0.6)));
    for(let s=0;s<=steps;s++){
      stamp(Math.round(x0+dx*s/steps), Math.round(y0+dy*s/steps));
    }
  }

  let drawing=false, lastX=0, lastY=0;
  function toCell(e){
    const rect=canvas.getBoundingClientRect();
    const x=Math.floor((e.clientX-rect.left)/rect.width*W);
    const y=Math.floor((e.clientY-rect.top)/rect.height*H);
    return [x,y];
  }
  canvas.addEventListener('pointerdown',e=>{
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    drawing=true;
    const [x,y]=toCell(e); lastX=x; lastY=y; stamp(x,y);
  });
  canvas.addEventListener('pointermove',e=>{
    if(!drawing) return;
    e.preventDefault();
    const [x,y]=toCell(e);
    stampLine(lastX,lastY,x,y);
    lastX=x; lastY=y;
  });
  const stop=()=>{ drawing=false; };
  canvas.addEventListener('pointerup',stop);
  canvas.addEventListener('pointercancel',stop);
  canvas.addEventListener('pointerleave',stop);

  // ── UI ──
  const matsEl=document.getElementById('mats');
  MATS.forEach(mt=>{
    const btn=document.createElement('button');
    btn.dataset.id=mt.id;
    btn.innerHTML=`<span class="swatch" style="background:${mt.col}"></span>${mt.name}`;
    if(mt.id===current) btn.classList.add('on');
    btn.addEventListener('click',()=>{
      current=mt.id;
      [...matsEl.children].forEach(b=>b.classList.toggle('on', +b.dataset.id===current));
    });
    matsEl.appendChild(btn);
  });

  const brushEl=document.getElementById('brush'), bv=document.getElementById('bv');
  brushEl.addEventListener('input',()=>{ brushR=+brushEl.value; bv.textContent=brushEl.value; });
  brushR=+brushEl.value;

  document.getElementById('clear').addEventListener('click',()=>{
    grid.fill(0); life.fill(0);
  });
})();
</script>
</body>
</html>
