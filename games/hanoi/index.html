<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>하노이탑 · Tower of Hanoi</title>
<style>
  :root{
    --bg:#14110d; --panel:#1d1812; --line:#3a3024;
    --cream:#f6ead8; --ink:#e7dcc8; --muted:#a9977e; --amber:#ffb154;
  }
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:18px 16px 40px;
    -webkit-user-select:none; user-select:none;
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:10}
  .back:hover{color:var(--amber)}
  .stage{width:100%;max-width:440px;margin-top:30px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
  .title{font-size:30px;font-weight:800;line-height:1;
    background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title .ref{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:6px;letter-spacing:.4px}
  .scores{display:flex;gap:8px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 12px;text-align:center;min-width:62px}
  .box .lbl{font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .box .val{font-size:21px;font-weight:800;color:var(--cream);font-variant-numeric:tabular-nums}
  .barline{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
  .picker{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}
  .picker .segs{display:flex;gap:4px}
  .seg{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    width:26px;height:26px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
    font-family:inherit;display:flex;align-items:center;justify-content:center}
  .seg:active{transform:scale(.94)}
  .seg.on{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;border-color:transparent}
  .restart{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;font-weight:800;border:none;
    padding:8px 18px;border-radius:22px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .restart:active{transform:scale(.96)}
  .board{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:100%;overflow:hidden;padding:14px 10px 0}
  .pegs{display:flex;height:280px;align-items:flex-end}
  .peg{position:relative;flex:1;display:flex;align-items:flex-end;justify-content:center;cursor:pointer;height:100%}
  .peg::before{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:18px;
    width:6px;height:calc(100% - 26px);border-radius:3px;
    background:linear-gradient(#5a4a33,#3a3024);z-index:0}
  .peg::after{content:"";position:absolute;bottom:8px;left:8%;width:84%;height:10px;border-radius:5px;
    background:linear-gradient(#48392a,#2c2418);z-index:0}
  .peg.sel::after{background:linear-gradient(#7a5c33,#4a3a22)}
  .peg.bad::after{background:linear-gradient(#7a2f24,#4a201a);animation:shake .28s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .discs{display:flex;flex-direction:column-reverse;align-items:center;position:relative;z-index:1;
    padding-bottom:18px;width:100%}
  .disc{height:var(--dh,24px);margin-top:2px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:800;color:rgba(58,35,10,.7);font-variant-numeric:tabular-nums;
    background:linear-gradient(#ffd49a,#ff9e3d);box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 1px 3px rgba(0,0,0,.35);
    transition:transform .12s ease}
  .held{position:absolute;top:4px;left:50%;transform:translateX(-50%);z-index:3;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 4px 12px rgba(0,0,0,.5);
    background:linear-gradient(#fff0d2,#ffb154)}
  .overlay{position:absolute;inset:0;border-radius:14px;background:rgba(20,17,13,.86);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5;
    text-align:center;padding:20px;animation:fade .25s ease}
  .overlay.show{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay .msg{font-size:22px;font-weight:800;color:var(--cream);line-height:1.5}
  .overlay .msg b{color:var(--amber)}
  .overlay .small{font-size:13px;color:var(--muted);max-width:280px;line-height:1.6}
  .foot{margin-top:14px;color:#7c6d58;font-size:12px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<a class="back" href="../../index.html">← funlab</a>

<div class="stage">
  <div class="head">
    <div class="title">하노이탑<span class="ref">한 번에 하나씩 — 큰 원반은 작은 위에 못 놓는다 · Tower of Hanoi</span></div>
    <div class="scores">
      <div class="box"><div class="lbl">이동</div><div class="val" id="moves">0</div></div>
      <div class="box"><div class="lbl">최소</div><div class="val" id="min">15</div></div>
      <div class="box"><div class="lbl">기록</div><div class="val" id="best">—</div></div>
    </div>
  </div>

  <div class="barline">
    <div class="picker">
      <span>원반</span>
      <div class="segs" id="segs"></div>
    </div>
    <button class="restart" id="restart">다시</button>
  </div>

  <div class="board" id="board">
    <div class="pegs" id="pegs">
      <div class="peg" data-i="0"><div class="discs"></div></div>
      <div class="peg" data-i="1"><div class="discs"></div></div>
      <div class="peg" data-i="2"><div class="discs"></div></div>
    </div>
    <div class="overlay" id="overlay">
      <div class="msg" id="overMsg"></div>
      <div class="small" id="overSmall"></div>
      <button class="restart" id="overRestart">다시</button>
    </div>
  </div>

  <div class="foot">왼쪽 탑을 통째로 오른쪽으로 옮겨라. 큰 원반은 작은 원반 위에 못 올라간다.</div>
</div>

<script>
(function(){
  "use strict";

  const BEST_KEY = "funlab:hanoi:best";
  const MIN_N = 3, MAX_N = 7, DEFAULT_N = 4;
  const TARGET = 2;                 // rightmost peg is the goal

  const pegEls   = Array.from(document.querySelectorAll(".peg"));
  const discsEls = pegEls.map(p => p.querySelector(".discs"));
  const segsEl   = document.getElementById("segs");
  const movesEl  = document.getElementById("moves");
  const minEl    = document.getElementById("min");
  const bestEl   = document.getElementById("best");
  const overlay  = document.getElementById("overlay");
  const overMsg  = document.getElementById("overMsg");
  const overSmall= document.getElementById("overSmall");

  let n;            // current disc count
  let pegs;         // [[..],[..],[..]] each = sizes bottom->top
  let held;         // source peg index of a lifted disc, or -1
  let moves;        // move count
  let over;         // game finished flag
  let best;         // highest disc count ever solved

  best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0;

  // --- disc-count selector ----------------------------------------------
  for(let k=MIN_N; k<=MAX_N; k++){
    const b = document.createElement("button");
    b.className = "seg"; b.textContent = k; b.dataset.n = k;
    b.addEventListener("click", () => { if(k !== n) start(k); });
    segsEl.appendChild(b);
  }

  function start(count){
    n = count;
    pegs = [[], [], []];
    for(let s=n; s>=1; s--) pegs[0].push(s);  // largest at bottom
    held = -1;
    moves = 0;
    over = false;
    overlay.classList.remove("show");
    minEl.textContent = (1 << n) - 1;
    Array.from(segsEl.children).forEach(b =>
      b.classList.toggle("on", +b.dataset.n === n));
    render();
    updateHud();
  }

  function updateHud(){
    movesEl.textContent = moves;
    bestEl.textContent = best ? best + "판" : "—";
  }

  // --- rendering --------------------------------------------------------
  function render(){
    // disc height scales so n discs + a lifted one fit the peg comfortably
    const dh = Math.max(15, Math.min(28, Math.floor(240 / (n + 1))));
    document.documentElement.style.setProperty("--dh", dh + "px");

    const minW = 30, maxW = 128;
    const widthFor = s => (n <= 1) ? maxW : minW + (s - 1) * (maxW - minW) / (n - 1);

    pegEls.forEach((pegEl, i) => {
      pegEl.classList.remove("sel", "bad");
      const stack = pegs[i];
      const box = discsEls[i];
      box.textContent = "";
      // a lifted disc shows the top of its source minus that disc
      const drawCount = (held === i) ? stack.length - 1 : stack.length;
      for(let d = 0; d < drawCount; d++){
        box.appendChild(makeDisc(stack[d], widthFor(stack[d])));
      }
      // floating lifted disc above the source peg
      if(held === i && stack.length){
        const top = stack[stack.length - 1];
        const el = makeDisc(top, widthFor(top));
        el.classList.add("held");
        pegEl.classList.add("sel");
        pegEl.appendChild(el);
      }
    });
  }

  function makeDisc(size, w){
    const el = document.createElement("div");
    el.className = "disc";
    el.style.width = w + "px";
    el.textContent = size;
    return el;
  }

  // --- interaction ------------------------------------------------------
  function tapPeg(i){
    if(over) return;
    if(held === -1){
      // pick up the top disc of a non-empty peg
      if(pegs[i].length === 0) return;
      held = i;
      render();
      return;
    }
    if(i === held){
      // tapping the source again drops it back — no move counted
      held = -1;
      render();
      return;
    }
    // attempt to place onto peg i
    const disc = pegs[held][pegs[held].length - 1];
    const destTop = pegs[i].length ? pegs[i][pegs[i].length - 1] : Infinity;
    if(disc > destTop){
      // illegal: bigger onto smaller — reject, keep holding
      reject(i);
      return;
    }
    pegs[held].pop();
    pegs[i].push(disc);
    held = -1;
    moves++;
    render();
    updateHud();
    if(pegs[TARGET].length === n) win();
  }

  function reject(i){
    pegEls[i].classList.add("bad");
    setTimeout(() => pegEls[i].classList.remove("bad"), 280);
  }

  function win(){
    over = true;
    const minMoves = (1 << n) - 1;
    const perfect = moves === minMoves;
    if(n > best){
      best = n;
      localStorage.setItem(BEST_KEY, String(best));
      updateHud();
    }
    overMsg.innerHTML = `완성 · <b>${n}판</b>`;
    overSmall.textContent = perfect
      ? `최소 이동 ${minMoves}번으로 풀었다. 흠잡을 데 없다.`
      : `${moves}번 만에. 최소는 ${minMoves}번이다.`;
    overlay.classList.add("show");
  }

  pegEls.forEach(p =>
    p.addEventListener("click", () => tapPeg(+p.dataset.i)));

  document.getElementById("restart").addEventListener("click", () => start(n));
  document.getElementById("overRestart").addEventListener("click", () => start(n));

  start(DEFAULT_N);
})();
</script>
</body>
</html>
