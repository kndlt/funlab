<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>타자 · Typing Speed</title>
<style>
  :root{
    --bg:#14110d; --panel:#1d1812; --line:#3a3024;
    --cream:#f6ead8; --ink:#e7dcc8; --muted:#a9977e; --amber:#ffb154;
    --bad:#ff6b6b;
  }
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:18px 16px 40px;
    -webkit-user-select:none; user-select:none;
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:10}
  .back:hover{color:var(--amber)}
  .stage{width:100%;max-width:440px;margin-top:30px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
  .title{font-size:30px;font-weight:800;line-height:1;
    background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title .ref{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:6px;letter-spacing:.4px}
  .scores{display:flex;gap:8px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 12px;text-align:center;min-width:60px}
  .box .lbl{font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .box .val{font-size:21px;font-weight:800;color:var(--cream);font-variant-numeric:tabular-nums}
  .barline{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
  .hint{font-size:12.5px;color:var(--muted)}
  .restart{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;font-weight:800;border:none;
    padding:8px 18px;border-radius:22px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .restart:active{transform:scale(.96)}
  .board{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:100%;overflow:hidden;padding:16px}
  .prog{height:5px;border-radius:4px;background:#2a2218;overflow:hidden;margin-bottom:14px}
  .progfill{height:100%;width:0;background:linear-gradient(90deg,#ff9e3d,#ffd9a0);
    border-radius:4px;transition:width .12s linear}
  .text{
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:20px;line-height:1.75;letter-spacing:.5px;
    white-space:pre-wrap;word-break:break-word;color:var(--muted);
    min-height:132px;
  }
  .ch.ok{color:var(--cream)}
  .ch.bad{color:var(--bad);background:rgba(255,107,107,.18);border-radius:3px}
  .ch.caret{position:relative}
  .ch.caret::before{content:"";position:absolute;left:-1px;top:8%;height:84%;width:2px;
    background:var(--amber);border-radius:2px;animation:blink 1.05s step-end infinite}
  @keyframes blink{50%{opacity:0}}
  .catch{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:none;
    background:transparent;font-size:16px;cursor:text;padding:0;margin:0}
  .overlay{position:absolute;inset:0;border-radius:14px;background:rgba(20,17,13,.88);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5;
    text-align:center;padding:20px;animation:fade .25s ease}
  .overlay.show{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay .msg{font-size:24px;font-weight:800;color:var(--cream);line-height:1.5}
  .overlay .msg b{color:var(--amber)}
  .overlay .small{font-size:13px;color:var(--muted);max-width:280px}
  .foot{margin-top:14px;color:#7c6d58;font-size:12px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<a class="back" href="../../index.html">← funlab</a>

<div class="stage">
  <div class="head">
    <div class="title">타자<span class="ref">빠르고 정확하게 친다 · Typing Speed</span></div>
    <div class="scores">
      <div class="box"><div class="lbl">wpm</div><div class="val" id="wpm">0</div></div>
      <div class="box"><div class="lbl">정확도</div><div class="val" id="acc">100</div></div>
      <div class="box"><div class="lbl">best</div><div class="val" id="best">0</div></div>
    </div>
  </div>

  <div class="barline">
    <div class="hint">단어를 그대로 받아쳐라 · 30단어</div>
    <button class="restart" id="restart">다시</button>
  </div>

  <div class="board" id="board">
    <div class="prog"><div class="progfill" id="progfill"></div></div>
    <div class="text" id="text"></div>
    <input class="catch" id="catch" type="text" autocomplete="off"
           autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="타자 입력">
    <div class="overlay" id="overlay">
      <div class="msg" id="overMsg"></div>
      <div class="small" id="overSmall"></div>
      <button class="restart" id="overRestart">다시</button>
    </div>
  </div>

  <div class="foot">처음 한 글자가 시계를 켠다. 틀려도 멈추지 말고 끝까지.</div>
</div>

<script>
(function(){
  "use strict";

  const BEST_KEY = "funlab:typing:best";
  const TOTAL_WORDS = 30;

  // ~120 common short english words — typing stays universal
  const WORDS = [
    "the","and","you","that","was","for","are","with","his","they",
    "this","have","from","one","had","word","but","not","what","all",
    "were","when","your","can","said","there","use","each","which","she",
    "how","their","will","other","about","out","many","then","them","these",
    "some","her","would","make","like","him","into","time","has","look",
    "two","more","write","see","number","way","could","people","than","first",
    "water","been","call","who","find","long","down","day","did","get",
    "come","made","may","part","over","new","sound","take","only","little",
    "work","know","place","year","live","back","give","most","very","after",
    "good","name","just","help","line","turn","much","mean","move","right",
    "old","any","same","tell","boy","follow","came","want","show","also",
    "around","form","three","small","set","put","end","does","another","well"
  ];

  const boardEl   = document.getElementById("board");
  const textEl    = document.getElementById("text");
  const input     = document.getElementById("catch");
  const progFill  = document.getElementById("progfill");
  const wpmEl     = document.getElementById("wpm");
  const accEl     = document.getElementById("acc");
  const bestEl    = document.getElementById("best");
  const overlay   = document.getElementById("overlay");
  const overMsg   = document.getElementById("overMsg");
  const overSmall = document.getElementById("overSmall");

  let prompt;            // target string (words joined by spaces)
  let pos;               // committed caret index = input.value.length (capped)
  let totalTyped;        // every keystroke that added a char
  let correctTyped;      // keystrokes that matched the target -> accuracy
  let state;             // 'ready' | 'playing' | 'over'
  let startTime;         // ms timestamp of first keystroke

  let best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0;

  function buildPrompt(){
    const out = [];
    let last = -1;
    for(let i=0;i<TOTAL_WORDS;i++){
      let idx;
      do { idx = (Math.random()*WORDS.length)|0; } while(idx === last);
      last = idx;
      out.push(WORDS[idx]);
    }
    return out.join(" ");
  }

  function countCorrect(v){
    let c = 0;
    const n = Math.min(v.length, prompt.length);
    for(let i=0;i<n;i++) if(v[i] === prompt[i]) c++;
    return c;
  }

  function render(){
    const v = input.value;
    let html = "";
    for(let i=0;i<prompt.length;i++){
      let cls = "ch";
      if(i < v.length)      cls += (v[i] === prompt[i]) ? " ok" : " bad";
      else if(i === v.length) cls += " caret";
      html += '<span class="' + cls + '">' + prompt[i] + '</span>';
    }
    textEl.innerHTML = html;
    progFill.style.width = (pos / prompt.length * 100) + "%";
  }

  function liveStats(){
    const now = performance.now();
    const min = Math.max((now - startTime) / 60000, 1e-6);
    const correct = countCorrect(input.value);
    wpmEl.textContent = Math.round((correct / 5) / min);
    accEl.textContent = totalTyped ? Math.round(correctTyped / totalTyped * 100) : 100;
  }

  function onInput(){
    if(state === "over"){ input.value = ""; return; }

    let v = input.value;
    if(v.length > prompt.length){     // never type past the passage
      v = v.slice(0, prompt.length);
      input.value = v;
    }

    if(state === "ready" && v.length > 0){
      state = "playing";
      startTime = performance.now();
    }

    if(v.length > pos){               // growth -> count new keystrokes
      for(let i=pos;i<v.length;i++){
        totalTyped++;
        if(v[i] === prompt[i]) correctTyped++;
      }
    }
    pos = v.length;

    render();
    if(state === "playing") liveStats();
    if(pos >= prompt.length) finish();
  }

  function finish(){
    state = "over";
    const min = Math.max((performance.now() - startTime) / 60000, 1e-6);
    const wpm = Math.round((countCorrect(input.value) / 5) / min);
    const acc = totalTyped ? Math.round(correctTyped / totalTyped * 100) : 100;
    wpmEl.textContent = wpm;
    accEl.textContent = acc;

    let rec = false;
    if(wpm > best){
      best = wpm;
      localStorage.setItem(BEST_KEY, String(best));
      bestEl.textContent = best;
      rec = true;
    }

    overMsg.innerHTML = wpm + ' <b>WPM</b> · 정확도 ' + acc + '%';
    overSmall.textContent = rec ? "최고 기록 경신!"
      : (acc >= 98 ? "거의 완벽하다. 더 빠르게." : "더 정확하게. 다시.");
    overlay.classList.add("show");
    input.blur();
  }

  function reset(){
    prompt = buildPrompt();
    pos = 0;
    totalTyped = 0;
    correctTyped = 0;
    state = "ready";
    startTime = 0;
    input.value = "";
    wpmEl.textContent = "0";
    accEl.textContent = "100";
    bestEl.textContent = best;
    overlay.classList.remove("show");
    render();
    input.focus();
  }

  // --- input bindings ---------------------------------------------------
  input.addEventListener("input", onInput);
  // tapping the passage (mobile) summons the keyboard
  boardEl.addEventListener("mousedown", e=>{
    if(e.target === input) return;
    if(state !== "over"){ e.preventDefault(); input.focus(); }
  });
  boardEl.addEventListener("touchstart", ()=>{
    if(state !== "over") input.focus();
  }, {passive:true});

  document.getElementById("restart").addEventListener("click", reset);
  document.getElementById("overRestart").addEventListener("click", reset);

  reset();
})();
</script>
</body>
</html>
