<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>짝맞추기 · Concentration</title>
<style>
  :root{
    --bg:#14110d; --panel:#1d1812; --line:#3a3024;
    --cream:#f6ead8; --ink:#e7dcc8; --muted:#a9977e; --amber:#ffb154;
    --cell:#241c12;
    --gap:12px;
  }
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:18px 16px 40px;
    touch-action:manipulation; -webkit-user-select:none; user-select:none;
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:10}
  .back:hover{color:var(--amber)}
  .stage{width:100%;max-width:440px;margin-top:30px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
  .title{font-size:30px;font-weight:800;line-height:1;
    background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title .ref{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:6px;letter-spacing:.4px}
  .scores{display:flex;gap:8px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 14px;text-align:center;min-width:74px}
  .box .lbl{font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .box .val{font-size:21px;font-weight:800;color:var(--cream);font-variant-numeric:tabular-nums}
  .barline{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
  .hint{font-size:12.5px;color:var(--muted)}
  .restart{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;font-weight:800;border:none;
    padding:8px 18px;border-radius:22px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .restart:active{transform:scale(.96)}
  .board{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:100%;aspect-ratio:1/1;padding:var(--gap)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
    gap:var(--gap);width:100%;height:100%}
  .card{position:relative;border-radius:10px;cursor:pointer;background:transparent;
    perspective:600px;}
  .card .inner{position:absolute;inset:0;transition:transform .42s cubic-bezier(.4,.1,.3,1);
    transform-style:preserve-3d;will-change:transform}
  .card.up .inner,.card.done .inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden;-webkit-backface-visibility:hidden}
  .back-face{background:var(--cell);border:1px solid var(--line)}
  .back-face::after{content:"";width:30%;height:30%;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,rgba(255,177,84,.30),rgba(255,177,84,.06) 70%,transparent);
    box-shadow:inset 0 0 0 1px rgba(255,177,84,.12)}
  .front-face{background:#2a2015;border:1px solid #4a3c28;transform:rotateY(180deg);
    font-size:34px;line-height:1}
  .card.done .front-face{background:#3a2c12;border-color:var(--amber);
    box-shadow:inset 0 0 0 1px var(--amber),0 0 14px rgba(255,177,84,.35)}
  .card.done{animation:found .4s ease}
  @keyframes found{0%{transform:scale(1)}40%{transform:scale(1.07)}100%{transform:scale(1)}}
  .card.shake .inner{animation:shake .34s ease}
  @keyframes shake{0%,100%{transform:rotateY(180deg) translateX(0)}
    25%{transform:rotateY(180deg) translateX(-5px)}75%{transform:rotateY(180deg) translateX(5px)}}
  .overlay{position:absolute;inset:0;border-radius:14px;background:rgba(20,17,13,.86);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5;
    text-align:center;padding:20px;animation:fade .25s ease}
  .overlay.show{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay .msg{font-size:22px;font-weight:800;color:var(--cream);line-height:1.5}
  .overlay .msg b{color:var(--amber)}
  .overlay .small{font-size:13px;color:var(--muted);max-width:280px}
  .foot{margin-top:14px;color:#7c6d58;font-size:12px;text-align:center;line-height:1.6}
  @media (max-width:380px){ :root{ --gap:10px; } .front-face{font-size:30px} }
</style>
</head>
<body>
<a class="back" href="../../index.html">← funlab</a>

<div class="stage">
  <div class="head">
    <div class="title">짝맞추기<span class="ref">뒤집어 같은 짝을 기억해 맞춘다 · Concentration</span></div>
    <div class="scores">
      <div class="box"><div class="lbl">손</div><div class="val" id="moves">0</div></div>
      <div class="box"><div class="lbl">시간</div><div class="val" id="time">0:00</div></div>
    </div>
  </div>

  <div class="barline">
    <div class="hint">best <b id="best">—</b> 손</div>
    <button class="restart" id="restart">다시</button>
  </div>

  <div class="board" id="board">
    <div class="grid" id="grid"></div>
    <div class="overlay" id="overlay">
      <div class="msg" id="overMsg"></div>
      <div class="small" id="overSmall"></div>
      <button class="restart" id="overRestart">다시</button>
    </div>
  </div>

  <div class="foot">두 장을 뒤집어 같으면 남고, 다르면 도로 엎는다. 적은 손으로 다 맞추면 이긴다.</div>
</div>

<script>
(function(){
  "use strict";

  const PAIRS = 8;                          // 8 pairs = 4x4 grid
  const BEST_KEY = "funlab:match:best";
  const SYMBOLS = ["🦊","🦉","🐢","🐝","🦋","🐙","🦀","🐌","🦔","🐳","🦎","🐞"];

  const gridEl    = document.getElementById("grid");
  const movesEl   = document.getElementById("moves");
  const timeEl    = document.getElementById("time");
  const bestEl    = document.getElementById("best");
  const overlay   = document.getElementById("overlay");
  const overMsg   = document.getElementById("overMsg");
  const overSmall = document.getElementById("overSmall");

  // --- state ------------------------------------------------------------
  let cards;        // [{sym, el, faceEl, up, done}]
  let flipped;      // indices of currently face-up, unmatched cards (0..2)
  let moves;        // count of two-card attempts
  let matched;      // pairs found
  let busy;         // input locked while a mismatch is showing
  let best;         // fewest moves, from localStorage
  let startTime;    // ms timestamp of first flip, or null
  let timerId;      // setInterval handle
  let won;

  best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0;

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = (Math.random()*(i+1))|0;
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function fmtTime(ms){
    const s = Math.floor(ms/1000);
    const m = Math.floor(s/60);
    return m + ":" + String(s%60).padStart(2,"0");
  }

  function updateBest(){
    bestEl.textContent = best > 0 ? best : "—";
  }

  function startTimer(){
    if(timerId) return;
    startTime = performance.now();
    timerId = setInterval(()=>{
      timeEl.textContent = fmtTime(performance.now() - startTime);
    }, 250);
  }

  function stopTimer(){
    if(timerId){ clearInterval(timerId); timerId = null; }
  }

  function init(){
    stopTimer();
    flipped = [];
    moves = 0;
    matched = 0;
    busy = false;
    won = false;
    startTime = null;
    movesEl.textContent = "0";
    timeEl.textContent = "0:00";
    overlay.classList.remove("show");
    updateBest();

    // build a shuffled deck of PAIRS*2 cards
    const picks = shuffle(SYMBOLS.slice()).slice(0, PAIRS);
    const deck = shuffle(picks.concat(picks));

    gridEl.innerHTML = "";
    cards = deck.map((sym, i)=>{
      const el = document.createElement("div");
      el.className = "card";
      el.innerHTML =
        '<div class="inner">' +
          '<div class="face back-face"></div>' +
          '<div class="face front-face"></div>' +
        '</div>';
      const faceEl = el.querySelector(".front-face");
      faceEl.textContent = sym;
      const card = {sym, el, up:false, done:false, idx:i};
      el.addEventListener("click", ()=>flip(card));
      gridEl.appendChild(el);
      return card;
    });
  }

  function flip(card){
    if(busy || won) return;
    if(card.up || card.done) return;     // already showing
    if(flipped.length >= 2) return;      // safety

    startTimer();
    card.up = true;
    card.el.classList.add("up");
    flipped.push(card);

    if(flipped.length === 2){
      moves++;
      movesEl.textContent = moves;
      const [a, b] = flipped;
      if(a.sym === b.sym){
        // match — lock them face-up
        flipped = [];
        a.done = b.done = true;
        a.up = b.up = false;
        a.el.classList.add("done");
        b.el.classList.add("done");
        a.el.classList.remove("up");
        b.el.classList.remove("up");
        matched++;
        if(matched === PAIRS) finishWin();
      } else {
        // mismatch — lock input, flip both back after a beat
        busy = true;
        a.el.classList.add("shake");
        b.el.classList.add("shake");
        setTimeout(()=>{
          for(const c of [a, b]){
            c.up = false;
            c.el.classList.remove("up", "shake");
          }
          flipped = [];
          busy = false;
        }, 760);
      }
    }
  }

  function finishWin(){
    won = true;
    stopTimer();
    const elapsed = startTime ? (performance.now() - startTime) : 0;
    const isBest = best === 0 || moves < best;
    if(isBest){
      best = moves;
      localStorage.setItem(BEST_KEY, String(best));
    }
    updateBest();
    setTimeout(()=>{
      overMsg.innerHTML = `다 맞췄다 · <b>${moves}</b>손 · ${fmtTime(elapsed)}`;
      overSmall.textContent = isBest ? "최소 손 기록 경신!" : `최소 기록은 ${best}손.`;
      overlay.classList.add("show");
    }, 480);
  }

  document.getElementById("restart").addEventListener("click", init);
  document.getElementById("overRestart").addEventListener("click", init);

  init();
})();
</script>
</body>
</html>
