<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>마법진 · funlab</title>
<style>
  :root{--bg:#14110d;--panel:#1d1812;--line:#3a3024;--cream:#f6ead8;--ink:#e7dcc8;--muted:#a9977e;--amber:#ffb154}
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;line-height:1.6;
    background-image:radial-gradient(60% 45% at 80% -8%,rgba(255,178,84,.10),transparent 60%);-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:50}
  .back:hover{color:var(--amber)}
  .wrap{max-width:980px;margin:0 auto;padding:46px 14px 70px;display:flex;flex-direction:column;align-items:center}
  h1{font-size:27px;font-weight:800;letter-spacing:1px;background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:12px;margin-top:4px;text-align:center;max-width:560px}
  .layout{display:flex;gap:18px;margin-top:18px;width:100%;justify-content:center;flex-wrap:wrap;align-items:flex-start}
  .col{display:flex;flex-direction:column;gap:11px}

  /* ritual grid */
  .grid{display:grid;grid-template-columns:repeat(5,42px);grid-template-rows:repeat(5,42px);gap:5px;padding:13px;
    background:var(--panel);border:1px solid var(--line);border-radius:15px;box-shadow:inset 0 0 40px rgba(0,0,0,.45);touch-action:none}
  .cell{border:1px solid var(--line);border-radius:8px;background:#191309;cursor:pointer;position:relative;transition:background .15s,box-shadow .25s,border-color .15s}
  .cell.ley::after{content:"";position:absolute;inset:0;margin:auto;width:4px;height:4px;border-radius:50%;background:#4a3a22}
  .cell:hover{border-color:#6d5226;background:#211810}
  .cell.on{border-color:#ffce86;background:radial-gradient(circle at 38% 32%,#fff0cf,var(--ec,#ffb154) 62%);box-shadow:0 0 10px var(--eg,rgba(255,178,84,.55));animation:breathe 2.6s ease-in-out infinite}
  .cell.on.ley::after{background:#fff;box-shadow:0 0 6px #fff}
  @keyframes breathe{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}
  .readout{display:flex;gap:6px;justify-content:center}
  .ro{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:5px 11px;text-align:center;min-width:80px}
  .ro .lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .ro .val{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums}.ro .el{color:var(--ec,var(--muted))}
  .controls{display:flex;gap:7px;justify-content:center}
  .ghost{background:#241c12;color:var(--muted);border:1px solid var(--line);border-radius:17px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}
  .ghost:hover{border-color:#7a5a30;color:var(--ink)}
  .msg{min-height:34px;max-width:280px;text-align:center;font-size:12px;color:var(--ink);align-self:center}
  .msg .hot{color:#ffd479;font-weight:800}.msg .dim{color:var(--muted)}.msg b{color:var(--cream)}

  /* white room */
  .roomwrap{position:relative}
  .room{display:block;border-radius:14px;border:1px solid #cfc7b6;cursor:crosshair;touch-action:none;
    width:440px;height:440px;max-width:80vw;max-height:80vw;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  .combos{width:200px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px}
  .panel h2{font-size:13px;color:var(--cream);font-weight:800;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
  .panel h2 .cnt{font-size:11px;color:var(--muted);font-weight:600}
  .clist{display:flex;flex-direction:column;gap:5px;max-height:230px;overflow-y:auto}
  .citem{font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:#191309}
  .citem b{color:var(--cream)}.citem .ar{color:var(--muted)}
  .citem.locked{opacity:.4}.citem.locked b{color:#6a5c47}
  .grimoire{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:300px}
  .rune{width:30px;height:30px;border:1px solid var(--line);border-radius:7px;display:grid;grid-template-columns:repeat(5,1fr);gap:1px;padding:3px;background:#191309;cursor:pointer}
  .rune i{border-radius:1px;background:#241c12}.rune i.l{background:var(--rc);box-shadow:0 0 2px var(--rc)}
  .rune.sel{border-color:var(--amber)}
  footer{margin-top:30px;color:#6f6150;font-size:11px;text-align:center}
</style>
</head>
<body>
<a class="back" href="../../index.html">← funlab</a>
<div class="wrap">
  <h1>✦ 마법진 ✦</h1>
  <p class="sub">왼쪽 격자에 <b>문양</b>을 그려 마법을 정하고, 오른쪽 <b>화이트 룸</b>을 클릭해 시전하라. 두 마법을 겹치면 — 불에 바람을 부으면 번지고, 불에 물을 부으면 증기가 된다.</p>

  <div class="layout">
    <div class="col">
      <div class="grid" id="grid"></div>
      <div class="readout">
        <div class="ro"><div class="lbl">속성</div><div class="val el" id="roEl">—</div></div>
        <div class="ro"><div class="lbl">power</div><div class="val" id="roPow">—</div></div>
      </div>
      <div class="controls"><button class="ghost" id="clear">문양 지우기</button></div>
      <div class="msg" id="msg"></div>
      <div class="grimoire" id="grimoire"></div>
    </div>

    <div class="col"><div class="roomwrap"><canvas class="room" id="room" width="520" height="520"></canvas></div></div>

    <div class="col combos">
      <div class="panel">
        <h2>📖 발견한 마법 <span class="cnt" id="spellCnt"></span></h2>
        <div style="font-size:11px;color:var(--muted)">격자에 그려 처음 시전하면 마법으로 등록된다.</div>
      </div>
      <div class="panel">
        <h2>⚗️ 조합 <span class="cnt" id="comboCnt"></span></h2>
        <div class="clist" id="clist"></div>
      </div>
    </div>
  </div>
  <footer>research prototype · 화이트룸에서 마법을 시전하고, 섞어라</footer>
</div>

<script>
"use strict";
// ════════════════════════════════════════════════════════════════════
// 마법진 — draw a glyph (geometry → element + power), cast it into a
// bright WHITE ROOM as a particle effect. Particles obey element physics
// and INTERACT: cast a 2nd element onto active particles to discover a
// reaction. Wind is a real force field, so fire+wind spreads emergently.
// ════════════════════════════════════════════════════════════════════

// ---- glyph grammar (element + power from shape) ----
const LEY=new Set([6,8,12,16,18]);
const rc=i=>[Math.floor(i/5),i%5], idx=(r,c)=>r*5+c;
function analyze(lit){
  const cells=[...lit].sort((a,b)=>a-b);const n=cells.length;if(!n)return null;
  let minR=9,maxR=-1,minC=9,maxC=-1;const set=new Set(cells);
  cells.forEach(i=>{const[r,c]=rc(i);minR=Math.min(minR,r);maxR=Math.max(maxR,r);minC=Math.min(minC,c);maxC=Math.max(maxC,c);});
  const h=maxR-minR+1,w=maxC-minC+1;
  const symV=cells.every(i=>{const[r,c]=rc(i);return set.has(idx(r,4-c));});
  const symH=cells.every(i=>{const[r,c]=rc(i);return set.has(idx(4-r,c));});
  const symD=cells.every(i=>{const[r,c]=rc(i);return set.has(idx(c,r));});
  const rot4=cells.every(i=>{const[r,c]=rc(i);return set.has(idx(c,4-r));});
  const empty=new Set();for(let i=0;i<25;i++)if(!set.has(i))empty.add(i);
  const reach=new Set(),st=[];
  for(let i=0;i<25;i++){const[r,c]=rc(i);if((r===0||r===4||c===0||c===4)&&empty.has(i)){reach.add(i);st.push(i);}}
  while(st.length){const i=st.pop();const[r,c]=rc(i);[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{if(nr<0||nc<0||nr>4||nc>4)return;const j=idx(nr,nc);if(empty.has(j)&&!reach.has(j)){reach.add(j);st.push(j);}});}
  const holes=[...empty].filter(i=>!reach.has(i)).length;
  let ley=0;LEY.forEach(i=>{if(set.has(i))ley++;});
  let connected=true;{const seen=new Set([cells[0]]),q=[cells[0]];while(q.length){const i=q.pop();const[r,c]=rc(i);[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{if(nr<0||nc<0||nr>4||nc>4)return;const j=idx(nr,nc);if(set.has(j)&&!seen.has(j)){seen.add(j);q.push(j);}});}connected=seen.size===n;}
  let element;
  if(holes>0) element='바위';
  else if(h-w>=2) element='벼락';
  else if(w-h>=2) element='물결';
  else if(rot4||(symV&&symH)) element='빛';
  else if(symD) element='바람';
  else element='불꽃';
  let power=n;if(symV)power+=2;if(symH)power+=2;if(symD)power+=1;if(rot4)power+=4;power+=holes*3;power+=ley*2;if(connected&&n>=3)power+=3;
  return {cells,element,power};
}
const ELHUE={'불꽃':18,'물결':205,'바람':150,'벼락':265,'바위':30,'빛':48};

// ---- white room canvas ----
const cv=document.getElementById('room'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1,FLOOR=0;
function fit(){DPR=Math.max(1,Math.min(2.5,window.devicePixelRatio||1));const css=cv.getBoundingClientRect().width;cv.width=Math.round(css*DPR);cv.height=Math.round(css*DPR);W=cv.width;H=cv.height;FLOOR=H*0.84;}
window.addEventListener('resize',fit);

// ---- particles + gusts ----
const P=[];           // particles
const G=[];           // wind gust force fields
const MAXP=1400;
function add(p){if(P.length<MAXP)P.push(p);}
const rnd=(a,b)=>a+Math.random()*(b-a);

function emit(el,x,y,power){
  const k=8+power*2;                          // count scales with power
  const sc=DPR;
  if(el==='불꽃'){
    for(let i=0;i<k;i++)add({el,x:x+rnd(-6,6)*sc,y:y+rnd(-4,4)*sc,vx:rnd(-.5,.5)*sc,vy:rnd(-1.6,-.6)*sc,life:rnd(40,80),max:80,r:rnd(4,9)*sc,hue:rnd(12,40)});
  }else if(el==='물결'){
    for(let i=0;i<k;i++)add({el,x:x+rnd(-5,5)*sc,y:y,vx:rnd(-1.6,1.6)*sc,vy:rnd(-3.2,-1.4)*sc,life:rnd(50,90),max:90,r:rnd(3,6)*sc,hue:rnd(195,215)});
  }else if(el==='벼락'){
    bolt(x,y,power);for(let i=0;i<k;i++)add({el,x,y,vx:rnd(-3,3)*sc,vy:rnd(-3,1)*sc,life:rnd(10,22),max:22,r:rnd(2,4)*sc,hue:rnd(255,280)});
  }else if(el==='바람'){
    const dir=rnd(0,Math.PI*2),fx=Math.cos(dir),fy=Math.sin(dir);
    G.push({x,y,r:(70+power*8)*sc,fx:fx*.5*sc,fy:fy*.5*sc,life:46});
    for(let i=0;i<k*2;i++)add({el,x:x+rnd(-10,10)*sc,y:y+rnd(-10,10)*sc,vx:fx*rnd(2,5)*sc+rnd(-1,1),vy:fy*rnd(2,5)*sc+rnd(-1,1),life:rnd(20,40),max:40,r:rnd(2,5)*sc,hue:150});
  }else if(el==='바위'){
    for(let i=0;i<k;i++)add({el,x:x+rnd(-8,8)*sc,y:y+rnd(-8,8)*sc,vx:rnd(-2,2)*sc,vy:rnd(-3.5,-1)*sc,life:rnd(70,130),max:130,r:rnd(4,9)*sc,hue:rnd(25,38),rock:true});
  }else if(el==='빛'){
    for(let i=0;i<k;i++){const a=rnd(0,Math.PI*2),sp=rnd(1,3.5)*sc;add({el,x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(40,70),max:70,r:rnd(3,7)*sc,hue:rnd(42,54)});}
    add({el,x,y,vx:0,vy:0,life:34,max:34,r:6*sc,hue:48,ring:true});
  }
}
function bolt(x,y,power){
  // a jagged lightning streak from the top to the cast point
  const segs=[];let px=x+rnd(-30,30)*DPR,py=0;
  while(py<y){const ny=py+rnd(14,30)*DPR;const nx=px+rnd(-22,22)*DPR;segs.push([px,py,nx,ny]);px=nx;py=ny;}
  flashes.push({segs,life:10,max:10,w:(1.5+power*0.15)*DPR});
}
const flashes=[];

// ---- reactions: cast B onto A's particles ----
const REACT={ // key "A+B" (sorted) -> {name, fx}
  '물결+불꽃':{name:'증기',fx:steam},
  '바람+불꽃':{name:'화염폭풍',fx:firestorm},
  '벼락+불꽃':{name:'폭발',fx:explode},
  '물결+벼락':{name:'감전',fx:shock},
  '물결+바람':{name:'비',fx:rainspread},
  '바람+바위':{name:'모래폭풍',fx:duststorm},
};
const discovered=new Set(JSON.parse(localStorage.getItem('funlab:magic:combos')||'[]'));
function reactKey(a,b){return [a,b].sort().join('+');}
function tryReact(el,x,y,power){
  const r2=(80+power*6)*DPR, r2sq=r2*r2;
  const hits={};
  for(const p of P){if(p.el===el)continue;const dx=p.x-x,dy=p.y-y;if(dx*dx+dy*dy<r2sq){const key=reactKey(el,p.el);if(REACT[key]){(hits[key]=hits[key]||[]).push(p);}}}
  let any=null;
  for(const key in hits){const rx=REACT[key];rx.fx(x,y,power,hits[key]);any=key;
    if(!discovered.has(key)){discovered.add(key);localStorage.setItem('funlab:magic:combos',JSON.stringify([...discovered]));renderCombos();
      setMsg(`<span class="hot">⚗️ 새 조합 발견 — ${rx.name}!</span>`);}
  }
  return any;
}
function steam(x,y,pw,parts){parts.forEach(p=>{p.life=Math.min(p.life,4);for(let i=0;i<2;i++)add({el:'증기',x:p.x,y:p.y,vx:rnd(-.6,.6),vy:rnd(-1.4,-.4)*DPR,life:rnd(50,90),max:90,r:rnd(6,12)*DPR,hue:0,steam:true});});}
function firestorm(x,y,pw,parts){parts.forEach(p=>{p.vx*=1.6;p.vy-=rnd(.5,1.5)*DPR;p.life+=20;});for(let i=0;i<14;i++)add({el:'불꽃',x:x+rnd(-30,30)*DPR,y:y+rnd(-20,20)*DPR,vx:rnd(-2,2)*DPR,vy:rnd(-2.5,-1)*DPR,life:rnd(50,90),max:90,r:rnd(5,10)*DPR,hue:rnd(10,36)});}
function explode(x,y,pw,parts){parts.forEach(p=>p.life=Math.min(p.life,3));for(let i=0;i<40;i++){const a=rnd(0,6.28),sp=rnd(3,9)*DPR;add({el:'불꽃',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(20,40),max:40,r:rnd(3,8)*DPR,hue:rnd(8,40)});}flashes.push({segs:[],life:8,max:8,burst:[x,y,(60+pw*8)*DPR]});}
function shock(x,y,pw,parts){parts.forEach(p=>{for(let i=0;i<2;i++)add({el:'벼락',x:p.x,y:p.y,vx:rnd(-2,2)*DPR,vy:rnd(-2,2)*DPR,life:rnd(8,16),max:16,r:rnd(2,4)*DPR,hue:270});p.hue=270;});}
function rainspread(x,y,pw,parts){for(let i=0;i<24;i++)add({el:'물결',x:x+rnd(-60,60)*DPR,y:y-rnd(20,80)*DPR,vx:rnd(-.4,.4),vy:rnd(1,3)*DPR,life:rnd(40,80),max:80,r:rnd(2,4)*DPR,hue:205});}
function duststorm(x,y,pw,parts){for(let i=0;i<24;i++)add({el:'바람',x:x+rnd(-40,40)*DPR,y:y+rnd(-40,40)*DPR,vx:rnd(2,6)*DPR,vy:rnd(-1,1)*DPR,life:rnd(30,60),max:60,r:rnd(3,7)*DPR,hue:34});}

// ---- update + render ----
function step(){
  // gusts
  for(let i=G.length-1;i>=0;i--){const g=G[i];g.life--;if(g.life<=0)G.splice(i,1);}
  // particles
  for(let i=P.length-1;i>=0;i--){
    const p=P[i];
    // gust force
    for(const g of G){const dx=p.x-g.x,dy=p.y-g.y;if(dx*dx+dy*dy<g.r*g.r){p.vx+=g.fx;p.vy+=g.fy;}}
    if(p.el==='불꽃'){p.vy-=0.04*DPR;p.vx+=rnd(-.15,.15)*DPR;p.vx*=.99;}
    else if(p.el==='물결'){p.vy+=0.16*DPR;p.vx*=.99;}
    else if(p.el==='바위'){p.vy+=0.2*DPR;p.vx*=.96;}
    else if(p.el==='바람'){p.vx*=.97;p.vy*=.97;}
    else if(p.el==='벼락'){p.vy+=0.1*DPR;}
    else if(p.el==='빛'){p.vx*=.95;p.vy*=.95;}
    else if(p.el==='증기'){p.vy-=0.02*DPR;p.vx+=rnd(-.1,.1);}
    p.x+=p.vx;p.y+=p.vy;p.life--;
    // floor interaction
    if(p.y>FLOOR){
      if(p.el==='물결'){p.life=Math.min(p.life,3);}      // splash
      else if(p.el==='바위'){p.y=FLOOR;p.vy=0;p.vx*=.5;} // settle
      else if(p.y>H){P.splice(i,1);continue;}
    }
    if(p.life<=0||p.x< -40||p.x>W+40){P.splice(i,1);}
  }
  // flashes
  for(let i=flashes.length-1;i>=0;i--){flashes[i].life--;if(flashes[i].life<=0)flashes.splice(i,1);}
}
function draw(){
  // room background (bright clean chamber)
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#f6f2ea');g.addColorStop(.82,'#e9e3d6');g.addColorStop(.83,'#d8cfbd');g.addColorStop(1,'#cabfa8');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // faint floor grid
  ctx.strokeStyle='rgba(120,105,80,.10)';ctx.lineWidth=1;ctx.beginPath();
  for(let x=0;x<=W;x+=W/10){ctx.moveTo(x,FLOOR);ctx.lineTo(W/2+(x-W/2)*0.4,H);}
  for(let y=FLOOR;y<=H;y+=(H-FLOOR)/4){ctx.moveTo(0,y);ctx.lineTo(W,y);}ctx.stroke();
  // vignette
  const vg=ctx.createRadialGradient(W/2,H*.42,W*.2,W/2,H*.5,W*.72);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(40,30,15,.16)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  for(const p of P){
    const a=Math.max(0,Math.min(1,p.life/p.max));
    if(p.el==='바위'){ctx.globalAlpha=a;ctx.fillStyle=`hsl(${p.hue},28%,42%)`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();}
    else if(p.el==='증기'){ctx.globalAlpha=a*.5;ctx.fillStyle='rgba(225,225,230,1)';ctx.beginPath();ctx.arc(p.x,p.y,p.r*(2-a),0,6.28);ctx.fill();}
    else{
      const sat=p.el==='물결'?75:p.el==='벼락'?90:p.el==='빛'?90:88;
      const li=p.el==='벼락'?70:p.el==='빛'?60:54;
      // soft outer glow + bright core
      ctx.globalAlpha=a*.35;ctx.fillStyle=`hsl(${p.hue},${sat}%,${li}%)`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*1.8,0,6.28);ctx.fill();
      ctx.globalAlpha=a;ctx.fillStyle=`hsl(${p.hue},${sat}%,${Math.min(72,li+14)}%)`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*0.7,0,6.28);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  // lightning flashes
  for(const f of flashes){
    const a=f.life/f.max;
    if(f.burst){const[bx,by,br]=f.burst;ctx.globalAlpha=a*.5;const rg=ctx.createRadialGradient(bx,by,0,bx,by,br*(1.2-a));rg.addColorStop(0,'rgba(255,200,120,.9)');rg.addColorStop(1,'rgba(255,120,40,0)');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(bx,by,br*(1.2-a),0,6.28);ctx.fill();}
    if(f.segs&&f.segs.length){ctx.globalAlpha=a;ctx.strokeStyle='rgba(120,90,255,.95)';ctx.lineWidth=f.w;ctx.shadowColor='rgba(150,120,255,.9)';ctx.shadowBlur=12;ctx.beginPath();f.segs.forEach(s=>{ctx.moveTo(s[0],s[1]);ctx.lineTo(s[2],s[3]);});ctx.stroke();ctx.shadowBlur=0;}
  }
  ctx.globalAlpha=1;
}
function frame(){step();draw();requestAnimationFrame(frame);}

// ---- cast into the room ----
let lit=new Set(),cur=null;
function roomXY(e){const r=cv.getBoundingClientRect();return [(e.clientX-r.left)/r.width*W,(e.clientY-r.top)/r.height*H];}
cv.addEventListener('pointerdown',e=>{e.preventDefault();const a=analyze(lit);if(!a){setMsg('<span class="dim">먼저 왼쪽에 <b>문양</b>을 그려라</span>');return;}
  const[x,y]=roomXY(e);
  const reacted=tryReact(a.element,x,y,a.power);
  emit(a.element,x,y,a.power);
  registerSpell(a);
  if(!reacted)setMsg(`<b style="color:hsl(${ELHUE[a.element]},80%,60%)">${a.element}</b> <span class="dim">시전 (power ${a.power})</span>`);
});

// ---- ritual grid draw ----
const gridEl=document.getElementById('grid'),msgEl=document.getElementById('msg');
const roEl=document.getElementById('roEl'),roPow=document.getElementById('roPow');
const cellEls=[];
for(let i=0;i<25;i++){const d=document.createElement('div');d.className='cell'+(LEY.has(i)?' ley':'');d.dataset.i=i;gridEl.appendChild(d);cellEls.push(d);}
let painting=false,paintOn=true,stroke=new Set();
function cellAt(x,y){const el=document.elementFromPoint(x,y);return (el&&el.classList.contains('cell'))?+el.dataset.i:-1;}
function paint(i){if(i<0||stroke.has(i))return;stroke.add(i);if(paintOn)lit.add(i);else lit.delete(i);cellEls[i].classList.toggle('on',lit.has(i));readout();}
gridEl.addEventListener('pointerdown',e=>{e.preventDefault();const i=cellAt(e.clientX,e.clientY);if(i<0)return;painting=true;paintOn=!lit.has(i);stroke=new Set();paint(i);gridEl.setPointerCapture(e.pointerId);});
gridEl.addEventListener('pointermove',e=>{if(painting)paint(cellAt(e.clientX,e.clientY));});
gridEl.addEventListener('pointerup',()=>painting=false);gridEl.addEventListener('pointercancel',()=>painting=false);
document.getElementById('clear').addEventListener('click',()=>{lit.clear();cellEls.forEach(c=>c.classList.remove('on'));readout();});
function readout(){cur=analyze(lit);if(!cur){roEl.textContent='—';roEl.style.removeProperty('--ec');roPow.textContent='—';cellEls.forEach(c=>c.style.removeProperty('--ec'));return;}
  const hue=ELHUE[cur.element];roEl.textContent=cur.element;roEl.style.setProperty('--ec',`hsl(${hue},80%,62%)`);roPow.textContent=cur.power;
  cellEls.forEach((c,i)=>{if(lit.has(i)){c.style.setProperty('--ec',`hsl(${hue},80%,60%)`);c.style.setProperty('--eg',`hsla(${hue},80%,55%,.5)`);}else c.style.removeProperty('--ec');});}

// ---- spell grimoire (discovered glyphs) ----
const spells=JSON.parse(localStorage.getItem('funlab:magic:spells')||'[]'); // [{glyph,element,power}]
const spellSet=new Set(spells.map(s=>s.glyph));
function registerSpell(a){const glyph=a.cells.join(',');if(spellSet.has(glyph))return;spellSet.add(glyph);spells.unshift({glyph,element:a.element,power:a.power});
  localStorage.setItem('funlab:magic:spells',JSON.stringify(spells));renderSpells();}
const grimEl=document.getElementById('grimoire'),spellCntEl=document.getElementById('spellCnt');
function renderSpells(){grimEl.innerHTML='';spells.slice(0,18).forEach(s=>{const on=new Set(s.glyph.split(',').map(Number));const d=document.createElement('div');d.className='rune';d.style.setProperty('--rc',`hsl(${ELHUE[s.element]},80%,62%)`);
  let h='';for(let i=0;i<25;i++)h+=`<i class="${on.has(i)?'l':''}"></i>`;d.innerHTML=h;d.title=`${s.element} · power ${s.power}`;
  d.addEventListener('click',()=>{lit=new Set([...on]);cellEls.forEach((c,i)=>c.classList.toggle('on',on.has(i)));readout();setMsg('<span class="dim">불러옴 — <b>화이트룸</b>을 클릭해 시전</span>');});
  grimEl.appendChild(d);});spellCntEl.textContent=spells.length;}

// ---- combos panel ----
const clistEl=document.getElementById('clist'),comboCntEl=document.getElementById('comboCnt');
function renderCombos(){clistEl.innerHTML='';const keys=Object.keys(REACT);keys.forEach(k=>{const got=discovered.has(k);const[a,b]=k.split('+');const d=document.createElement('div');d.className='citem'+(got?'':' locked');
  d.innerHTML=got?`<b>${a}</b> <span class="ar">+</span> <b>${b}</b> <span class="ar">→</span> <b>${REACT[k].name}</b>`:`?? <span class="ar">+</span> ?? <span class="ar">→</span> ???`;clistEl.appendChild(d);});
  comboCntEl.textContent=`${discovered.size}/${keys.length}`;}
function setMsg(h){msgEl.innerHTML=h;}

// ---- init ----
fit();renderSpells();renderCombos();readout();
setMsg('<span class="dim">중앙에서 칸을 <b>이어 그려</b> 보라 — 모양이 곧 마법이다</span>');
requestAnimationFrame(frame);
</script>
</body>
