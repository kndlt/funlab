<style>
  :root{--bg:#14110d;--panel:#1d1812;--line:#3a3024;--cream:#f6ead8;--ink:#e7dcc8;--muted:#a9977e;--amber:#ffb154}
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;line-height:1.6;
    background-image:radial-gradient(60% 45% at 80% -8%,rgba(255,178,84,.10),transparent 60%);-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:50}.back:hover{color:var(--amber)}
  .wrap{max-width:980px;margin:0 auto;padding:46px 14px 70px;display:flex;flex-direction:column;align-items:center}
  h1{font-size:27px;font-weight:800;letter-spacing:1px;background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:12px;margin-top:4px;text-align:center;max-width:560px}
  .layout{display:flex;gap:18px;margin-top:18px;width:100%;justify-content:center;flex-wrap:wrap;align-items:flex-start}
  .col{display:flex;flex-direction:column;gap:11px}
  .grid{display:grid;grid-template-columns:repeat(5,42px);grid-template-rows:repeat(5,42px);gap:5px;padding:13px;
    background:var(--panel);border:1px solid var(--line);border-radius:15px;box-shadow:inset 0 0 40px rgba(0,0,0,.45);touch-action:none}
  .cell{border:1px solid var(--line);border-radius:8px;background:#191309;cursor:pointer;position:relative;transition:background .15s,box-shadow .25s,border-color .15s}
  .cell.ley::after{content:"";position:absolute;inset:0;margin:auto;width:4px;height:4px;border-radius:50%;background:#4a3a22}
  .cell:hover{border-color:#6d5226;background:#211810}
  .cell.on{border-color:#ffce86;background:radial-gradient(circle at 38% 32%,#fff0cf,var(--ec,#ffb154) 62%);box-shadow:0 0 10px var(--eg,rgba(255,178,84,.55));animation:breathe 2.6s ease-in-out infinite}
  .cell.on.ley::after{background:#fff;box-shadow:0 0 6px #fff}
  @keyframes breathe{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}
  .readout{display:flex;gap:6px;justify-content:center}
  .ro{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:5px 11px;text-align:center;min-width:80px}
  .ro .lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .ro .val{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums}.ro .el{color:var(--ec,var(--muted))}
  .controls{display:flex;gap:7px;justify-content:center}
  .ghost{background:#241c12;color:var(--muted);border:1px solid var(--line);border-radius:17px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}
  .ghost:hover{border-color:#7a5a30;color:var(--ink)}
  .msg{min-height:34px;max-width:280px;text-align:center;font-size:12px;color:var(--ink);align-self:center}
  .msg .hot{color:#ffd479;font-weight:800}.msg .dim{color:var(--muted)}.msg b{color:var(--cream)}
  .room{display:block;border-radius:14px;border:1px solid #cfc7b6;cursor:crosshair;touch-action:none;
    width:440px;height:440px;max-width:80vw;max-height:80vw;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  .combos{width:200px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px}
  .panel h2{font-size:13px;color:var(--cream);font-weight:800;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
  .panel h2 .cnt{font-size:11px;color:var(--muted);font-weight:600}
  .clist{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto}
  .citem{font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:#191309}
  .citem b{color:var(--cream)}.citem .ar{color:var(--muted)}.citem.locked{opacity:.4}.citem.locked b{color:#6a5c47}
  .grimoire{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:300px}
  .rune{width:30px;height:30px;border:1px solid var(--line);border-radius:7px;display:grid;grid-template-columns:repeat(5,1fr);gap:1px;padding:3px;background:#191309;cursor:pointer}
  .rune i{border-radius:1px;background:#241c12}.rune i.l{background:var(--rc);box-shadow:0 0 2px var(--rc)}
  footer{margin-top:30px;color:#6f6150;font-size:11px;text-align:center}
</style>

<body>
<a class="back" href="../../index.html">← funlab</a>
<div class="wrap">
  <h1>✦ 마법진 ✦</h1>
  <p class="sub">왼쪽 격자에 <b>문양</b>을 그려 마법을 정하고, <b>화이트 룸</b>을 클릭해 시전하라. 두 마법을 겹치면 — 불에 바람을 부으면 번지고, 불에 물을 부으면 증기가 된다.</p>
  <div class="layout">
    <div class="col">
      <div class="grid" id="grid"></div>
      <div class="readout">
        <div class="ro"><div class="lbl">속성</div><div class="val el" id="roEl">—</div></div>
        <div class="ro"><div class="lbl">power</div><div class="val" id="roPow">—</div></div>
      </div>
      <div class="controls"><button class="ghost" id="clear">문양 지우기</button></div>
      <div class="msg" id="msg"></div>
      <div class="grimoire" id="grimoire"></div>
    </div>
    <div class="col"><canvas class="room" id="room" width="520" height="520"></canvas></div>
    <div class="col combos">
      <div class="panel"><h2>📖 발견한 마법 <span class="cnt" id="spellCnt"></span></h2>
        <div style="font-size:11px;color:var(--muted)">격자에 그려 처음 시전하면 등록된다.</div></div>
      <div class="panel"><h2>⚗️ 조합 <span class="cnt" id="comboCnt"></span></h2><div class="clist" id="clist"></div></div>
    </div>
  </div>
  <footer>research prototype · 화이트룸에서 마법을 시전하고, 섞어라</footer>
</div>

<script>
"use strict";
// ════════════════════════════════════════════════════════════════════════
// 마법진 — draw a glyph (geometry → element + power), cast it into a bright
// WHITE ROOM as a SUSTAINED, element-distinct particle effect that lingers.
// Each element has its own look, motion and residue; particles interact, so
// casting a 2nd element onto active ones discovers a reaction.
// ════════════════════════════════════════════════════════════════════════
const LEY=new Set([6,8,12,16,18]);
const rc=i=>[Math.floor(i/5),i%5], idx=(r,c)=>r*5+c;
function analyze(lit){
  const cells=[...lit].sort((a,b)=>a-b);const n=cells.length;if(!n)return null;
  let minR=9,maxR=-1,minC=9,maxC=-1;const set=new Set(cells);
  cells.forEach(i=>{const[r,c]=rc(i);minR=Math.min(minR,r);maxR=Math.max(maxR,r);minC=Math.min(minC,c);maxC=Math.max(maxC,c);});
  const h=maxR-minR+1,w=maxC-minC+1;
  const symV=cells.every(i=>{const[r,c]=rc(i);return set.has(idx(r,4-c));});
  const symH=cells.every(i=>{const[r,c]=rc(i);return set.has(idx(4-r,c));});
  const symD=cells.every(i=>{const[r,c]=rc(i);return set.has(idx(c,r));});
  const rot4=cells.every(i=>{const[r,c]=rc(i);return set.has(idx(c,4-r));});
  const empty=new Set();for(let i=0;i<25;i++)if(!set.has(i))empty.add(i);
  const reach=new Set(),st=[];
  for(let i=0;i<25;i++){const[r,c]=rc(i);if((r===0||r===4||c===0||c===4)&&empty.has(i)){reach.add(i);st.push(i);}}
  while(st.length){const i=st.pop();const[r,c]=rc(i);[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{if(nr<0||nc<0||nr>4||nc>4)return;const j=idx(nr,nc);if(empty.has(j)&&!reach.has(j)){reach.add(j);st.push(j);}});}
  const holes=[...empty].filter(i=>!reach.has(i)).length;
  let ley=0;LEY.forEach(i=>{if(set.has(i))ley++;});
  let connected=true;{const seen=new Set([cells[0]]),q=[cells[0]];while(q.length){const i=q.pop();const[r,c]=rc(i);[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{if(nr<0||nc<0||nr>4||nc>4)return;const j=idx(nr,nc);if(set.has(j)&&!seen.has(j)){seen.add(j);q.push(j);}});}connected=seen.size===n;}
  let element;
  if(holes>0) element='바위'; else if(h-w>=2) element='벼락'; else if(w-h>=2) element='물결';
  else if(rot4||(symV&&symH)) element='빛'; else if(symD) element='바람'; else element='불꽃';
  let power=n;if(symV)power+=2;if(symH)power+=2;if(symD)power+=1;if(rot4)power+=4;power+=holes*3;power+=ley*2;if(connected&&n>=3)power+=3;
  return {cells,element,power};
}
const ELHUE={'불꽃':18,'물결':205,'바람':150,'벼락':265,'바위':30,'빛':48};

// ════════════ particle engine ════════════
const cv=document.getElementById('room'),ctx=cv.getContext('2d');
let W=0,H=0,S=1,FLOOR=0;            // S = device-pixel scale
function fit(){S=Math.max(1,Math.min(2.5,window.devicePixelRatio||1));const css=cv.getBoundingClientRect().width;cv.width=Math.round(css*S);cv.height=Math.round(css*S);W=cv.width;H=cv.height;FLOOR=H*0.86;}
window.addEventListener('resize',fit);
const rnd=(a,b)=>a+Math.random()*(b-a);
const P=[];        // particles  {el,kind,...}
const EM=[];       // sustained emitters {el,x,y,power,t,dur}
const RES=[];      // residue (scorch/puddle/rockpile/bloom)  long-lived
const G=[];        // wind force fields
const BOLT=[];     // lightning bolts/flashes
const MAXP=1100;
function add(p){if(P.length<MAXP)P.push(p);}

const DUR={'불꽃':230,'물결':70,'바람':150,'벼락':64,'바위':30,'빛':150};
function cast(el,x,y,power,aim){
  BOLT.push({kind:'ring',x,y,r:6*S,rr:(22+power*3)*S,life:16,max:16,hue:ELHUE[el]});
  EM.push({el,x,y,power,t:0,dur:DUR[el],aim});
  if(el==='불꽃')RES.push({kind:'scorch',x,y:Math.min(y+10*S,FLOOR),r:(16+power*3)*S,life:360,max:360});
  if(el==='물결')RES.push({kind:'puddle',x,y:FLOOR,w:(10+power*2)*S,grow:(20+power*4)*S,life:520,max:520});
  if(el==='빛')RES.push({kind:'bloom',x,y,r:(20+power*4)*S,life:150,max:150});
  if(el==='바람'){const ax=aim?aim.ax:(rnd(0,1)<.5?-1:1),ay=aim?aim.ay:-.15;G.push({x,y,r:(80+power*8)*S,life:DUR['바람'],fx:ax*.55*S,fy:ay*.45*S});}
  if(el==='벼락')strike(x,y,power);
}
function strike(x,y,power){
  for(let b=0;b<2+(power>10?1:0);b++){
    const segs=[];let px=x+rnd(-40,40)*S,py=0,depth=0;
    (function branch(sx,sy,tx,ty,d){let cx=sx,cy=sy;while(cy<ty){const ny=cy+rnd(12,26)*S;const nx=cx+rnd(-20,20)*S;segs.push([cx,cy,nx,Math.min(ny,ty)]);if(d<2&&Math.random()<.3)branch(cx,cy,cx+rnd(-50,50)*S,cy+rnd(30,70)*S,d+1);cx=nx;cy=ny;}})(px,py,x,y,0);
    BOLT.push({kind:'bolt',segs,life:rnd(6,12)|0,max:12,w:(1.4+power*.12)*S,delay:b*4});
  }
  for(let i=0;i<10+power*2;i++)add({el:'벼락',kind:'spark',x,y,vx:rnd(-4,4)*S,vy:rnd(-4,1)*S,life:rnd(10,22),max:22,r:rnd(1.5,3)*S});
  BOLT.push({kind:'flash',life:6,max:6});
}
function emit(e){
  const el=e.el,x=e.x,y=e.y,pw=e.power;
  const axp=e.aim?e.aim.ax*2.6*S:0, ayp=e.aim?e.aim.ay*2.6*S:0;   // aim biases launch direction
  if(el==='불꽃'){const n=2+Math.round(pw/4);for(let i=0;i<n;i++){const smoke=Math.random()<.12;add({el,kind:smoke?'smoke':'fire',x:x+rnd(-7,7)*S,y:y+rnd(-3,3)*S,vx:rnd(-.4,.4)*S+axp,vy:-rnd(.8,2.0)*S+ayp,life:smoke?rnd(40,70):rnd(26,52),max:smoke?70:52,r:rnd(5,10)*S});}}
  else if(el==='물결'){const n=3+Math.round(pw/3);for(let i=0;i<n;i++)add({el,kind:'drop',x:x+rnd(-6,6)*S,y,vx:rnd(-2.4,2.4)*S+axp,vy:-rnd(2,4.2)*S+ayp,life:200,max:200,r:rnd(2.5,4.5)*S});}
  else if(el==='바람'){const n=2+Math.round(pw/4);for(let i=0;i<n;i++){const a=rnd(0,6.28),rad=rnd(6,40)*S;add({el,kind:'wind',x:x+Math.cos(a)*rad,y:y+Math.sin(a)*rad,vx:-Math.sin(a)*rnd(2,4)*S+axp*1.4,vy:Math.cos(a)*rnd(2,4)*S+ayp*1.4,life:rnd(22,42),max:42,r:rnd(8,18)*S});}}
  else if(el==='바위'){const n=2+Math.round(pw/3);for(let i=0;i<n;i++)add({el,kind:'rock',x:x+rnd(-8,8)*S,y:y+rnd(-6,6)*S,vx:rnd(-2.4,2.4)*S+axp,vy:-rnd(2,4.5)*S+ayp,life:600,max:600,r:rnd(4,9)*S,rot:rnd(0,6.28),vr:rnd(-.2,.2),sh:rnd(.7,1),verts:rockVerts()});}
  else if(el==='빛'){const n=2+Math.round(pw/4);for(let i=0;i<n;i++){const a=rnd(0,6.28),sp=rnd(.4,1.6)*S;add({el,kind:'mote',x:x+rnd(-6,6)*S,y:y+rnd(-6,6)*S,vx:Math.cos(a)*sp+axp*.4,vy:Math.sin(a)*sp-.3*S+ayp*.4,life:rnd(60,110),max:110,r:rnd(2.5,6)*S});}}
}
function rockVerts(){const v=[],k=6+(Math.random()*3|0);for(let i=0;i<k;i++){const a=i/k*6.28;const rr=rnd(.6,1);v.push([Math.cos(a)*rr,Math.sin(a)*rr]);}return v;}

// reactions
const REACT={'물결+불꽃':{name:'증기',fx:steam},'바람+불꽃':{name:'화염폭풍',fx:firestorm},'벼락+불꽃':{name:'폭발',fx:explode},'물결+벼락':{name:'감전',fx:shock},'바람+물결':{name:'비',fx:rainspread},'바람+바위':{name:'모래폭풍',fx:dust}};
const discovered=new Set(JSON.parse(localStorage.getItem('funlab:magic:combos')||'[]'));
function rkey(a,b){return [a,b].sort().join('+');}
function tryReact(el,x,y,power){
  const rr=(90+power*6)*S,r2=rr*rr,hits={};
  for(const p of P){if(p.el===el)continue;const dx=p.x-x,dy=p.y-y;if(dx*dx+dy*dy<r2){const k=rkey(el,p.el);if(REACT[k])(hits[k]=hits[k]||[]).push(p);}}
  let any=null;
  for(const k in hits){REACT[k].fx(x,y,power,hits[k]);any=k;
    if(!discovered.has(k)){discovered.add(k);localStorage.setItem('funlab:magic:combos',JSON.stringify([...discovered]));renderCombos();setMsg(`<span class="hot">⚗️ 새 조합 발견 — ${REACT[k].name}!</span>`);}}
  return any;
}
function steam(x,y,pw,ps){ps.forEach(p=>{p.life=Math.min(p.life,5);for(let i=0;i<2;i++)add({el:'증기',kind:'smoke',x:p.x,y:p.y,vx:rnd(-.6,.6)*S,vy:-rnd(.6,1.6)*S,life:rnd(50,90),max:90,r:rnd(8,16)*S,steam:1});});}
function firestorm(x,y,pw,ps){ps.forEach(p=>{p.vy-=rnd(.6,1.6)*S;p.life+=18;});EM.push({el:'불꽃',x,y,power:pw+4,t:0,dur:120});G.push({x,y,r:120*S,life:50,fx:rnd(.3,.6)*S*(rnd(0,1)<.5?-1:1),fy:-.1*S});}
function explode(x,y,pw,ps){ps.forEach(p=>p.life=Math.min(p.life,3));for(let i=0;i<40+pw*2;i++){const a=rnd(0,6.28),sp=rnd(3,9)*S;add({el:'불꽃',kind:'fire',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(18,40),max:40,r:rnd(4,9)*S});}BOLT.push({kind:'shock',x,y,r:10*S,rr:(70+pw*8)*S,life:14,max:14});BOLT.push({kind:'flash',life:5,max:5});}
function shock(x,y,pw,ps){ps.forEach(p=>{p.hue=270;for(let i=0;i<2;i++)add({el:'벼락',kind:'spark',x:p.x,y:p.y,vx:rnd(-3,3)*S,vy:rnd(-3,3)*S,life:rnd(8,16),max:16,r:rnd(1.5,3)*S});});BOLT.push({kind:'flash',life:5,max:5});}
function rainspread(x,y,pw,ps){for(let i=0;i<26;i++)add({el:'물결',kind:'drop',x:x+rnd(-70,70)*S,y:y-rnd(20,90)*S,vx:rnd(-.5,.5)*S,vy:rnd(1.4,3.4)*S,life:200,max:200,r:rnd(2,3.5)*S});}
function dust(x,y,pw,ps){G.push({x,y,r:140*S,life:60,fx:rnd(.4,.8)*S,fy:0});for(let i=0;i<26;i++)add({el:'바위',kind:'mote',x:x+rnd(-40,40)*S,y:y+rnd(-30,30)*S,vx:rnd(2,6)*S,vy:rnd(-1,1)*S,life:rnd(30,60),max:60,r:rnd(2,5)*S});}

// ---- update ----
function step(){
  for(let i=EM.length-1;i>=0;i--){const e=EM[i];if(e.t<e.dur)emit(e);e.t++;if(e.t>e.dur+4)EM.splice(i,1);}
  for(let i=G.length-1;i>=0;i--){if(--G[i].life<=0)G.splice(i,1);}
  for(let i=BOLT.length-1;i>=0;i--){const b=BOLT[i];if(b.delay&&b.delay-->0)continue;if(--b.life<=0)BOLT.splice(i,1);}
  for(let i=RES.length-1;i>=0;i--){const r=RES[i];r.life--;if(r.kind==='puddle'&&r.w<r.grow)r.w+=.6*S;if(r.life<=0)RES.splice(i,1);}
  for(let i=P.length-1;i>=0;i--){
    const p=P[i];
    for(const g of G){const dx=p.x-g.x,dy=p.y-g.y;if(dx*dx+dy*dy<g.r*g.r){p.vx+=g.fx;p.vy+=g.fy;}}
    if(p.kind==='fire'){p.vy-=.03*S;p.vx+=rnd(-.18,.18)*S;p.vx*=.98;p.r*=.992;}
    else if(p.kind==='smoke'){p.vy-=.02*S;p.vx+=rnd(-.12,.12)*S;p.r*=1.004;}
    else if(p.kind==='drop'){p.vy+=.2*S;}
    else if(p.kind==='wind'){p.vx*=.94;p.vy*=.94;p.r*=1.01;}
    else if(p.kind==='rock'){p.vy+=.24*S;p.vx*=.99;p.rot+=p.vr;}
    else if(p.kind==='mote'){p.vx*=.98;p.vy=p.vy*.98-.2*S;}
    else if(p.kind==='spark'){p.vy+=.18*S;}
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.kind==='drop'&&p.y>=FLOOR){ // splash → feed nearest puddle
      BOLT.push({kind:'splash',x:p.x,y:FLOOR,r:2*S,rr:rnd(6,12)*S,life:10,max:10});
      let near=null,nd=1e9;for(const r of RES)if(r.kind==='puddle'){const d=Math.abs(r.x-p.x);if(d<nd){nd=d;near=r;}}
      if(near&&nd<near.grow)near.life=Math.min(near.max,near.life+30);
      P.splice(i,1);continue;
    }
    if(p.kind==='rock'&&p.y>=FLOOR){RES.push({kind:'rockpile',x:p.x,y:FLOOR,r:p.r,sh:p.sh,rot:p.rot,verts:p.verts,life:560,max:560});P.splice(i,1);continue;}
    if(p.life<=0||p.x<-50||p.x>W+50||p.y>H+30)P.splice(i,1);
  }
}
// ---- render ----
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#f6f2ea');g.addColorStop(.84,'#e9e3d6');g.addColorStop(.85,'#d6cdb9');g.addColorStop(1,'#c7bca4');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(120,105,80,.10)';ctx.lineWidth=1;ctx.beginPath();
  for(let x=0;x<=W;x+=W/10){ctx.moveTo(x,FLOOR);ctx.lineTo(W/2+(x-W/2)*.4,H);}for(let y=FLOOR;y<=H;y+=(H-FLOOR)/4){ctx.moveTo(0,y);ctx.lineTo(W,y);}ctx.stroke();

  // residue (under particles)
  for(const r of RES){const a=Math.min(1,r.life/r.max);
    if(r.kind==='scorch'){ctx.globalAlpha=a*.5;ctx.fillStyle='#2a1c10';ctx.beginPath();ctx.ellipse(r.x,r.y,r.r,r.r*.4,0,0,6.28);ctx.fill();}
    else if(r.kind==='puddle'){ctx.globalAlpha=a*.6;ctx.fillStyle='#3a86c4';ctx.beginPath();ctx.ellipse(r.x,r.y,r.w,r.w*.32,0,0,6.28);ctx.fill();ctx.globalAlpha=a*.4;ctx.fillStyle='#bfe3ff';ctx.beginPath();ctx.ellipse(r.x-r.w*.3,r.y-r.w*.06,r.w*.4,r.w*.1,0,0,6.28);ctx.fill();}
    else if(r.kind==='rockpile'){drawRock(r.x,r.y-r.r*.4,r.r,r.rot,r.sh,r.verts,a);}
    else if(r.kind==='bloom'){const t=1-a;ctx.globalAlpha=a*.5;const rg=ctx.createRadialGradient(r.x,r.y,0,r.x,r.y,r.r*(1+t));rg.addColorStop(0,'rgba(255,212,90,.9)');rg.addColorStop(1,'rgba(255,180,40,0)');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(r.x,r.y,r.r*(1+t),0,6.28);ctx.fill();
      ctx.globalAlpha=a*.6;ctx.strokeStyle='rgba(255,220,120,.9)';ctx.lineWidth=2*S;ctx.beginPath();ctx.arc(r.x,r.y,r.r*(.4+t*1.6),0,6.28);ctx.stroke();}
  }
  ctx.globalAlpha=1;

  // particles
  for(const p of P){
    const a=Math.max(0,Math.min(1,p.life/p.max));
    if(p.kind==='fire'){const t=1-p.life/p.max;const hue=50-t*44,li=62-t*22;ctx.globalAlpha=a*.4;ctx.shadowColor=`hsl(${hue},95%,55%)`;ctx.shadowBlur=14*S;ctx.fillStyle=`hsl(${hue},95%,${li}%)`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=a;ctx.fillStyle=`hsl(${Math.min(55,hue+10)},100%,${li+14}%)`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*.5,0,6.28);ctx.fill();}
    else if(p.kind==='smoke'){ctx.globalAlpha=a*(p.steam?.5:.28);ctx.fillStyle=p.steam?'#dfe2e6':'#7d756c';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();}
    else if(p.kind==='drop'){ctx.globalAlpha=a;ctx.fillStyle='#2f86c8';const sp=Math.hypot(p.vx,p.vy),ang=Math.atan2(p.vy,p.vx);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(ang);ctx.beginPath();ctx.ellipse(0,0,p.r*(1+sp*.05),p.r*.7,0,0,6.28);ctx.fill();ctx.restore();ctx.globalAlpha=a*.7;ctx.fillStyle='#cdebff';ctx.beginPath();ctx.arc(p.x-p.r*.2,p.y-p.r*.2,p.r*.3,0,6.28);ctx.fill();}
    else if(p.kind==='wind'){ctx.globalAlpha=a*.32;ctx.strokeStyle='#ffffff';ctx.lineWidth=Math.max(1,p.r*.16);ctx.beginPath();ctx.arc(p.x,p.y,p.r,Math.atan2(p.vy,p.vx),Math.atan2(p.vy,p.vx)+1.6);ctx.stroke();}
    else if(p.kind==='rock'){drawRock(p.x,p.y,p.r,p.rot,p.sh,p.verts,a);}
    else if(p.kind==='mote'){ctx.globalAlpha=a*.4;ctx.shadowColor='#ffd86a';ctx.shadowBlur=10*S;ctx.fillStyle='#ffe39a';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=a;ctx.fillStyle='#fff6d8';ctx.beginPath();ctx.arc(p.x,p.y,p.r*.5,0,6.28);ctx.fill();}
    else if(p.kind==='spark'){ctx.globalAlpha=a;ctx.shadowColor='#b9a8ff';ctx.shadowBlur=8*S;ctx.fillStyle='#e7e0ff';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();ctx.shadowBlur=0;}
  }
  ctx.globalAlpha=1;

  // bolts / flashes / rings
  for(const b of BOLT){if(b.delay&&b.delay>0)continue;const a=b.life/b.max;
    if(b.kind==='bolt'){ctx.globalAlpha=a;ctx.strokeStyle='#cfd8ff';ctx.lineWidth=b.w;ctx.shadowColor='#9a7dff';ctx.shadowBlur=16*S;ctx.beginPath();b.segs.forEach(s=>{ctx.moveTo(s[0],s[1]);ctx.lineTo(s[2],s[3]);});ctx.stroke();ctx.lineWidth=b.w*.4;ctx.strokeStyle='#ffffff';ctx.stroke();ctx.shadowBlur=0;}
    else if(b.kind==='flash'){ctx.globalAlpha=a*.18;ctx.fillStyle='#dbe0ff';ctx.fillRect(0,0,W,H);}
    else if(b.kind==='ring'){ctx.globalAlpha=a*.7;ctx.strokeStyle=`hsl(${b.hue},80%,60%)`;ctx.lineWidth=2*S;ctx.beginPath();ctx.arc(b.x,b.y,b.r+(b.rr-b.r)*(1-a),0,6.28);ctx.stroke();}
    else if(b.kind==='shock'){ctx.globalAlpha=a*.6;ctx.strokeStyle='#ffcaa0';ctx.lineWidth=3*S;ctx.beginPath();ctx.arc(b.x,b.y,b.r+(b.rr-b.r)*(1-a),0,6.28);ctx.stroke();}
    else if(b.kind==='splash'){ctx.globalAlpha=a*.6;ctx.strokeStyle='#9fd0f5';ctx.lineWidth=1.5*S;ctx.beginPath();ctx.arc(b.x,b.y,b.r+(b.rr-b.r)*(1-a),0,Math.PI,true);ctx.stroke();}
  }
  ctx.globalAlpha=1;
  // aim guide while dragging
  if(aiming){const dx=aiming.ex-aiming.sx,dy=aiming.ey-aiming.sy,m=Math.hypot(dx,dy);
    ctx.globalAlpha=.65;ctx.strokeStyle='rgba(50,34,16,.7)';ctx.lineWidth=2*S;ctx.setLineDash([6*S,5*S]);
    ctx.beginPath();ctx.moveTo(aiming.sx,aiming.sy);ctx.lineTo(aiming.ex,aiming.ey);ctx.stroke();ctx.setLineDash([]);
    if(m>12*S){const ang=Math.atan2(dy,dx);ctx.beginPath();ctx.moveTo(aiming.ex,aiming.ey);ctx.lineTo(aiming.ex-Math.cos(ang-.4)*9*S,aiming.ey-Math.sin(ang-.4)*9*S);ctx.moveTo(aiming.ex,aiming.ey);ctx.lineTo(aiming.ex-Math.cos(ang+.4)*9*S,aiming.ey-Math.sin(ang+.4)*9*S);ctx.stroke();}
    ctx.fillStyle='rgba(50,34,16,.6)';ctx.beginPath();ctx.arc(aiming.sx,aiming.sy,3*S,0,6.28);ctx.fill();ctx.globalAlpha=1;}
}
function drawRock(x,y,r,rot,sh,verts,a){ctx.globalAlpha=a;ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.beginPath();verts.forEach((v,i)=>{const px=v[0]*r,py=v[1]*r;i?ctx.lineTo(px,py):ctx.moveTo(px,py);});ctx.closePath();ctx.fillStyle=`hsl(28,18%,${42*sh}%)`;ctx.fill();ctx.strokeStyle='rgba(30,22,14,.5)';ctx.lineWidth=1.2;ctx.stroke();ctx.restore();}
function loop(){step();draw();requestAnimationFrame(loop);}

// ---- cast input ----
let lit=new Set(),cur=null,aiming=null;
function roomXY(e){const r=cv.getBoundingClientRect();return [(e.clientX-r.left)/r.width*W,(e.clientY-r.top)/r.height*H];}
// click = cast at point; drag = aim the spell's direction (release to fire)
cv.addEventListener('pointerdown',e=>{e.preventDefault();const a=analyze(lit);if(!a){setMsg('<span class="dim">먼저 왼쪽에 <b>문양</b>을 그려라</span>');return;}
  const[x,y]=roomXY(e);aiming={sx:x,sy:y,ex:x,ey:y};cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{if(!aiming)return;const[x,y]=roomXY(e);aiming.ex=x;aiming.ey=y;});
cv.addEventListener('pointerup',()=>{if(!aiming)return;const A=aiming;aiming=null;const a=analyze(lit);if(!a)return;
  const dx=A.ex-A.sx,dy=A.ey-A.sy,mag=Math.hypot(dx,dy);
  const aim=mag>12*S?{ax:dx/mag,ay:dy/mag,mag:Math.min(mag,150*S)}:null;
  const reacted=tryReact(a.element,A.sx,A.sy,a.power);cast(a.element,A.sx,A.sy,a.power,aim);registerSpell(a);
  if(!reacted)setMsg(`<b style="color:hsl(${ELHUE[a.element]},80%,58%)">${a.element}</b> <span class="dim">시전 (power ${a.power})${aim?' · 방향 지정':''}</span>`);});
cv.addEventListener('pointercancel',()=>aiming=null);

// ---- ritual grid ----
const gridEl=document.getElementById('grid'),msgEl=document.getElementById('msg');
const roEl=document.getElementById('roEl'),roPow=document.getElementById('roPow');
const cellEls=[];for(let i=0;i<25;i++){const d=document.createElement('div');d.className='cell'+(LEY.has(i)?' ley':'');d.dataset.i=i;gridEl.appendChild(d);cellEls.push(d);}
let painting=false,paintOn=true,strokeSet=new Set();
function cellAt(x,y){const el=document.elementFromPoint(x,y);return (el&&el.classList.contains('cell'))?+el.dataset.i:-1;}
function paint(i){if(i<0||strokeSet.has(i))return;strokeSet.add(i);if(paintOn)lit.add(i);else lit.delete(i);cellEls[i].classList.toggle('on',lit.has(i));readout();}
gridEl.addEventListener('pointerdown',e=>{e.preventDefault();const i=cellAt(e.clientX,e.clientY);if(i<0)return;painting=true;paintOn=!lit.has(i);strokeSet=new Set();paint(i);gridEl.setPointerCapture(e.pointerId);});
gridEl.addEventListener('pointermove',e=>{if(painting)paint(cellAt(e.clientX,e.clientY));});
gridEl.addEventListener('pointerup',()=>painting=false);gridEl.addEventListener('pointercancel',()=>painting=false);
document.getElementById('clear').addEventListener('click',()=>{lit.clear();cellEls.forEach(c=>c.classList.remove('on'));readout();});
function readout(){cur=analyze(lit);if(!cur){roEl.textContent='—';roEl.style.removeProperty('--ec');roPow.textContent='—';cellEls.forEach(c=>c.style.removeProperty('--ec'));return;}
  const hue=ELHUE[cur.element];roEl.textContent=cur.element;roEl.style.setProperty('--ec',`hsl(${hue},80%,60%)`);roPow.textContent=cur.power;
  cellEls.forEach((c,i)=>{if(lit.has(i)){c.style.setProperty('--ec',`hsl(${hue},80%,58%)`);c.style.setProperty('--eg',`hsla(${hue},80%,52%,.5)`);}else c.style.removeProperty('--ec');});}

// ---- spell grimoire ----
const spells=JSON.parse(localStorage.getItem('funlab:magic:spells')||'[]');const spellSet=new Set(spells.map(s=>s.glyph));
function registerSpell(a){const glyph=a.cells.join(',');if(spellSet.has(glyph))return;spellSet.add(glyph);spells.unshift({glyph,element:a.element,power:a.power});localStorage.setItem('funlab:magic:spells',JSON.stringify(spells));renderSpells();}
const grimEl=document.getElementById('grimoire'),spellCntEl=document.getElementById('spellCnt');
function renderSpells(){grimEl.innerHTML='';spells.slice(0,18).forEach(s=>{const on=new Set(s.glyph.split(',').map(Number));const d=document.createElement('div');d.className='rune';d.style.setProperty('--rc',`hsl(${ELHUE[s.element]},80%,60%)`);let h='';for(let i=0;i<25;i++)h+=`<i class="${on.has(i)?'l':''}"></i>`;d.innerHTML=h;d.title=`${s.element} · power ${s.power}`;
  d.addEventListener('click',()=>{lit=new Set([...on]);cellEls.forEach((c,i)=>c.classList.toggle('on',on.has(i)));readout();setMsg('<span class="dim">불러옴 — <b>화이트룸</b>을 클릭해 시전</span>');});grimEl.appendChild(d);});spellCntEl.textContent=spells.length;}

// ---- combos ----
const clistEl=document.getElementById('clist'),comboCntEl=document.getElementById('comboCnt');
function renderCombos(){clistEl.innerHTML='';const keys=Object.keys(REACT);keys.forEach(k=>{const got=discovered.has(k);const[a,b]=k.split('+');const d=document.createElement('div');d.className='citem'+(got?'':' locked');d.innerHTML=got?`<b>${a}</b> <span class="ar">+</span> <b>${b}</b> <span class="ar">→</span> <b>${REACT[k].name}</b>`:`?? <span class="ar">+</span> ?? <span class="ar">→</span> ???`;clistEl.appendChild(d);});comboCntEl.textContent=`${discovered.size}/${keys.length}`;}
function setMsg(h){msgEl.innerHTML=h;}

// ---- init ----
fit();renderSpells();renderCombos();readout();setMsg('<span class="dim">중앙에서 칸을 <b>이어 그려</b> 보라 — 모양이 곧 마법이다</span>');
requestAnimationFrame(loop);
</script>
</body>
</html>
