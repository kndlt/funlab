<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>조합 발견 · funlab</title>
<style>
  :root{
    --bg:#14110d;--panel:#1d1812;--panel2:#231c12;--line:#3a3024;
    --cream:#f6ead8;--ink:#e7dcc8;--muted:#a9977e;--amber:#ffb154;--green:#9fd49a}
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;line-height:1.5;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:840px;margin:0 auto;padding:18px 18px 90px}
  .back{display:inline-block;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:14px}
  .back:hover{color:var(--amber)}
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  h1{font-size:26px;font-weight:800;background:linear-gradient(#fff3df,#ffcf8a);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .stats{text-align:right;white-space:nowrap}
  .count{font-size:22px;font-weight:800;color:var(--amber)}
  .count small{font-size:13px;color:var(--muted);font-weight:600}
  .hint{font-size:12px;color:var(--muted);margin-top:2px}
  .bar{height:7px;background:#11100a;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-top:18px}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#ff9e3d,#ffd591);
    transition:width .45s cubic-bezier(.2,.8,.2,1)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-top:16px}
  .panel h2{font-size:12px;letter-spacing:.6px;color:var(--muted);font-weight:700;
    text-transform:uppercase;margin-bottom:10px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel2);
    border:1px solid var(--line);border-radius:999px;padding:8px 14px 8px 12px;
    cursor:pointer;user-select:none;font-size:15px;color:var(--cream);font-weight:600;
    transition:transform .08s ease,border-color .12s,background .12s,box-shadow .12s}
  .chip .e{font-size:19px;line-height:1}
  .chip:hover{border-color:#7a5a30}
  .chip:active{transform:scale(.94)}
  .chip.sel{border-color:var(--amber);background:#2c2110;box-shadow:0 0 0 2px rgba(255,177,84,.25)}
  .chip.fresh{animation:pop .5s cubic-bezier(.2,1.3,.4,1)}
  @keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1)}}
  .stage{display:flex;align-items:center;justify-content:center;gap:14px;min-height:64px;
    margin-top:4px;flex-wrap:wrap}
  .slot{min-width:120px;height:50px;border:1.5px dashed var(--line);border-radius:12px;
    display:flex;align-items:center;justify-content:center;gap:7px;color:var(--muted);
    font-size:15px;padding:0 14px}
  .slot.filled{border-style:solid;border-color:var(--amber);color:var(--cream);background:#2c2110}
  .slot .e{font-size:20px}
  .plus{font-size:20px;color:var(--muted)}
  .actions{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
  button.btn{font-family:inherit;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;
    padding:9px 16px;border:1px solid var(--line);background:#241c12;color:var(--ink)}
  button.btn:hover{border-color:#7a5a30}
  button.btn.go{background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;border-color:transparent}
  button.btn.go:disabled{opacity:.4;cursor:default;filter:grayscale(.4)}
  button.btn:active{transform:scale(.96)}
  .reset{color:#9a8a72;background:transparent;border-color:transparent;font-size:12px}
  .reset:hover{color:#d98a8a}
  /* toast */
  #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);
    background:#241a0e;border:1px solid #6a4d22;border-radius:14px;padding:13px 22px;
    color:var(--cream);font-size:16px;font-weight:700;opacity:0;pointer-events:none;
    box-shadow:0 12px 40px rgba(0,0,0,.5);transition:opacity .25s,transform .25s;z-index:20;
    display:flex;align-items:center;gap:10px;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.discover{border-color:var(--amber);background:#2e220f;
    box-shadow:0 0 0 1px rgba(255,177,84,.4),0 12px 40px rgba(0,0,0,.5)}
  #toast .big{font-size:24px}
  #toast.dud{color:var(--muted);font-weight:600;border-color:var(--line);background:#1d1812}
  /* flash overlay */
  #flash{position:fixed;inset:0;pointer-events:none;z-index:10;opacity:0;
    background:radial-gradient(40% 40% at 50% 55%,rgba(255,177,84,.22),transparent 70%);
    transition:opacity .35s}
  #flash.on{opacity:1}
  footer{margin-top:34px;color:#7c6d58;font-size:11.5px;border-top:1px solid var(--line);padding-top:14px}
  .win{color:var(--green);font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../../index.html">← funlab</a>

  <header>
    <div>
      <h1>조합 발견</h1>
      <div class="sub">둘을 골라 합쳐봐. 새로운 게 나올지도. <b>오, 이게 되네!</b></div>
    </div>
    <div class="stats">
      <div class="count"><span id="found">0</span><small> / <span id="total">0</span> 발견</small></div>
      <div class="hint" id="hint">아직 숨어있다</div>
    </div>
  </header>

  <div class="bar"><i id="prog"></i></div>

  <div class="panel">
    <h2>합치는 곳</h2>
    <div class="stage">
      <div class="slot" id="slotA"><span class="ph">첫 번째 선택…</span></div>
      <span class="plus">+</span>
      <div class="slot" id="slotB"><span class="ph">두 번째 선택…</span></div>
    </div>
    <div class="actions">
      <button class="btn go" id="combine" disabled>✨ 합치기</button>
      <button class="btn" id="clearSel">비우기</button>
    </div>
  </div>

  <div class="panel">
    <h2>모은 원소 (<span id="palCount">0</span>)</h2>
    <div class="chips" id="palette"></div>
  </div>

  <div class="actions" style="margin-top:18px">
    <button class="btn reset" id="reset">↺ 처음부터</button>
  </div>

  <footer>같은 원소끼리도 합쳐봐 (물+물…). 진행은 이 브라우저에 저장돼(localStorage). · funlab</footer>
</div>

<div id="flash"></div>
<div id="toast"></div>

<script>
"use strict";

/* ---------- 원소 사전 ---------- */
const EMOJI = {
  // 기본 4
  "물":"💧","불":"🔥","흙":"⛰️","바람":"🌬️",
  // 파생
  "수증기":"💨","진흙":"🟤","용암":"🟧","에너지":"⚡","비":"🌧️","먼지":"🌫️",
  "바다":"🌊","구름":"☁️","돌":"🪨","벽돌":"🧱","식물":"🌱","금속":"🔩",
  "산":"🏔️","재":"⚫","늪":"🪷","생명":"🧬","인간":"🧍","전기":"🔋",
  "번개":"🌩️","물고기":"🐟","마법사":"🧙","숲":"🌲","새":"🐦","화산":"🌋",
  "칼":"🗡️","집":"🏠","소금":"🧂","농부":"👨‍🌾","폭풍":"🌀","보석":"💎","화약":"💥"
};

const BASE = ["물","불","흙","바람"];

/* ---------- 레시피 (순서 무관) ----------
   key = 두 이름을 정렬해 '+'로 이은 것. 결과는 모두 기본 4에서 도달 가능. */
const RECIPES_RAW = [
  ["물","불","수증기"],
  ["흙","물","진흙"],
  ["불","흙","용암"],
  ["바람","불","에너지"],
  ["물","바람","비"],
  ["흙","바람","먼지"],
  ["물","물","바다"],
  ["수증기","바람","구름"],
  ["용암","물","돌"],
  ["진흙","불","벽돌"],
  ["비","흙","식물"],
  ["돌","불","금속"],
  ["돌","돌","산"],
  ["식물","불","재"],
  ["식물","물","늪"],
  ["에너지","진흙","생명"],
  ["생명","흙","인간"],
  ["금속","에너지","전기"],
  ["비","에너지","번개"],
  ["바다","생명","물고기"],
  ["인간","에너지","마법사"],
  ["식물","식물","숲"],
  ["숲","바람","새"],
  ["산","불","화산"],
  ["금속","불","칼"],
  ["인간","돌","집"],
  ["바다","불","소금"],
  ["인간","식물","농부"],
  ["구름","에너지","폭풍"],
  ["돌","에너지","보석"],
  ["먼지","불","화약"]
];

function pairKey(a,b){ return [a,b].sort().join("+"); }

const RECIPES = {};
RECIPES_RAW.forEach(([a,b,r])=>{ RECIPES[pairKey(a,b)] = r; });

/* 총 원소 수 = 기본 + 파생 */
const ALL = (()=>{
  const s = new Set(BASE);
  RECIPES_RAW.forEach(([,,r])=>s.add(r));
  return [...s];
})();
const TOTAL = ALL.length;

/* ---------- 상태 / 저장 ---------- */
const SKEY = "funlab:alchemy:found";
function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(SKEY));
    if(Array.isArray(raw) && raw.length) return new Set(raw.filter(n=>EMOJI[n]));
  }catch(e){}
  return new Set(BASE);
}
function save(){ localStorage.setItem(SKEY, JSON.stringify([...found])); }

let found = load();
BASE.forEach(b=>found.add(b)); // 기본은 항상
let selA = null, selB = null;
let freshName = null; // 방금 발견한 것 → pop 애니메이션

/* ---------- DOM ---------- */
const $ = id => document.getElementById(id);
const palette = $("palette");
const slotA = $("slotA"), slotB = $("slotB");
const combineBtn = $("combine");

/* 발견 순서 유지를 위한 정렬: 기본 먼저, 그다음 발견된 순서(저장 순) */
function discoveredList(){
  const arr = [...found];
  // 기본을 앞으로
  arr.sort((a,b)=>{
    const ab = BASE.includes(a), bb = BASE.includes(b);
    if(ab && !bb) return -1;
    if(!ab && bb) return 1;
    return 0;
  });
  return arr;
}

function renderPalette(){
  palette.innerHTML = "";
  discoveredList().forEach(name=>{
    const chip = document.createElement("div");
    chip.className = "chip";
    if(name === freshName) chip.classList.add("fresh");
    chip.dataset.name = name;
    chip.innerHTML = `<span class="e">${EMOJI[name]}</span><span>${name}</span>`;
    chip.addEventListener("click",()=>pick(name));
    palette.appendChild(chip);
  });
  freshName = null;
  syncSelUI();
  $("palCount").textContent = found.size;
}

function syncSelUI(){
  [...palette.children].forEach(c=>{
    const n = c.dataset.name;
    c.classList.toggle("sel", n===selA || n===selB);
  });
  fillSlot(slotA, selA, "첫 번째 선택…");
  fillSlot(slotB, selB, "두 번째 선택…");
  combineBtn.disabled = !(selA && selB);
}
function fillSlot(slot, name, ph){
  if(name){
    slot.classList.add("filled");
    slot.innerHTML = `<span class="e">${EMOJI[name]}</span><span>${name}</span>`;
  }else{
    slot.classList.remove("filled");
    slot.innerHTML = `<span class="ph">${ph}</span>`;
  }
}

/* 선택 로직: 빈 슬롯 순서대로 채움. 같은 원소도 두 슬롯에 가능. */
function pick(name){
  if(selA === null){ selA = name; }
  else if(selB === null){ selB = name; }
  else { selA = name; selB = null; } // 둘 다 차있으면 새로 시작
  syncSelUI();
}
function clearSel(){ selA = selB = null; syncSelUI(); }

function combine(){
  if(!(selA && selB)) return;
  const res = RECIPES[pairKey(selA,selB)];
  if(!res){
    toast(`<span class="big">🌀</span> 아무 반응 없음`, "dud");
    clearSel();
    return;
  }
  const already = found.has(res);
  if(already){
    toast(`<span class="big">${EMOJI[res]}</span> 이미 가진 <b>${res}</b>`, "");
    clearSel();
    return;
  }
  // 새 발견!
  found.add(res);
  save();
  freshName = res;
  clearSel();
  renderAll();
  doFlash();
  toast(`<span class="big">${EMOJI[res]}</span> ✨ 발견: <b>${res}</b>`, "discover");
  if(found.size === TOTAL){
    setTimeout(()=>toast(`<span class="big">🏆</span> 전부 발견! <b>${TOTAL}종 컴플리트</b>`, "discover"), 1500);
  }
}

/* ---------- 피드백 ---------- */
let toastT = null;
function toast(html, kind){
  const t = $("toast");
  t.className = "";
  t.innerHTML = html;
  // reflow then show
  void t.offsetWidth;
  t.classList.add("show");
  if(kind) t.classList.add(kind);
  clearTimeout(toastT);
  toastT = setTimeout(()=>t.classList.remove("show"), 1700);
}
function doFlash(){
  const f = $("flash");
  f.classList.add("on");
  setTimeout(()=>f.classList.remove("on"), 360);
}

/* ---------- 헤더/진행도 ---------- */
function renderStats(){
  $("found").textContent = found.size;
  $("total").textContent = TOTAL;
  const pct = Math.round(found.size/TOTAL*100);
  $("prog").style.width = pct + "%";
  const remain = TOTAL - found.size;
  $("hint").innerHTML = remain>0
    ? `아직 <b>${remain}</b>개가 숨어있다`
    : `<span class="win">다 모았다 🎉</span>`;
}

function renderAll(){ renderPalette(); renderStats(); }

/* ---------- 이벤트 ---------- */
combineBtn.addEventListener("click", combine);
$("clearSel").addEventListener("click", clearSel);
$("reset").addEventListener("click", ()=>{
  if(!confirm("정말 처음부터? 발견한 게 다 사라져.")) return;
  found = new Set(BASE);
  save();
  clearSel();
  renderAll();
  toast("↺ 처음으로 돌아갔다", "");
});
// 같은 원소 두 번 합치기 단축: 칩 더블클릭 시 양쪽 슬롯에
palette.addEventListener("dblclick", e=>{
  const chip = e.target.closest(".chip");
  if(!chip) return;
  selA = selB = chip.dataset.name;
  syncSelUI();
});

renderAll();
</script>
</body>
</html>
