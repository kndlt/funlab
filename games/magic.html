<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>마법진 · funlab</title>
<style>
  :root{
    --bg:#14110d;--panel:#1d1812;--line:#3a3024;--cream:#f6ead8;--ink:#e7dcc8;
    --muted:#a9977e;--amber:#ffb154;--violet:#b48cff;--green:#9fd49a;
  }
  *{margin:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;line-height:1.6;
    background-image:
      radial-gradient(60% 45% at 80% -8%,rgba(255,178,84,.10),transparent 60%),
      radial-gradient(50% 40% at 12% 105%,rgba(180,140,255,.07),transparent 60%);
    -webkit-font-smoothing:antialiased;
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:50}
  .back:hover{color:var(--amber)}
  .wrap{max-width:880px;margin:0 auto;padding:54px 20px 90px;display:flex;flex-direction:column;align-items:center}
  h1{font-size:30px;font-weight:800;letter-spacing:1px;
    background:linear-gradient(#fff3df,#ffcf8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:13.5px;margin-top:6px;text-align:center;max-width:520px}

  .layout{display:flex;gap:26px;margin-top:30px;width:100%;justify-content:center;flex-wrap:wrap;align-items:flex-start}
  .left{display:flex;flex-direction:column;align-items:center;gap:16px}

  /* ---- grid ---- */
  .board{position:relative}
  .grid{
    display:grid;grid-template-columns:repeat(5,58px);grid-template-rows:repeat(5,58px);gap:7px;
    padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:18px;
    box-shadow:inset 0 0 50px rgba(0,0,0,.45);
  }
  .grid.charging{animation:shake .45s ease}
  @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-1px,1px)}50%{transform:translate(1px,-1px)}80%{transform:translate(-1px,0)}}
  .cell{
    border:1px solid var(--line);border-radius:11px;background:#191309;cursor:pointer;
    transition:background .18s,box-shadow .25s,border-color .18s,transform .08s;position:relative;
  }
  .cell:hover{border-color:#6d5226;background:#211810}
  .cell:active{transform:scale(.93)}
  .cell.on{
    border-color:#ffce86;
    background:
      radial-gradient(circle at 38% 32%,#fff0cf,#ffb154 42%,#a86bff 130%);
    box-shadow:0 0 13px rgba(255,178,84,.65),0 0 26px rgba(180,140,255,.30),inset 0 0 8px rgba(255,255,255,.35);
    animation:breathe 2.6s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
  .cell.hintpulse{animation:hintpulse 1.1s ease-out 2}
  @keyframes hintpulse{0%,100%{box-shadow:inset 0 0 0 rgba(255,178,84,0)}40%{box-shadow:inset 0 0 14px rgba(255,178,84,.55)}}
  /* discovery flash — color injected via inline style var --spell */
  .cell.reveal{
    background:radial-gradient(circle at 40% 34%,#fff6e6,var(--spell,#ffb154) 55%);
    border-color:#fff;
    box-shadow:0 0 18px var(--spell,#ffb154),0 0 40px var(--spell,#ffb154);
    animation:revealpulse 1.5s ease-out;
  }
  @keyframes revealpulse{0%{transform:scale(.7);filter:brightness(2)}45%{transform:scale(1.12)}100%{transform:scale(1);filter:brightness(1)}}

  /* floating spell name on discovery */
  .flourish{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;z-index:30;
  }
  .flourish .name{
    font-size:48px;font-weight:800;letter-spacing:6px;color:#fff;
    text-shadow:0 0 16px var(--spell,#ffb154),0 0 40px var(--spell,#ffb154);
    animation:nameIn 1.9s cubic-bezier(.2,.9,.2,1) forwards;
  }
  .flourish .deco{font-size:20px;color:var(--spell,#ffb154);letter-spacing:14px;margin-top:6px;
    animation:nameIn 1.9s ease forwards;animation-delay:.1s;opacity:0}
  @keyframes nameIn{
    0%{transform:scale(.55) translateY(8px);opacity:0;filter:blur(6px)}
    18%{opacity:1;filter:blur(0)}
    35%{transform:scale(1.08) translateY(0)}
    55%{transform:scale(1)}
    80%{opacity:1}
    100%{transform:scale(1.02) translateY(-6px);opacity:0}
  }

  /* ---- controls ---- */
  .controls{display:flex;gap:10px;align-items:center}
  .cast{
    background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;font-weight:800;font-size:16px;
    border:none;padding:12px 30px;border-radius:26px;cursor:pointer;letter-spacing:1px;
    box-shadow:0 4px 0 #b96f1f,0 6px 16px rgba(255,160,60,.30);transition:transform .08s,box-shadow .12s;
  }
  .cast:hover{filter:brightness(1.05)}
  .cast:active{transform:translateY(3px);box-shadow:0 1px 0 #b96f1f}
  .cast:disabled{opacity:.55;cursor:default;transform:none}
  .ghost{
    background:#241c12;color:var(--muted);border:1px solid var(--line);border-radius:20px;
    padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s;
  }
  .ghost:hover{border-color:#7a5a30;color:var(--ink)}

  .msg{min-height:46px;max-width:360px;text-align:center;font-size:14.5px;color:var(--ink);transition:opacity .2s}
  .msg .warm{color:var(--amber);font-weight:700}
  .msg .hot{color:#ffd479;font-weight:800}
  .msg .dim{color:var(--muted)}
  .msg b{color:var(--cream)}

  /* ---- grimoire ---- */
  .grimoire{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 18px 16px;
    width:288px;align-self:flex-start;
  }
  .grimoire h2{font-size:16px;color:var(--cream);font-weight:800;display:flex;justify-content:space-between;align-items:baseline}
  .grimoire h2 .cnt{font-size:12px;color:var(--muted);font-weight:600}
  .totpow{font-size:12.5px;color:var(--amber);margin:2px 0 12px;letter-spacing:.3px}
  .totpow b{font-size:15px}
  .slots{display:flex;flex-direction:column;gap:8px}
  .slot{
    border:1px solid var(--line);border-radius:11px;padding:9px 11px;background:#191309;
    display:flex;flex-direction:column;gap:2px;position:relative;overflow:hidden;
  }
  .slot.locked{opacity:.5;border-style:dashed}
  .slot.got{border-color:#4a3a22}
  .slot.justgot{animation:joinIn .9s ease}
  @keyframes joinIn{0%{transform:translateX(14px);opacity:0;box-shadow:0 0 0}30%{opacity:1}60%{box-shadow:-3px 0 16px var(--spell,#ffb154)}100%{box-shadow:none}}
  .slot .row1{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .slot .nm{font-weight:800;font-size:14.5px;display:flex;align-items:center;gap:7px}
  .slot .dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 7px var(--spell)}
  .slot .pw{font-size:11.5px;color:var(--amber);white-space:nowrap}
  .slot .fx{font-size:11.5px;color:var(--muted)}
  .slot.locked .nm{color:#6a5c47}
  .share{
    margin-top:14px;width:100%;background:#241c12;color:var(--cream);border:1px solid #4a3a22;
    border-radius:22px;padding:10px;font-size:13.5px;cursor:pointer;font-family:inherit;font-weight:700;
    transition:border-color .15s,background .15s;
  }
  .share:hover{border-color:var(--amber);background:#2a2014}
  .share.copied{border-color:var(--green);color:var(--green)}
  .reset{margin-top:8px;width:100%;background:none;border:none;color:#7c6d58;font-size:11.5px;cursor:pointer;font-family:inherit}
  .reset:hover{color:#b88}
  footer{margin-top:42px;color:#6f6150;font-size:11.5px;text-align:center}
</style>
</head>
<body>
<a class="back" href="../index.html">← funlab</a>
<div class="wrap">
  <h1>✦ 마법진 ✦</h1>
  <p class="sub">칸을 켜서 <b>마법진</b>을 그리고 <b>시전</b>하라. 숨은 문양을 정확히 맞히면 — 아무도 가지지 못한 마법이 당신의 것이 된다.</p>

  <div class="layout">
    <div class="left">
      <div class="board">
        <div class="grid" id="grid"></div>
        <div id="flourishHost"></div>
      </div>
      <div class="controls">
        <button class="cast" id="cast">✦ 시전</button>
        <button class="ghost" id="clear">지우기</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>

    <div class="grimoire">
      <h2>📖 그리모어 <span class="cnt" id="cnt"></span></h2>
      <div class="totpow" id="totpow"></div>
      <div class="slots" id="slots"></div>
      <button class="share" id="share">🔮 공유</button>
      <button class="reset" id="reset">초기화</button>
    </div>
  </div>

  <footer>research prototype · discover → own → show</footer>
</div>

<script>
"use strict";
// ---- grid helpers (5x5, index = r*5 + c, center = 12) ----
const N=5, CENTER=12;
const row=r=>[0,1,2,3,4].map(c=>r*5+c);
const col=c=>[0,1,2,3,4].map(r=>r*5+c);
const diagMain=[0,6,12,18,24];
const diagAnti=[4,8,16,20];

// ---- the 8 hidden recipes ----
const RECIPES=[
  {id:'seed',  name:'씨앗', cells:[CENTER],                         color:'#ffd479',
   fx:'작은 가능성 하나가 싹튼다',           hint:'중심에서 무언가 피어나려 한다…'},
  {id:'line',  name:'선',   cells:row(2),                            color:'#ffb154',
   fx:'한 줄기 빛이 곧게 가로지른다',         hint:'가로지르는 흐름이 느껴진다…'},
  {id:'pillar',name:'기둥', cells:col(2),                            color:'#ff9e6d',
   fx:'하늘과 땅을 잇는 기둥이 선다',         hint:'세로로 곧게 선 무언가…'},
  {id:'diag',  name:'대각', cells:diagMain,                          color:'#ff8fb0',
   fx:'비스듬히 운명이 미끄러진다',           hint:'비스듬히 기우는 기운…'},
  {id:'cross', name:'십자', cells:[...row(2),2,7,17,22],             color:'#c89bff',
   fx:'사방의 기운이 한 점에 모인다',         hint:'사방으로 뻗는 대칭이 느껴진다…'},
  {id:'star',  name:'별',   cells:[...diagMain,...diagAnti],         color:'#9db4ff',
   fx:'별 하나가 손바닥 위에 떠오른다',       hint:'여러 갈래로 퍼지는 빛…'},
  {id:'eye',   name:'눈',   cells:[6,7,8,11,13,16,17,18],            color:'#6fe0d0',
   fx:'지켜보는 눈이 떠지고, 주변의 시간을 잠시 늦춘다', hint:'가운데가 빈 고요한 원…'},
  {id:'ring',  name:'고리', cells:[0,1,2,3,4,5,9,10,14,15,19,20,21,22,23,24], color:'#b48cff',
   fx:'결계가 둘러지고, 안의 모든 것을 봉인한다',         hint:'바깥을 두르는 커다란 무언가…'},
];
const power=cells=>cells.length;                 // power ≈ cell count
RECIPES.forEach(r=>{r.power=power(r.cells); r.key=keyOf(r.cells);});

function keyOf(cells){return [...cells].sort((a,b)=>a-b).join(',');}
function symDiff(a,b){            // size of symmetric difference between two index-sets
  const A=new Set(a), B=new Set(b); let inter=0;
  A.forEach(x=>{if(B.has(x))inter++;});
  return A.size+B.size-2*inter;
}

// ---- persistence ----
const LS='funlab:magic';
function loadDiscovered(){
  try{const v=JSON.parse(localStorage.getItem(LS)); return Array.isArray(v)?v:[];}
  catch(e){return [];}
}
function saveDiscovered(ids){localStorage.setItem(LS,JSON.stringify(ids));}
let discovered=new Set(loadDiscovered());

// ---- state ----
let lit=new Set();
let busy=false;
const gridEl=document.getElementById('grid');
const msgEl=document.getElementById('msg');
const flourishHost=document.getElementById('flourishHost');

// build cells
const cellEls=[];
for(let i=0;i<25;i++){
  const d=document.createElement('div');
  d.className='cell'; d.dataset.i=i;
  d.addEventListener('click',()=>toggle(i));
  gridEl.appendChild(d); cellEls.push(d);
}
function toggle(i){
  if(busy)return;
  if(lit.has(i))lit.delete(i); else lit.add(i);
  cellEls[i].classList.toggle('on',lit.has(i));
  cellEls[i].classList.remove('hintpulse','reveal');
}
function clearGrid(){
  lit.clear();
  cellEls.forEach(c=>c.classList.remove('on','reveal','hintpulse'));
}

// ---- intro / message ----
function setMsg(html){msgEl.innerHTML=html;}
function introHint(){
  if(discovered.size===0)
    setMsg('<span class="dim">처음이라면… <b>한가운데 한 칸</b>만 켜고 시전해보라.</span>');
  else
    setMsg('<span class="dim">문양을 그려 시전하라. 숨은 마법은 모두 <b>8</b>개.</span>');
}

// ---- cast ----
document.getElementById('cast').addEventListener('click',cast);
document.getElementById('clear').addEventListener('click',()=>{if(!busy){clearGrid();introHint();}});

function cast(){
  if(busy)return;
  const drawn=[...lit];
  if(drawn.length===0){setMsg('<span class="dim">빈 마법진엔 아무 일도 일어나지 않았다…</span>');return;}
  busy=true;
  gridEl.classList.add('charging');
  setMsg('<span class="dim">기운을 모은다…</span>');
  setTimeout(()=>{ gridEl.classList.remove('charging'); resolve(drawn); busy=false; },480);
}

function resolve(drawn){
  const dkey=keyOf(drawn);
  const exact=RECIPES.find(r=>r.key===dkey);
  if(exact){
    if(discovered.has(exact.id)){
      setMsg(`<span class="dim">이미 아는 마법 — <b style="color:${exact.color}">${exact.name}</b>. ${exact.fx}.</span>`);
    }else{
      discover(exact);
    }
    return;
  }
  // no exact match → warmth hint toward nearest UNDISCOVERED recipe
  const undisc=RECIPES.filter(r=>!discovered.has(r.id));
  if(undisc.length===0){
    setMsg('<span class="hot">모든 마법을 발견했다. 당신의 그리모어는 완전하다. ✦</span>');
    return;
  }
  let best=Infinity, nearest=null;
  undisc.forEach(r=>{const d=symDiff(drawn,r.cells); if(d<best){best=d;nearest=r;}});
  let out=`<span class="dim">아무 일도 일어나지 않았다…</span><br>`;
  if(best<=2){
    out+=`<span class="hot">가장 가까운 미발견 마법까지 ${best}칸</span> — <span class="warm">${nearest.hint}</span>`;
  }else{
    out+=`<span class="warm">가장 가까운 미발견 마법까지 ${best}칸</span>`;
  }
  setMsg(out);
}

// ---- discovery payoff ----
function discover(r){
  discovered.add(r.id);
  saveDiscovered([...discovered]);
  // glow the spell's cells in its color
  r.cells.forEach(i=>{
    const el=cellEls[i];
    el.style.setProperty('--spell',r.color);
    el.classList.add('reveal');
  });
  // floating name flourish
  const f=document.createElement('div');
  f.className='flourish'; f.style.setProperty('--spell',r.color);
  f.innerHTML=`<div class="name">${r.name}</div><div class="deco">✦ ✦ ✦</div>`;
  flourishHost.appendChild(f);
  setTimeout(()=>f.remove(),2000);
  setMsg(`<span class="hot">✦ 발견! ✦</span> <b style="color:${r.color}">${r.name}</b> (power ${r.power})<br><span class="warm">${r.fx}.</span>`);
  renderGrimoire(r.id);
  // leave the reveal glow a moment, then settle back to plain "on"
  setTimeout(()=>{
    r.cells.forEach(i=>cellEls[i].classList.remove('reveal'));
  },1600);
}

// ---- grimoire render ----
const slotsEl=document.getElementById('slots');
const cntEl=document.getElementById('cnt');
const totpowEl=document.getElementById('totpow');
function totalPower(){return RECIPES.filter(r=>discovered.has(r.id)).reduce((s,r)=>s+r.power,0);}
function renderGrimoire(justId){
  slotsEl.innerHTML='';
  RECIPES.forEach(r=>{
    const got=discovered.has(r.id);
    const s=document.createElement('div');
    s.className='slot '+(got?'got':'locked')+(got&&r.id===justId?' justgot':'');
    s.style.setProperty('--spell',r.color);
    if(got){
      s.innerHTML=`<div class="row1"><div class="nm"><span class="dot"></span>${r.name}</div><div class="pw">power ${r.power}</div></div><div class="fx">${r.fx}</div>`;
    }else{
      s.innerHTML=`<div class="row1"><div class="nm">？？？</div><div class="pw">power ?</div></div><div class="fx">아직 발견되지 않은 마법</div>`;
    }
    slotsEl.appendChild(s);
  });
  cntEl.textContent=`발견 ${discovered.size}/${RECIPES.length}`;
  totpowEl.innerHTML=`총 power <b>${totalPower()}</b>`;
}

// ---- share ----
const shareBtn=document.getElementById('share');
shareBtn.addEventListener('click',()=>{
  const got=RECIPES.filter(r=>discovered.has(r.id));
  let text;
  if(got.length===0){
    text=`🔮 내 그리모어: (아직 발견한 마법 없음 · 0/${RECIPES.length} 발견) — funlab/마법진`;
  }else{
    text=`🔮 내 그리모어: ${got.map(r=>r.name).join('·')} (총 power ${totalPower()} · ${got.length}/${RECIPES.length} 발견) — funlab/마법진`;
  }
  const done=()=>{shareBtn.classList.add('copied');shareBtn.textContent='✓ 복사됨';
    setTimeout(()=>{shareBtn.classList.remove('copied');shareBtn.textContent='🔮 공유';},1600);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done,()=>fallbackCopy(text,done));
  }else fallbackCopy(text,done);
});
function fallbackCopy(text,done){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');done();}catch(e){alert(text);}
  ta.remove();
}

// ---- reset ----
document.getElementById('reset').addEventListener('click',()=>{
  if(!confirm('그리모어를 초기화할까? 발견한 마법이 모두 사라진다.'))return;
  discovered=new Set();saveDiscovered([]);clearGrid();renderGrimoire();introHint();
});

// ---- init ----
renderGrimoire();
introHint();
</script>
</body>
</html>
