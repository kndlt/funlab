<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>단어 추리 · funlab</title>
<style>
  :root{
    --bg:#14110d;--panel:#1d1812;--line:#3a3024;--cream:#f6ead8;--ink:#e7dcc8;
    --muted:#a9977e;--amber:#ffb154;--gold:#ffd479;
    --green:#5b8a4f;--green-b:#6fa861;
    --yellow:#c39a3e;--yellow-b:#d8ad4d;
    --gray:#2b2419;--gray-b:#3a3024;
    --key:#352c20;--key-line:#473b2b;
  }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;line-height:1.5;
    background-image:radial-gradient(70% 50% at 80% -10%,rgba(255,178,84,.08),transparent 60%);
    min-height:100%;-webkit-tap-highlight-color:transparent;overflow-x:hidden;
    display:flex;flex-direction:column
  }
  .back{position:fixed;top:14px;left:16px;color:var(--muted);text-decoration:none;font-size:13px;z-index:20}
  .back:hover{color:var(--ink)}
  .wrap{width:100%;max-width:500px;margin:0 auto;padding:46px 14px 18px;display:flex;flex-direction:column;gap:14px;flex:1}
  .head{text-align:center}
  h1{font-size:25px;font-weight:800;background:linear-gradient(#fff3df,#ffcf8a);
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:12.5px;margin-top:4px}

  .stats{display:flex;gap:9px;justify-content:center}
  .statbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:7px 14px;text-align:center;min-width:78px}
  .statbox .lbl{font-size:10.5px;color:var(--muted);letter-spacing:.5px}
  .statbox .val{font-size:21px;font-weight:800;margin-top:1px;font-variant-numeric:tabular-nums}
  #streak .val{color:var(--amber)}
  #best .val{color:var(--gold)}
  #played .val{color:var(--cream)}

  /* board */
  .board{display:flex;flex-direction:column;gap:6px;align-items:center;margin:4px 0}
  .row{display:flex;gap:6px}
  .row.shake{animation:shake .42s cubic-bezier(.36,.07,.19,.97)}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}
    30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
  .tile{
    width:58px;height:58px;border:2px solid var(--gray-b);border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:800;text-transform:uppercase;color:var(--cream);
    transition:transform .15s ease, border-color .15s ease;
    user-select:none;
  }
  .tile.filled{border-color:#5a4c36;animation:pop .12s ease}
  @keyframes pop{0%{transform:scale(.9)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
  /* flip reveal */
  .tile.reveal{animation:flip .56s ease forwards}
  @keyframes flip{
    0%{transform:rotateX(0)}
    50%{transform:rotateX(90deg)}
    100%{transform:rotateX(0)}
  }
  .tile.green{background:var(--green);border-color:var(--green-b);color:#fff}
  .tile.yellow{background:var(--yellow);border-color:var(--yellow-b);color:#fff}
  .tile.gray{background:var(--gray);border-color:var(--gray-b);color:#b3a589}
  .row.win .tile{animation:bounce .55s ease}
  .row.win .tile:nth-child(2){animation-delay:.08s}
  .row.win .tile:nth-child(3){animation-delay:.16s}
  .row.win .tile:nth-child(4){animation-delay:.24s}
  .row.win .tile:nth-child(5){animation-delay:.32s}
  @keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-14px)}50%{transform:translateY(2px)}}

  /* message */
  .msg{min-height:22px;text-align:center;font-size:14px;font-weight:700;color:var(--amber);transition:opacity .2s}
  .msg .answer{color:var(--gold);letter-spacing:2px}

  .again{display:flex;justify-content:center;min-height:42px;align-items:center}
  .again button{
    background:linear-gradient(#ffc266,#ff9e3d);color:#3a230a;font-weight:800;
    border:none;padding:9px 26px;border-radius:22px;font-size:14px;cursor:pointer;
    font-family:inherit;box-shadow:0 4px 14px rgba(255,158,61,.25)
  }
  .again button:active{transform:scale(.96)}

  /* keyboard */
  .kb{display:flex;flex-direction:column;gap:6px;margin-top:auto;padding-bottom:6px}
  .kb .krow{display:flex;gap:5px;justify-content:center}
  .key{
    flex:1;min-width:0;height:50px;border-radius:7px;border:1px solid var(--key-line);
    background:var(--key);color:var(--cream);font-size:15px;font-weight:700;
    text-transform:uppercase;cursor:pointer;font-family:inherit;
    display:flex;align-items:center;justify-content:center;
    transition:transform .06s ease, background .15s ease, color .15s ease;
    max-width:44px;
  }
  .key.wide{flex:1.5;max-width:64px;font-size:11.5px;letter-spacing:.3px}
  .key:active{transform:scale(.92)}
  .key.green{background:var(--green);border-color:var(--green-b);color:#fff}
  .key.yellow{background:var(--yellow);border-color:var(--yellow-b);color:#fff}
  .key.gray{background:#211b13;border-color:#2a2218;color:#6a5f4c}

  @media (max-width:430px){
    .tile{width:52px;height:52px;font-size:25px}
    .key{height:48px}
  }
  @media (max-width:360px){
    .tile{width:46px;height:46px;font-size:22px}
  }
</style>
</head>

  // build valid-guess set
  const VALID=new Set();
  for(const w of ANSWERS) VALID.add(w);
  for(const w of EXTRA) if(w.length===5) VALID.add(w);

  // ---- state ----
  const board=document.getElementById('board');
  const kbEl=document.getElementById('kb');
  const msgEl=document.getElementById('msg');
  const againEl=document.getElementById('again');
  let answer="", curRow=0, curCol=0, grid=[], over=false, evaluating=false;
  const keyState={}; // letter -> 'green'|'yellow'|'gray'

  // ---- persistent stats ----
  const STORE='funlab_word_stats';
  function loadStats(){
    try{return JSON.parse(localStorage.getItem(STORE))||{}}catch(e){return{}}
  }
  function saveStats(s){try{localStorage.setItem(STORE,JSON.stringify(s))}catch(e){}}
  let stats=loadStats();
  stats.played=stats.played||0; stats.won=stats.won||0;
  stats.streak=stats.streak||0; stats.best=stats.best||0;
  function renderStats(){
    document.querySelector('#streak .val').textContent=stats.streak;
    document.querySelector('#best .val').textContent=stats.best;
    document.querySelector('#played .val').textContent=stats.won+'/'+stats.played;
  }

  // ---- build board ----
  function buildBoard(){
    board.innerHTML="";
    grid=[];
    for(let r=0;r<ROWS;r++){
      const row=document.createElement('div');
      row.className='row';
      const cells=[];
      for(let c=0;c<COLS;c++){
        const t=document.createElement('div');
        t.className='tile';
        row.appendChild(t);
        cells.push(t);
      }
      board.appendChild(row);
      grid.push(cells);
    }
  }

  // ---- build keyboard ----
  const KB_ROWS=["qwertyuiop","asdfghjkl","↵zxcvbnm⌫"];
  function buildKeyboard(){
    kbEl.innerHTML="";
    for(const rowStr of KB_ROWS){
      const row=document.createElement('div');
      row.className='krow';
      for(const ch of rowStr){
        const k=document.createElement('button');
        k.className='key';
        if(ch==='↵'){k.classList.add('wide');k.textContent='Enter';k.dataset.key='enter';}
        else if(ch==='⌫'){k.classList.add('wide');k.textContent='⌫';k.dataset.key='back';}
        else{k.textContent=ch;k.dataset.key=ch;}
        k.addEventListener('click',()=>handleKey(k.dataset.key));
        row.appendChild(k);
      }
      kbEl.appendChild(row);
    }
  }

  // ---- core evaluation: Wordle duplicate-letter handling ----
  // Returns array of 'green'|'yellow'|'gray' for each position.
  function evaluate(guess, ans){
    const res=new Array(COLS).fill('gray');
    const counts={};
    for(const ch of ans) counts[ch]=(counts[ch]||0)+1;
    // first pass: greens
    for(let i=0;i<COLS;i++){
      if(guess[i]===ans[i]){res[i]='green';counts[guess[i]]--;}
    }
    // second pass: yellows (only if letter still available)
    for(let i=0;i<COLS;i++){
      if(res[i]==='green')continue;
      const ch=guess[i];
      if(counts[ch]>0){res[i]='yellow';counts[ch]--;}
    }
    return res;
  }

  // ---- input handling ----
  function handleKey(key){
    if(over||evaluating)return;
    if(key==='enter'){submitGuess();return;}
    if(key==='back'){
      if(curCol>0){
        curCol--;
        const t=grid[curRow][curCol];
        t.textContent='';
        t.classList.remove('filled');
      }
      return;
    }
    if(/^[a-z]$/.test(key)){
      if(curCol<COLS){
        const t=grid[curRow][curCol];
        t.textContent=key;
        t.classList.add('filled');
        curCol++;
      }
    }
  }

  function currentGuess(){
    return grid[curRow].map(t=>t.textContent).join('');
  }

  function flash(text,html){
    msgEl.style.opacity='0';
    setTimeout(()=>{
      if(html)msgEl.innerHTML=text; else msgEl.textContent=text;
      msgEl.style.opacity='1';
    },120);
  }

  function shakeRow(){
    const row=board.children[curRow];
    row.classList.remove('shake');
    void row.offsetWidth;
    row.classList.add('shake');
  }

  function submitGuess(){
    if(curCol<COLS){flash('5글자를 채워주세요');shakeRow();return;}
    const guess=currentGuess();
    if(!VALID.has(guess)){flash('단어 목록에 없어요');shakeRow();return;}
    const res=evaluate(guess,answer);
    revealRow(guess,res);
  }

  function revealRow(guess,res){
    evaluating=true;
    const cells=grid[curRow];
    for(let i=0;i<COLS;i++){
      const t=cells[i];
      setTimeout(()=>{
        t.classList.add('reveal');
        // apply color at the midpoint of the flip
        setTimeout(()=>{
          t.classList.remove('filled');
          t.classList.add(res[i]);
        },280);
        // update keyboard state at same midpoint
        setTimeout(()=>updateKey(guess[i],res[i]),280);
      },i*180);
    }
    const total=(COLS-1)*180+560;
    setTimeout(()=>{
      evaluating=false;
      finishRow(guess,res);
    },total);
  }

  // keyboard color priority: green > yellow > gray
  function updateKey(ch,state){
    const prev=keyState[ch];
    const rank={gray:0,yellow:1,green:2};
    if(prev && rank[prev]>=rank[state])return;
    keyState[ch]=state;
    const btn=kbEl.querySelector(`.key[data-key="${ch}"]`);
    if(btn){btn.classList.remove('green','yellow','gray');btn.classList.add(state);}
  }

  function finishRow(guess,res){
    if(guess===answer){
      board.children[curRow].classList.add('win');
      over=true;
      stats.played++; stats.won++; stats.streak++;
      if(stats.streak>stats.best)stats.best=stats.streak;
      saveStats(stats); renderStats();
      const praise=["완벽해요!","훌륭한 추리!","멋져요!","대단해요!","천재적이에요!","읽었군요!"];
      flash(praise[Math.min(curRow,praise.length-1)]||"정답!");
      showAgain();
      return;
    }
    curRow++; curCol=0;
    if(curRow>=ROWS){
      over=true;
      stats.played++; stats.streak=0;
      saveStats(stats); renderStats();
      flash('정답은 <span class="answer">'+answer.toUpperCase()+'</span> 였어요',true);
      showAgain();
    }
  }

  function showAgain(){
    const btn=document.createElement('button');
    btn.textContent='다시';
    btn.addEventListener('click',newGame);
    againEl.innerHTML="";
    againEl.appendChild(btn);
  }

  function newGame(){
    answer=ANSWERS[Math.floor(Math.random()*ANSWERS.length)];
    curRow=0;curCol=0;over=false;evaluating=false;
    for(const k in keyState)delete keyState[k];
    buildBoard();
    // reset keyboard colors
    kbEl.querySelectorAll('.key').forEach(k=>k.classList.remove('green','yellow','gray'));
    msgEl.textContent='';
    againEl.innerHTML="";
  }

  // physical keyboard
  document.addEventListener('keydown',e=>{
    if(e.metaKey||e.ctrlKey||e.altKey)return;
    const k=e.key;
    if(k==='Enter'){e.preventDefault();handleKey('enter');}
    else if(k==='Backspace'){e.preventDefault();handleKey('back');}
    else if(/^[a-zA-Z]$/.test(k)){handleKey(k.toLowerCase());}
  });

  // init
  buildKeyboard();
  renderStats();
  newGame();
})();
