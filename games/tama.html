<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>콩이 · funlab</title>
<style>
  :root{
    --bg:#14110d;--panel:#1d1812;--panel2:#241c12;--line:#3a3024;
    --cream:#f6ead8;--ink:#e7dcc8;--muted:#a9977e;--amber:#ffb154;
    --amber-deep:#ff9e3d;--green:#9fd49a;--pink:#ff9ab0;--blue:#8fc7ff;
  }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Apple SD Gothic Neo",ui-rounded,system-ui,sans-serif;
    line-height:1.5;overflow-x:hidden;min-height:100%;
    background-image:radial-gradient(72% 52% at 50% -6%,rgba(255,178,84,.11),transparent 62%);
    -webkit-tap-highlight-color:transparent;user-select:none;
    display:flex;flex-direction:column;align-items:center;
  }
  a.back{position:fixed;top:14px;left:16px;z-index:30;color:var(--muted);
    text-decoration:none;font-size:13.5px;font-weight:600;opacity:.8}
  a.back:hover{color:var(--amber);opacity:1}

  .wrap{width:100%;max-width:440px;padding:58px 18px 48px;text-align:center}

  .name{font-size:22px;font-weight:800;letter-spacing:-.3px;
    color:var(--cream)}
  .meta{font-size:13px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
  .meta b{color:var(--amber);font-weight:700}
  .stagepill{display:inline-block;margin-left:6px;padding:1px 9px;border-radius:999px;
    background:rgba(255,178,84,.13);border:1px solid var(--line);color:var(--amber);
    font-size:11.5px;font-weight:700;vertical-align:1px}

  /* ---------- creature stage ---------- */
  .stage{position:relative;height:268px;margin:6px 0 2px;
    display:flex;align-items:flex-end;justify-content:center}
  .petScale{transform:scale(var(--s,1));transition:transform .9s cubic-bezier(.2,1.3,.4,1);
    margin-bottom:30px;cursor:pointer}
  .petBody{width:220px;height:220px;animation:bob 3.2s ease-in-out infinite;
    transform-origin:50% 92%}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-9px) rotate(0)}}
  .petBody svg{width:100%;height:100%;display:block;overflow:visible;
    transition:filter .6s ease}

  /* idle wiggle */
  .petBody.wiggle{animation:wiggle .9s ease-in-out}
  @keyframes wiggle{0%,100%{transform:rotate(0)}20%{transform:rotate(-6deg)}55%{transform:rotate(6deg)}80%{transform:rotate(-3deg)}}
  /* reactions */
  .petBody.r-bounce{animation:rbounce .55s cubic-bezier(.25,1.4,.45,1)}
  @keyframes rbounce{0%{transform:translateY(0) scale(1)}35%{transform:translateY(-26px) scale(1.04,.96)}70%{transform:translateY(0) scale(.97,1.03)}100%{transform:translateY(0) scale(1)}}
  .petBody.r-eat{animation:reat .5s ease}
  @keyframes reat{0%,100%{transform:scale(1)}25%{transform:scale(1.06,.9)}55%{transform:scale(.94,1.08)}}
  .petBody.r-droop{animation:rdroop .7s ease}
  @keyframes rdroop{0%{transform:translateY(0)}40%{transform:translateY(8px) scale(1.03,.95)}100%{transform:translateY(0)}}
  .petBody.r-giggle{animation:rgiggle .55s ease}
  @keyframes rgiggle{0%,100%{transform:rotate(0)}20%{transform:rotate(7deg) translateY(-4px)}50%{transform:rotate(-7deg)}80%{transform:rotate(4deg)}}

  /* blink on open eyes */
  #eyesOpen{animation:blink 5.4s infinite;transform-origin:100px 96px}
  @keyframes blink{0%,5.5%,7%,100%{transform:scaleY(1)}6.2%{transform:scaleY(.08)}
    46%,47.4%{transform:scaleY(1)}46.7%{transform:scaleY(.08)}}

  /* feature visibility per mood */
  #eyesHappy,#eyesClosed,#tear,#sweat{opacity:0;transition:opacity .35s ease}
  #blushL,#blushR{opacity:0;transition:opacity .4s ease}
  .pet-happy #eyesOpen{opacity:0}
  .pet-happy #eyesHappy{opacity:1}
  .pet-happy #blushL,.pet-happy #blushR{opacity:.9}
  .pet-sleeping #eyesOpen{opacity:0}
  .pet-sleeping #eyesClosed{opacity:1}
  .pet-sleeping .petBody{animation:bobSlow 4.4s ease-in-out infinite}
  @keyframes bobSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .pet-sad #tear{opacity:1}
  .pet-sad #pupils{transform:translateY(3px)}
  .pet-sick #sweat{opacity:1}
  .pet-sick #pupils{transform:translateY(3px)}
  .pet-sick .petBody svg{filter:saturate(.5) hue-rotate(48deg) brightness(.96)}
  .pet-sad .petBody svg{filter:saturate(.82) brightness(.93)}
  #pupils{transition:transform .5s ease}
  #mouth{transition:d .35s ease}

  .shadow{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
    width:130px;height:20px;border-radius:50%;
    background:radial-gradient(50% 50% at 50% 50%,rgba(0,0,0,.45),transparent 70%);
    transition:width .9s ease}

  /* speech bubble */
  .bubble{position:absolute;top:2px;left:50%;transform:translateX(-50%) translateY(8px) scale(.9);
    background:var(--cream);color:#2a2114;font-weight:700;font-size:14px;
    padding:8px 14px;border-radius:14px;white-space:nowrap;
    box-shadow:0 6px 18px rgba(0,0,0,.35);opacity:0;pointer-events:none;
    transition:opacity .25s ease,transform .25s cubic-bezier(.2,1.4,.4,1);z-index:5}
  .bubble.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  .bubble::after{content:"";position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
    border:7px solid transparent;border-top-color:var(--cream);border-bottom:0}

  .zzz{position:absolute;top:36px;left:62%;font-size:20px;color:#cdbfa6;
    opacity:0;pointer-events:none}
  .pet-sleeping .zzz{opacity:1;animation:zzz 2.6s ease-in-out infinite}
  @keyframes zzz{0%{opacity:0;transform:translateY(6px) scale(.7)}30%{opacity:.95}
    100%{opacity:0;transform:translateY(-30px) scale(1.2)}}

  .pop{position:absolute;pointer-events:none;font-size:20px;z-index:6;
    animation:pop 1s ease-out forwards}
  @keyframes pop{0%{opacity:0;transform:translateY(0) scale(.6)}
    20%{opacity:1}100%{opacity:0;transform:translateY(-70px) scale(1.15)}}

  /* ---------- stats ---------- */
  .stats{margin-top:6px;display:flex;flex-direction:column;gap:11px}
  .stat{display:flex;align-items:center;gap:11px}
  .stat .ico{font-size:19px;width:24px;text-align:center;flex:none}
  .stat .lab{font-size:12.5px;color:var(--muted);width:40px;text-align:left;flex:none;font-weight:600}
  .bar{flex:1;height:13px;border-radius:8px;background:#120f0a;
    border:1px solid var(--line);overflow:hidden;position:relative}
  .fill{height:100%;border-radius:7px;transition:width .5s ease,background .5s ease;
    width:50%}
  .fill.hunger{background:linear-gradient(90deg,#ff9e3d,#ffce7a)}
  .fill.happy{background:linear-gradient(90deg,#ff7d9c,#ffb0c2)}
  .fill.energy{background:linear-gradient(90deg,#56b6ff,#9fd9c0)}
  .fill.low{background:linear-gradient(90deg,#b5443a,#d8736a)!important}
  .stat .num{font-size:12px;color:var(--muted);width:30px;text-align:right;flex:none;
    font-variant-numeric:tabular-nums}

  /* ---------- buttons ---------- */
  .care{margin-top:22px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel);
    color:var(--cream);border-radius:15px;padding:13px 6px 11px;cursor:pointer;
    font-family:inherit;font-weight:700;font-size:13px;line-height:1.2;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    transition:transform .12s ease,background .18s ease,border-color .18s ease;
    box-shadow:0 2px 0 rgba(0,0,0,.25)}
  .btn .be{font-size:24px}
  .btn:hover{background:var(--panel2);border-color:#52442f}
  .btn:active{transform:translateY(2px);box-shadow:0 0 0 rgba(0,0,0,.25)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn.sleeping{border-color:var(--amber);background:rgba(255,178,84,.12);color:var(--amber)}

  .reset{margin-top:20px;background:none;border:none;color:var(--muted);
    font-family:inherit;font-size:12.5px;cursor:pointer;text-decoration:underline;
    text-underline-offset:3px;opacity:.75}
  .reset:hover{color:var(--pink);opacity:1}

  .hint{margin-top:16px;font-size:11.5px;color:#7d6e57}
</style>
</head>
<body>
<a class="back" href="../index.html">← funlab</a>

<div class="wrap">
  <div class="name" id="petName">콩이</div>
  <div class="meta">나이 <b id="age">0</b>일<span class="stagepill" id="stage">아기</span></div>

  <div class="stage">
    <div class="bubble" id="bubble">안녕!</div>
    <div class="zzz" id="zzz">Z<sup>z</sup></div>
    <div class="petScale" id="petScale">
      <div class="petBody" id="pet">
        <svg viewBox="0 0 200 200" aria-hidden="true">
          <defs>
            <radialGradient id="bodyG" cx="38%" cy="30%" r="75%">
              <stop offset="0%" stop-color="#fff3da"/>
              <stop offset="32%" stop-color="#ffd591"/>
              <stop offset="70%" stop-color="#ff9e3d"/>
              <stop offset="100%" stop-color="#d4761c"/>
            </radialGradient>
            <radialGradient id="bellyG" cx="50%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#fff1d4"/>
              <stop offset="100%" stop-color="#ffd9a0" stop-opacity="0"/>
            </radialGradient>
          </defs>

          <!-- ears -->
          <path d="M62 56 Q54 24 78 40 Q74 56 62 56Z" fill="#ffb154"/>
          <path d="M138 56 Q146 24 122 40 Q126 56 138 56Z" fill="#ffb154"/>
          <!-- feet -->
          <ellipse cx="74" cy="176" rx="20" ry="12" fill="#e8861f"/>
          <ellipse cx="126" cy="176" rx="20" ry="12" fill="#e8861f"/>
          <!-- body -->
          <ellipse cx="100" cy="112" rx="66" ry="62" fill="url(#bodyG)"
            stroke="rgba(140,72,16,.35)" stroke-width="2"/>
          <ellipse cx="100" cy="126" rx="40" ry="34" fill="url(#bellyG)"/>
          <!-- little arms -->
          <ellipse cx="40" cy="120" rx="13" ry="17" fill="#ffac4c" transform="rotate(18 40 120)"/>
          <ellipse cx="160" cy="120" rx="13" ry="17" fill="#ffac4c" transform="rotate(-18 160 120)"/>

          <!-- blush -->
          <ellipse id="blushL" cx="70" cy="112" rx="11" ry="7" fill="#ff8aa0" opacity="0"/>
          <ellipse id="blushR" cx="130" cy="112" rx="11" ry="7" fill="#ff8aa0" opacity="0"/>

          <!-- open eyes -->
          <g id="eyesOpen">
            <ellipse cx="80" cy="96" rx="10.5" ry="13.5" fill="#fffaf2"/>
            <ellipse cx="120" cy="96" rx="10.5" ry="13.5" fill="#fffaf2"/>
            <g id="pupils">
              <circle cx="81" cy="98" r="5.4" fill="#3a2a17"/>
              <circle cx="121" cy="98" r="5.4" fill="#3a2a17"/>
              <circle cx="78.6" cy="95" r="1.9" fill="#fff"/>
              <circle cx="118.6" cy="95" r="1.9" fill="#fff"/>
            </g>
          </g>
          <!-- happy eyes ^_^ -->
          <g id="eyesHappy" fill="none" stroke="#3a2a17" stroke-width="4" stroke-linecap="round">
            <path d="M71 100 Q80 88 89 100"/>
            <path d="M111 100 Q120 88 129 100"/>
          </g>
          <!-- closed eyes (sleep) -->
          <g id="eyesClosed" fill="none" stroke="#3a2a17" stroke-width="4" stroke-linecap="round">
            <path d="M70 98 Q80 106 90 98"/>
            <path d="M110 98 Q120 106 130 98"/>
          </g>

          <!-- mouth -->
          <path id="mouth" d="M86 124 Q100 138 114 124" fill="none"
            stroke="#5a3c1c" stroke-width="3.4" stroke-linecap="round"/>

          <!-- tear / sweat -->
          <path id="tear" d="M88 110 q-6 9 0 14 q6 -5 0 -14Z" fill="#7ec8ff"/>
          <path id="sweat" d="M150 92 q-6 9 0 14 q6 -5 0 -14Z" fill="#bfe6ff"/>
        </svg>
      </div>
    </div>
    <div class="shadow" id="shadow"></div>
  </div>

  <div class="stats">
    <div class="stat"><span class="ico">🍙</span><span class="lab">배고픔</span>
      <div class="bar"><div class="fill hunger" id="fH"></div></div><span class="num" id="nH">0</span></div>
    <div class="stat"><span class="ico">💛</span><span class="lab">행복</span>
      <div class="bar"><div class="fill happy" id="fHa"></div></div><span class="num" id="nHa">0</span></div>
    <div class="stat"><span class="ico">⚡</span><span class="lab">기운</span>
      <div class="bar"><div class="fill energy" id="fE"></div></div><span class="num" id="nE">0</span></div>
  </div>

  <div class="care">
    <button class="btn" id="bFeed"><span class="be">🍙</span>밥주기</button>
    <button class="btn" id="bPlay"><span class="be">🎈</span>놀아주기</button>
    <button class="btn" id="bSleep"><span class="be">😴</span>재우기</button>
  </div>

  <button class="reset" id="bReset">🌱 새 친구 맞이하기</button>
  <div class="hint">콩이를 쓰다듬어 보세요 · 떠나 있어도 콩이는 계속 살아가요</div>
</div>

<script>
(function(){
  "use strict";
  const SAVE="funlab.tama.v1";
  const NAMES=["콩이","두부","모카","뽀삐","초코","단추","방울","호두","구름","감자"];

  // ---- tunables ----
  const DECAY={hunger:4.0, happy:3.0, energy:2.2}; // points per real minute
  const MAX_OFFLINE_MIN=12*60;       // cap applied-since-last-visit
  const AGE_PER_DAY_MIN=3;           // 3 real min of life = 1 "일"
  const STAGE_AT=[0,4,12,30];        // lifeMinutes thresholds
  const STAGE_NAME=["아기","어린이","청소년","어른"];
  const STAGE_SCALE=[0.78,0.9,1.0,1.1];

  // ---- state ----
  let s=load();

  function fresh(){
    return {
      name:NAMES[Math.floor(Math.random()*NAMES.length)],
      hunger:72, happy:78, energy:80,
      lifeMin:0, stage:0,
      lastTick:Date.now(),
      napUntil:0, napRate:0
    };
  }
  function load(){
    try{
      const raw=localStorage.getItem(SAVE);
      if(!raw) return fresh();
      const o=JSON.parse(raw);
      if(typeof o.hunger!=="number") return fresh();
      o.napUntil=0; o.napRate=0; // never resume a nap across reloads
      // apply decay for time away (capped)
      const now=Date.now();
      let mins=(now-(o.lastTick||now))/60000;
      if(mins<0) mins=0;
      if(mins>MAX_OFFLINE_MIN) mins=MAX_OFFLINE_MIN;
      applyDecay(o, mins, false);
      o.lastTick=now;
      return o;
    }catch(e){ return fresh(); }
  }
  function save(){
    s.lastTick=Date.now();
    try{ localStorage.setItem(SAVE,JSON.stringify(s)); }catch(e){}
  }

  const clamp=(v)=>v<0?0:v>100?100:v;

  // pure decay function (also used for offline catch-up)
  function applyDecay(st, minutes, napping){
    if(minutes<=0) return;
    if(napping){
      st.energy=clamp(st.energy + st.napRate*minutes);
      st.hunger=clamp(st.hunger - DECAY.hunger*0.5*minutes);
      st.happy =clamp(st.happy  - DECAY.happy *0.4*minutes);
    }else{
      st.hunger=clamp(st.hunger - DECAY.hunger*minutes);
      st.energy=clamp(st.energy - DECAY.energy*minutes);
      let hd=DECAY.happy;
      // starving or exhausted makes the heart sink faster
      if(st.hunger<=0||st.energy<=0) hd+=2.4;
      st.happy=clamp(st.happy - hd*minutes);
    }
    st.lifeMin+=minutes;
  }

  // ---- DOM ----
  const $=(id)=>document.getElementById(id);
  const pet=$("pet"), petScale=$("petScale"), bubble=$("bubble"), stageEl=document.querySelector(".stage");
  const mouth=$("mouth");
  const els={
    name:$("petName"), age:$("age"), stage:$("stage"),
    fH:$("fH"), fHa:$("fHa"), fE:$("fE"),
    nH:$("nH"), nHa:$("nHa"), nE:$("nE"),
    feed:$("bFeed"), play:$("bPlay"), sleep:$("bSleep"), reset:$("bReset"),
    shadow:$("shadow")
  };

  const MOUTHS={
    happy:   "M82 122 Q100 144 118 122",
    neutral: "M88 126 Q100 134 112 126",
    sad:     "M84 134 Q100 120 116 134",
    sick:    "M84 128 q7 -7 12 0 q5 7 12 0 q5 -7 11 0",
    sleeping:"M92 126 Q100 132 108 126",
    open:    "M88 122 Q100 142 112 122"
  };

  const LINES={
    happy:["헤헤 좋아!","오늘 최고야~","같이 있어줘서 고마워","룰루랄라♪","행복해!"],
    neutral:["흠흠…","뭐 하고 놀까?","심심해~","곁에 있어줘","음— 평화로워"],
    sad:["조금 외로워…","흑… 슬퍼","날 좀 봐줘…","기운이 없어…"],
    sick:["으… 아파…","끙… 힘들어","돌봐줘…","어지러워…"],
    feed:["냠냠! 맛있어!","고마워! 배불러~","잘 먹겠습니다!"],
    feedFull:["우웩 배불러…","더는 못 먹어…"],
    play:["꺄르륵 신난다!","더 놀자 더!","즐거워~!","야호!"],
    playTired:["너무 피곤해…","흐냐… 졸려…"],
    pet:["히힛 간지러워!","좋아좋아~","에헤헤","더 쓰다듬어줘"],
    sleepStart:["잘게… 쿨…","꿈나라로~","흐암…"],
    wake:["잘 잤다! 개운해!","좋은 아침!","으— 잘 잤다"],
    evolve:["나 컸어!","짠— 변신!","쑥쑥 자랐지롱"],
    born:["안녕! 잘 부탁해!","반가워! 친구야~"]
  };
  const pick=(a)=>a[Math.floor(Math.random()*a.length)];

  let bubbleTimer=null, actionLock=0;
  function say(text, ms){
    bubble.textContent=text;
    bubble.classList.add("show");
    clearTimeout(bubbleTimer);
    bubbleTimer=setTimeout(()=>bubble.classList.remove("show"), ms||2600);
  }

  function react(cls, ms){
    pet.classList.remove("r-bounce","r-eat","r-droop","r-giggle","wiggle");
    void pet.offsetWidth; // restart
    pet.classList.add(cls);
    actionLock=Date.now()+(ms||600);
    setTimeout(()=>pet.classList.remove(cls), ms||600);
  }

  function pop(emoji,n){
    n=n||3;
    for(let i=0;i<n;i++){
      const e=document.createElement("div");
      e.className="pop"; e.textContent=emoji;
      e.style.left=(38+Math.random()*24)+"%";
      e.style.top=(28+Math.random()*18)+"%";
      e.style.animationDelay=(i*0.08)+"s";
      stageEl.appendChild(e);
      setTimeout(()=>e.remove(),1100);
    }
  }

  function napping(){ return Date.now()<s.napUntil; }

  function mood(){
    if(napping()) return "sleeping";
    const f=s.hunger,h=s.happy,en=s.energy, avg=(f+h+en)/3;
    if(f<=0||en<=0) return "sick";
    if(f<14||h<14||en<14||avg<28) return "sad";
    if(avg>=72 && f>40 && h>40 && en>30) return "happy";
    return "neutral";
  }

  let lastMood=null;
  function render(){
    // bars
    const set=(fill,num,v,low)=>{
      fill.style.width=v+"%";
      fill.classList.toggle("low", v<=20);
      num.textContent=Math.round(v);
    };
    set(els.fH,els.nH,s.hunger);
    set(els.fHa,els.nHa,s.happy);
    set(els.fE,els.nE,s.energy);

    // age + stage
    els.age.textContent=Math.floor(s.lifeMin/AGE_PER_DAY_MIN);
    els.stage.textContent=STAGE_NAME[s.stage];
    els.name.textContent=s.name;
    petScale.style.setProperty("--s", STAGE_SCALE[s.stage]);
    els.shadow.style.width=(110*STAGE_SCALE[s.stage])+"px";

    // mood class + mouth
    const m=mood();
    if(m!==lastMood){
      const wrap=document.querySelector(".wrap");
      wrap.classList.remove("pet-happy","pet-neutral","pet-sad","pet-sick","pet-sleeping");
      wrap.classList.add("pet-"+m);
      mouth.setAttribute("d", MOUTHS[m]);
      lastMood=m;
    }

    // sleeping button label
    els.sleep.classList.toggle("sleeping", m==="sleeping");
    els.sleep.querySelector(".be").textContent = m==="sleeping" ? "💤" : "😴";
    els.sleep.childNodes[1].nodeValue = m==="sleeping" ? "자는 중…" : "재우기";
    const asleep=m==="sleeping";
    els.feed.disabled=asleep;
    els.play.disabled=asleep;
  }

  // ---- main loop ----
  function tick(){
    const now=Date.now();
    let mins=(now-s.lastTick)/60000;
    if(mins<0) mins=0;
    const wasNap=napping();
    applyDecay(s, mins, wasNap);
    s.lastTick=now;

    // wake up?
    if(wasNap && !napping()){
      s.energy=clamp(Math.max(s.energy,96));
      s.napRate=0;
      say(pick(LINES.wake)); react("r-bounce"); pop("✨",3);
    }
    checkEvolve();
    render();
  }

  function checkEvolve(){
    let ns=0;
    for(let i=0;i<STAGE_AT.length;i++) if(s.lifeMin>=STAGE_AT[i]) ns=i;
    if(ns>s.stage){
      s.stage=ns;
      say(pick(LINES.evolve)); react("r-bounce",700); pop("🌟",6); pop("🎉",3);
    }
  }

  // ---- actions ----
  function guard(){ return napping(); }

  function feed(){
    if(guard()) return;
    if(s.hunger>=94){ say(pick(LINES.feedFull)); react("r-droop"); return; }
    s.hunger=clamp(s.hunger+30);
    s.happy=clamp(s.happy+4);
    say(pick(LINES.feed)); react("r-eat"); pop("🍙",2);
    render(); save();
  }
  function play(){
    if(guard()) return;
    if(s.energy<14){ say(pick(LINES.playTired)); react("r-droop"); return; }
    s.happy=clamp(s.happy+26);
    s.energy=clamp(s.energy-14);
    s.hunger=clamp(s.hunger-5);
    say(pick(LINES.play)); react("r-giggle"); pop("🎈",2); pop("💛",2);
    render(); save();
  }
  function sleepToggle(){
    if(napping()){            // tap again to wake early
      s.napUntil=0; s.energy=clamp(s.energy);
      say(pick(LINES.wake)); react("r-bounce");
      render(); save(); return;
    }
    const need=100-s.energy;
    if(need<6){ say("아직 안 졸려~"); react("r-giggle"); return; }
    const durMs=Math.min(9000, Math.max(3200, need/100*9000));
    s.napUntil=Date.now()+durMs;
    s.napRate=need/(durMs/60000); // points per minute to fill by wake
    say(pick(LINES.sleepStart));
    render(); save();
  }
  function stroke(){
    if(napping()){ say("쉿… 자고 있어요"); return; }
    s.happy=clamp(s.happy+4);
    say(pick(LINES.pet)); react("r-giggle"); pop("💛",2);
    render(); save();
  }
  function reset(){
    if(!confirm("지금 친구와 작별하고 새 친구를 맞이할까요?\n(콩이의 기록은 사라져요)")) return;
    s=fresh(); lastMood=null;
    save(); render();
    say(pick(LINES.born)); react("r-bounce"); pop("🌱",4);
  }

  els.feed.onclick=feed;
  els.play.onclick=play;
  els.sleep.onclick=sleepToggle;
  els.reset.onclick=reset;
  petScale.onclick=stroke;

  // idle bubble + occasional wiggle
  setInterval(()=>{
    if(Date.now()<actionLock) return;
    if(napping()) return;
    if(bubble.classList.contains("show")) return;
    const m=mood();
    if(m==="happy"||m==="neutral"){ if(Math.random()<0.5){react("wiggle",900);} }
    say(pick(LINES[m]||LINES.neutral), 2400);
  }, 8500);

  // save on hide / unload
  document.addEventListener("visibilitychange",()=>{ if(document.hidden) save(); });
  window.addEventListener("pagehide", save);

  // boot
  render();
  setTimeout(()=>{ say(pick(LINES.born),2600); pop("👋",2); }, 500);
  setInterval(tick, 1000);
  setInterval(save, 15000);
})();
</script>
</body>
</html>
